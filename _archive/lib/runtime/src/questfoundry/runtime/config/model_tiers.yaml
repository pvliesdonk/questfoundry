# Model Tier Configuration - November 2025
# Maps work types to provider-specific models
#
# Updated: 2025-11-21 with latest November 2025 model releases
#
# Tiers are designed for specific QuestFoundry roles/tasks:
# - creative-writing: Prose generation (Scene Smith)
# - structured-thinking: Topology/planning (Plotwright, Showrunner)
# - validation: Quality checks (Gatekeeper, Style Lead)
# - customer-facing: Natural language communication (Showrunner)
# - quick-feedback: Fast iterations/reviews
# - long-context: Large manuscripts, extensive context

model_tiers:
  # Creative Writing: Best prose quality, storytelling
  # Used by: Scene Smith, Audio Director, Art Director, Translator
  creative-writing:
    anthropic: claude-sonnet-4-5-20250929 # Best coding model, 77.2% SWE-bench
    openai: gpt-4o # Fast, high-quality prose generation
    google: gemini-3-pro # 1M context, 1501 Elo on LMArena
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o

  # Structured Thinking: Complex reasoning, planning, topology
  # Used by: Plotwright, Lore Weaver, Researcher
  # IMPORTANT: Use gpt-4o NOT reasoning models (o1/o3/gpt-5-thinking) for structured output
  # Reasoning models generate 6K+ reasoning tokens that blow past JSON limits
  structured-thinking:
    anthropic: claude-opus-4-1 # Agentic tasks, reasoning (Aug 2025)
    openai: gpt-4o # Best for structured output - avoid reasoning models here
    google: gemini-3-pro # PhD-level reasoning, top Humanity's Last Exam score
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o

  # Validation: Quality checks, consistency verification
  # Used by: Gatekeeper, Style Lead (lightweight checks)
  validation:
    anthropic: claude-haiku-4-5 # Fast, efficient validation
    openai: gpt-4o-mini # Fast, cheap validation
    google: gemini-2.5-flash # 1M context, fast
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o-mini

  # Customer Facing: Natural, empathetic communication
  # Used by: Showrunner (interpreting customer requests), Player-Narrator
  customer-facing:
    anthropic: claude-sonnet-4-5-20250929 # Warmer, more conversational
    openai: gpt-4o # Natural, empathetic communication
    google: gemini-3-pro # Natural communication
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o

  # Quick Feedback: Fast iteration, suggestions
  # Used by: All roles for rapid prototyping/testing
  quick-feedback:
    anthropic: claude-haiku-4-5
    openai: gpt-4o-mini # Fast, cheap iterations
    google: gemini-2.5-flash
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o-mini

  # Long Context: Extended context windows for large manuscripts
  # Used by: Book Binder, Codex Curator
  long-context:
    anthropic: claude-sonnet-4-5-20250929 # 200k tokens
    openai: gpt-4o # 128k tokens
    google: gemini-3-pro # 1M tokens (best for long context)
    ollama: qwen3:8b # Base model with native tool calling support
    litellm: gpt-4o

# Fallback order when tier is not specified
default_tier: creative-writing

# Provider fallback order when auto-selecting
provider_priority:
  - anthropic
  - openai
  - google
  - ollama
  - litellm

# Role-specific tier recommendations (can be overridden in role YAML)
role_tier_recommendations:
  showrunner: customer-facing
  plotwright: structured-thinking
  scene_smith: creative-writing
  gatekeeper: validation
  style_lead: validation
  lore_weaver: structured-thinking
  codex_curator: long-context
  book_binder: long-context
  audio_director: creative-writing
  art_director: creative-writing
  player_narrator: customer-facing
  translator: creative-writing

# Model metadata for token limits and context windows
# Used for pre-flight validation and context management
model_metadata:
  # Anthropic models
  claude-opus-4-1:
    context_window: 200000
    max_output_tokens: 32000
  claude-sonnet-4-5-20250929:
    context_window: 200000
    max_output_tokens: 8192
  claude-haiku-4-5:
    context_window: 200000
    max_output_tokens: 8192

  # OpenAI models
  gpt-4o:
    context_window: 128000
    max_output_tokens: 16384
  gpt-4o-mini:
    context_window: 128000
    max_output_tokens: 16384
  o1:
    context_window: 200000
    max_output_tokens: 100000
  o3:
    context_window: 200000
    max_output_tokens: 100000

  # Google models
  gemini-3-pro:
    context_window: 1000000
    max_output_tokens: 8192
  gemini-2.5-flash:
    context_window: 1000000
    max_output_tokens: 8192

  # Ollama models (defaults, actual limits depend on model)
  qwen3:8b:
    context_window: 32768
    max_output_tokens: 8192

# Default limits when model not found in metadata
default_model_limits:
  context_window: 8192
  max_output_tokens: 4096
