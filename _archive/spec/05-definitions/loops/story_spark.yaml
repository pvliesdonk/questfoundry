# Loop Pattern: Story Spark
# Compiled from: spec/00-north-star/LOOPS/story_spark.md
# Schema: spec/03-schemas/definitions/loop_pattern.schema.json

id: story_spark

metadata:
  name: "Story Spark"
  type: "Discovery"
  description: |
    Reshape or add plot topology - parts/chapters, hubs, loops, gateways, and codeword economy.
    Ripple changes through prose, hooks, and QA without leaking spoilers to player surfaces.

topology:
  entry_node: topology_draft

  nodes:
    - role_id: plotwright
      node_id: topology_draft
      description: "Map parts/chapters and designate hubs (fan-out), loops (return-with-difference), and gateways (state-gated). For each gateway, write a diegetic condition PN can enforce."

    - role_id: plotwright
      node_id: section_briefs
      description: "For each affected/new section: intent, stakes, choices, expected state effect (human phrasing), references."

    - role_id: scene_smith
      node_id: prose_pass
      description: "Draft/adjust section text in style; make choices clear and distinct. Note intended state effects in comments (still human-level)."

    - role_id: plotwright
      node_id: hook_generation
      description: "Create narrative/scene/factual hook cards with rationales and uncertainty levels."

    - role_id: gatekeeper
      node_id: preview_gate
      description: "Run a quick pre-gate: Integrity (no accidental dead ends), Reachability (keystones reachable), Nonlinearity (hubs/loops exist & matter)."

  edges:
    - source: topology_draft
      target: section_briefs
      type: conditional
      condition:
        evaluator: state_key_match
        expression: "state.topology_complete == true"
    - source: section_briefs
      target: prose_pass
      type: conditional
      condition:
        evaluator: state_key_match
        expression: "state.briefs_approved == true"
    - source: prose_pass
      target: hook_generation
      type: conditional
      condition:
        evaluator: state_key_match
        expression: "state.drafts_complete == true"
    - source: hook_generation
      target: preview_gate
      type: conditional
      condition:
        evaluator: state_key_match
        expression: "state.hooks_generated == true"
    - source: preview_gate
      target: END
      type: direct

traceability:
  tu_lifecycle:
    required: true
  produces_cold: false

context:
  required_artifacts:
    - artifact_type: cold_snapshot
      state_key: cold_sot.snapshot
    - artifact_type: topology_notes
      state_key: hot_sot.topology_notes

handoffs:
  - target: hook_harvest
    condition: "hook list and topology delta ready for triage"
  - target: lore_deepening
    condition: "accepted hooks require canon backfill"
  - target: codex_expansion
    condition: "taxonomy/clarity needs identified"
  - target: style_tune_up
    condition: "drift notes exceed minor edits"

gates:
  quality_bars:
    - Integrity
    - Reachability
    - Nonlinearity
    - Gateways
    - Style
    - Presentation

protocol_flow:
  flow_ref: "spec/04-protocol/FLOWS/story_spark.md"
  message_sequences:
    - step: 1
      sender: "PW"
      receiver: "*"
      intent: "tu.start"
      description: "Initiate the Story Spark loop"
    - step: 2
      sender: "GK"
      receiver: "SR"
      intent: "gate.report.submit"
      description: "Standard quality gate check"

success_criteria:
  custom_checks:
    - name: meaningful_nonlinearity
      expression: "state.topology_has_nonlinearity == true"
      error_message: "Topology adds or repairs meaningful nonlinearity (not decorative)"
    - name: diegetic_gateways
      expression: "state.gateways_are_diegetic == true"
      error_message: "Gateways have clear diegetic conditions PN can enforce without leaks"
    - name: loop_returns_with_difference
      expression: "state.loops_have_difference == true"
      error_message: "At least one loop returns with difference (via codeword/state)"
    - name: sections_in_voice
      expression: "state.sections_in_voice == true"
      error_message: "Drafted sections are in-voice and choice-clear"
    - name: hooks_triaged_ready
      expression: "state.hooks_ready == true"
      error_message: "Hooks are small, rationalized, and triaged-ready"
    - name: no_dead_ends
      expression: "state.no_dead_ends == true"
      error_message: "Pre-gate shows no accidental dead ends; keystones remain reachable"
