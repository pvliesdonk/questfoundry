# Pre-commit hooks for QuestFoundry mono-repo
# See https://pre-commit.com for more information

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(spec/|lib/python/src/questfoundry/resources/)
      - id: end-of-file-fixer
        exclude: ^(spec/|lib/python/src/questfoundry/resources/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  # Python: Ruff (linting and formatting) - lib/compiler
  - repo: local
    hooks:
      - id: ruff-lib-compiler
        name: ruff (lib/compiler)
        entry: uv run --project lib/compiler ruff check --fix --no-cache
        language: system
        types_or: [python, pyi]
        files: ^lib/compiler/
      - id: ruff-format-lib-compiler
        name: ruff format (lib/compiler)
        entry: uv run --project lib/compiler ruff format --no-cache
        language: system
        types_or: [python, pyi]
        files: ^lib/compiler/

  # Python: Ruff (linting and formatting) - lib/python
  # --no-cache has been disabled due to a locking problem, probably from the check and format hook fighting.
  - repo: local
    hooks:
      - id: ruff-lib-python
        name: ruff (lib/python)
        entry: uv run --project lib/python ruff check --fix --no-cache
        language: system
        types_or: [python, pyi]
        files: ^lib/python/
      - id: ruff-format-lib-python
        name: ruff format (lib/python)
        entry: uv run --project lib/python ruff format --no-cache
        language: system
        types_or: [python, pyi]
        files: ^lib/python/

  # Python: Type checking with mypy - lib/compiler
  - repo: local
    hooks:
      - id: mypy-lib-compiler
        name: mypy (lib/compiler)
        entry: uv run --project lib/compiler mypy
        language: system
        types_or: [python, pyi]
        files: ^lib/compiler/src/
        args: [--config-file=lib/compiler/pyproject.toml]

  # Python: Type checking with mypy - lib/python
  - repo: local
    hooks:
      - id: mypy-lib-python
        name: mypy (lib/python)
        entry: uv run --project lib/python mypy
        language: system
        types_or: [python, pyi]
        files: ^lib/python/src/
        args: [--config-file=lib/python/pyproject.toml]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: ^(lib/python/src/questfoundry/resources/|lib/python/docs/)

  # Commitizen for commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

ci:
  autofix_commit_msg: |
    chore: auto-fix pre-commit hooks

    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
