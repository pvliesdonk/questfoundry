# Pre-commit hooks for QuestFoundry
# See https://pre-commit.com for more information

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(_archive/|spec/)
      - id: end-of-file-fixer
        exclude: ^(_archive/|spec/)
      - id: check-yaml
        exclude: ^_archive/
      - id: check-json
        exclude: ^_archive/
      - id: check-toml
        exclude: ^_archive/
      - id: check-added-large-files
        args: ["--maxkb=1000"]
        exclude: ^_archive/
      - id: check-merge-conflict
        exclude: ^_archive/
      - id: check-case-conflict
        exclude: ^_archive/
      - id: mixed-line-ending
        exclude: ^_archive/

  # Python: Ruff (linting and formatting) - src/questfoundry
  - repo: local
    hooks:
      - id: ruff-questfoundry
        name: ruff (questfoundry)
        entry: ruff check --fix --no-cache
        language: python
        types_or: [python, pyi]
        files: ^src/questfoundry/
        additional_dependencies:
          - ruff==0.14.5
      - id: ruff-format-questfoundry
        name: ruff format (questfoundry)
        entry: ruff format --no-cache
        language: python
        types_or: [python, pyi]
        files: ^src/questfoundry/
        additional_dependencies:
          - ruff==0.14.5

  # Python: Ruff (linting and formatting) - tests
  - repo: local
    hooks:
      - id: ruff-tests
        name: ruff (tests)
        entry: ruff check --fix --no-cache
        language: python
        types_or: [python, pyi]
        files: ^tests/
        additional_dependencies:
          - ruff==0.14.5
      - id: ruff-format-tests
        name: ruff format (tests)
        entry: ruff format --no-cache
        language: python
        types_or: [python, pyi]
        files: ^tests/
        additional_dependencies:
          - ruff==0.14.5

  # Python: Type checking with mypy - src/questfoundry
  # Note: Uses language: system to access project dependencies via uv
  - repo: local
    hooks:
      - id: mypy-questfoundry
        name: mypy (questfoundry)
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        files: ^src/questfoundry/
        args: [--config-file=pyproject.toml]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: ^(_archive/|docs/design/)

  # Commitizen for commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

ci:
  autofix_commit_msg: |
    chore: auto-fix pre-commit hooks

    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
