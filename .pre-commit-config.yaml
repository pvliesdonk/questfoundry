# Pre-commit hooks for QuestFoundry mono-repo
# See https://pre-commit.com for more information

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(spec/|lib/python/src/questfoundry/resources/)
      - id: end-of-file-fixer
        exclude: ^(spec/|lib/python/src/questfoundry/resources/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  # Python: Ruff (linting and formatting) - run from lib/python directory
  - repo: local
    hooks:
      - id: ruff-lib-python
        name: ruff (lib/python)
        entry: bash -c 'cd lib/python && uv run ruff check --fix src tests'
        language: system
        files: ^lib/python/(src|tests)/
        pass_filenames: false
      - id: ruff-format-lib-python
        name: ruff format (lib/python)
        entry: bash -c 'cd lib/python && uv run ruff format src tests'
        language: system
        files: ^lib/python/(src|tests)/
        pass_filenames: false

  # Python: Type checking with mypy - run from lib/python directory
  - repo: local
    hooks:
      - id: mypy-lib-python
        name: mypy (lib/python)
        entry: bash -c 'cd lib/python && uv run mypy src'
        language: system
        files: ^lib/python/src/
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: ^(lib/python/src/questfoundry/resources/|spec/)

  # Commitizen for commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

# Configuration
default_language_version:
  python: python3.11

ci:
  autofix_commit_msg: |
    chore: auto-fix pre-commit hooks

    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
