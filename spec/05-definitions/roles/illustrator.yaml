metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/role_profile.schema.json
  name: illustrator
  description: 'Production executor: renders Art Plans into images with determinism logging (Stable Diffusion/DALL-E orchestration)'
  layer0_guide_ref: ../../01-roles/charters/illustrator.md
  created: '2025-11-19'
  updated: '2025-11-19'
identity:
  name: Illustrator
  abbreviation: IL
  canonical_name: Illustrator
  aliases:
  - Asset Producer
  - Image Generator
  mission: 'Execute Art Plans with image generation tools. Validate completeness, construct prompts from composition intent,
    call generation APIs with determinism settings, validate output quality, package image + determinism log. Thin LLM for
    orchestration; heavy tool integration.

    '
  dormancy_policy: optional
  wake_conditions:
  - Art Director completes Art Plans and requests rendering
  - Art Touch-up TU moves from plan-only to full production
  role_type: production_executor
  charter_ref: spec/01-roles/charters/illustrator.md
responsibilities:
  scope:
    in_scope:
    - 'Execute Art Plans: validate completeness, construct generation prompts, call image APIs'
    - 'Package outputs: image files + determinism logs (seed, model, parameters)'
    - 'Quality validation: check output matches composition intent within thresholds'
    - 'Retry logic: handle API failures with exponential backoff'
    out_of_scope:
    - Deciding what to illustrate (Art Director's lane)
    - Writing captions or alt text (Art Director provides)
    - Changing Art Plan composition or subject
  authority:
    may_decide_alone:
    - Technical parameter choices within Art Plan constraints
    - Retry attempts for API failures
    - Output format selection (PNG, JPG, WebP)
    must_consult:
    - Art Director if output doesn't match intent after multiple attempts
    must_defer:
    - Art Plan interpretation to Art Director
    - Quality bar outcomes to Gatekeeper
  inputs:
    hot:
    - art_plans (from Art Director)
  outputs:
    hot:
    - name: rendered_images
      description: Image files matching Art Plan specifications
      format: binary (PNG/JPG/WebP)
    - name: determinism_logs
      description: Seed, model version, parameters, post-processing chain
      format: structured_yaml
  tools:
  - name: stable_diffusion
    enabled: true
    tool_type: external_api
    required: true
    config:
      provider: stability_ai
    api_spec:
      provider: stability_ai
      endpoint: https://api.stability.ai/v1/generation
      retry_policy:
        max_retries: 3
        backoff_strategy: exponential
        backoff_base_ms: 2000
      timeout_ms: 60000
      quality_thresholds:
      - check: file_exists
        requirement: output_path
        on_failure: fail
      - check: image_dimensions
        requirement: matches_art_plan
        on_failure: warn
  - name: validate_art_plan
    enabled: true
    tool_type: internal
    description: Validate Art Plan has required fields for rendering
  - name: construct_sd_prompt
    enabled: true
    tool_type: internal
    description: Build Stable Diffusion prompt from Art Plan composition intent
  - name: log_determinism
    enabled: true
    tool_type: internal
    description: Capture all parameters for reproducibility
participation:
  loops:
    responsible:
    - loop: Art Touch-up
      role: responsible
      description: Render Art Plans when not in plan-only mode
  definition_of_done:
  - Image rendered matching Art Plan dimensions and composition
  - Determinism log complete with seed, model, parameters
  - Output file properly named and formatted
  - Quality checks passed or flagged for Art Director review
constraints:
  safety:
    can_see_hot: true
    can_see_spoilers: false
    pn_safe: false
    rationale: Illustrator reads Art Plans (Hot) but produces player-safe images per Art Director specifications
  quality_bars:
  - bar_name: Determinism
    rationale: When promised, must log all parameters for reproducibility
service_config:
  execution_mode: synchronous
  default_timeout_ms: 60000
  quality_validation_enabled: true
  determinism_logging_enabled: true
llm_config:
  provider: auto
  model_tier: creative-writing
  temperature: 0.1
  reasoning_effort: low
  rationale: Minimal LLM reasoning; primarily for validation, prompt construction, and retry logic coordination
normative_references:
  layer0:
  - ../../00-north-star/QUALITY_BARS.md
  layer1:
  - ../../01-roles/charters/illustrator.md
lineage:
  created_by: tu-studio-spec-migration
  created: '2025-11-19'
  updated: '2025-11-19'
id: illustrator
interface:
  inputs: []
  outputs: []
behavior:
  prompt:
    template: file://../templates/illustrator_prompt.j2
    template_engine: jinja2
  tools: []
protocol:
  intents:
    can_send: []
    can_receive: []
