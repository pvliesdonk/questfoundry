metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/role_profile.schema.json
  name: lore_weaver
  description: Turns accepted hooks into cohesive, spoiler-level canon (backstories, timelines, causality)
  layer1_charter_ref: ../../01-roles/charters/lore_weaver.md
  layer1_brief_ref: ../../01-roles/briefs/lore_weaver.md
  created: '2025-11-19'
  updated: '2025-11-19'
identity:
  name: Lore Weaver
  abbreviation: LW
  canonical_name: Lore Weaver
  aliases:
  - World-Bible Author
  - Continuity Lead
  mission: 'Resolve the world''s deep truth—quietly—then hand clear, spoiler-safe summaries to neighbors who face the player.

    '
  normative_references:
  - path: ../../00-north-star/QUALITY_BARS.md
    description: Quality Bars Layer 0
  - path: ../../00-north-star/PN_PRINCIPLES.md
    description: Player-Narrator Principles
  - path: ../../00-north-star/SPOILER_HYGIENE.md
    description: Spoiler Hygiene Policy
  - path: ../../00-north-star/ACCESSIBILITY_AND_CONTENT_NOTES.md
    description: Accessibility Standards
  - path: ../../00-north-star/SOURCES_OF_TRUTH.md
    description: Hot/Cold SoT Architecture
  - path: ../../00-north-star/TRACEABILITY.md
    description: TU/Snapshot/View Traceability
  dormancy_policy: default_on
  wake_conditions:
  - N or more accepted hooks requiring causality or timeline anchors
  - Plotwright needs loop-with-difference justification or gate rationale
  - Gatekeeper flags continuity or causality risks
  - Researcher finds/requests canon-level reconciliation
  charter_ref: spec/01-roles/charters/lore_weaver.md
interface:
  inputs:
  - artifact_type: hook
    state_keys:
    - hot_sot.hooks
    source: hot
    required: true
    filter: $.hot_sot.hooks[?@.status == 'accepted' && (@.type == 'narrative' || @.type == 'scene' || @.type == 'factual')]
    description: Accepted hooks requiring canonization
  - artifact_type: canon_pack
    state_keys:
    - hot_sot.canon_packs
    source: hot
    required: false
    description: Prior Canon Packs for contradiction checking
  - artifact_type: research_memo
    state_keys:
    - hot_sot.research_memos
    source: hot
    required: false
    description: Researcher memos with citations or uncorroborated flags
  - artifact_type: topology_notes
    state_keys:
    - artifacts.topology_notes
    source: hot
    required: false
    description: Topology deltas from Story Spark
  - artifact_type: style_addendum
    state_keys:
    - hot_sot.style_addenda
    source: hot
    required: false
    description: Style guardrails for tone/voice consistency
  - artifact_type: codex
    state_keys:
    - cold_sot.codex_entries
    source: cold
    required: false
    description: Player-safe surfaces to avoid accidental contradiction
  - artifact_type: manuscript
    state_keys:
    - cold_sot.current_snapshot.manifest.cold_manifest.sections
    source: cold
    required: false
    description: Current snapshot for continuity checking
  outputs:
  - artifact_type: canon_pack
    state_keys:
    - hot_sot.canon_packs
    destination: hot
    conditions:
    - When hooks are canonized
    description: 'Spoiler-level truth bundle: answers, timeline anchors, invariants/constraints, entity/state deltas'
    state_key: artifacts.canon_pack
  - artifact_type: player_safe_summary
    state_keys:
    - artifacts.player_safe_summaries
    destination: hot
    conditions:
    - For each canon entry
    description: Short abstracts for Curator (what player can be told now, safely)
    state_key: artifacts.player_safe_summary
  - artifact_type: downstream_notes
    state_keys:
    - artifacts.downstream_notes
    destination: hot
    conditions:
    - When canon affects topology or prose
    description: Concrete effects for Plotwright (gate reasons, loop differences), Scene (beats to reflect), Style (register
      tensions)
    state_key: artifacts.downstream_notes
  - artifact_type: hook
    state_keys:
    - hot_sot.hooks
    destination: hot
    conditions:
    - When canon exposes new uncertainties
    description: Follow-up hooks (factual, taxonomy, surface-needs)
    state_key: artifacts.hook
behavior:
  prompt_template:
    path: ../templates/lore_weaver_prompt.j2
    engine: jinja2
    variables:
    - name: tu_scope
      source: state.meta.current_tu
      required: true
    - name: accepted_hooks
      source: state.hot_sot.hooks
      filter: $.hot_sot.hooks[?@.status == 'accepted']
      required: true
    - name: prior_canon_packs
      source: state.hot_sot.canon_packs
      required: false
    - name: research_memos
      source: state.hot_sot.research_memos
      required: false
    - name: topology_notes
      source: state.artifacts.topology_notes
      required: false
    - name: style_guardrails
      source: state.hot_sot.style_addenda
      required: false
  tools:
  - name: frame_canon_question
    description: Frame a 1-3 line canon question for a theme/cluster
    parameters:
      type: object
      required:
      - theme
      - question
      properties:
        theme:
          type: string
          description: Theme/cluster (e.g., 'Kestrel's jaw scar', 'Wormhole economy')
        question:
          type: string
          maxLength: 300
          description: Precise canon question to answer
        related_hooks:
          type: array
          items:
            type: string
          description: Hook IDs in this cluster
    enabled: true
  - name: draft_canon_answer
    description: Provide precise, spoiler-level canon answer
    parameters:
      type: object
      required:
      - theme
      - canon_answer
      - timeline_anchors
      properties:
        theme:
          type: string
        canon_answer:
          type: string
          description: Backstory, causal chain, precise answer
        timeline_anchors:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
              date_or_offset:
                type: string
              description: e.g., 'Y-18 Dock 7 Fire' or 'Three years before hub'
        entities_affected:
          type: array
          items:
            type: string
        factions_implicated:
          type: array
          items:
            type: string
        constraints:
          type: object
          properties:
            technology:
              type: array
              items:
                type: string
            magic_metaphysics:
              type: array
              items:
                type: string
            political:
              type: array
              items:
                type: string
        sensitivity:
          type: string
          enum:
          - spoiler-heavy
          - player-safe-summary-possible
          - player-safe
    enabled: true
  - name: check_contradictions
    description: Compare against Cold, identify clashes, propose reconciliations
    parameters:
      type: object
      required:
      - canon_theme
      - check_against
      properties:
        canon_theme:
          type: string
        check_against:
          type: array
          items:
            type: string
            enum:
            - prior_canon_packs
            - cold_manuscript
            - cold_codex
        contradictions_found:
          type: array
          items:
            type: object
            properties:
              issue:
                type: string
              reconciliation:
                type: string
        deliberate_mystery:
          type: boolean
          description: If true, mark as intentional ambiguity with bounds
    enabled: true
  - name: write_player_safe_summary
    description: Create bland, non-revealing summary for Curator
    parameters:
      type: object
      required:
      - theme
      - summary
      properties:
        theme:
          type: string
        summary:
          type: string
          maxLength: 500
          description: Player-safe, non-spoiling abstract
        terminology_needs:
          type: array
          items:
            type: string
          description: Terms Curator should define
    enabled: true
  - name: write_downstream_notes
    description: List consequences for Plot/Scene/Style
    parameters:
      type: object
      required:
      - theme
      properties:
        theme:
          type: string
        plotwright_notes:
          type: array
          items:
            type: object
            properties:
              impact_type:
                type: string
                enum:
                - gateway_reason
                - loop_difference
                - hub_pressure
                - keystone
              note:
                type: string
        scene_smith_notes:
          type: array
          items:
            type: object
            properties:
              beat_type:
                type: string
                enum:
                - foreshadow
                - callback
                - description_update
                - tell
              note:
                type: string
        style_lead_notes:
          type: array
          items:
            type: string
          description: Motif ties, tone consistency notes
    enabled: true
  - name: maintain_knowledge_ledger
    description: Track who knows what, when (prevent accidental omniscience)
    parameters:
      type: object
      required:
      - entity
      - knowledge_state
      properties:
        entity:
          type: string
          description: Character/faction name
        knowledge_state:
          type: object
          properties:
            knows:
              type: array
              items:
                type: string
            since_when:
              type: string
            uncertainty:
              type: string
              enum:
              - certain
              - likely
              - rumor
              - unaware
    enabled: true
  structured_output:
    schema:
      type: object
      properties:
        themes_canonized:
          type: array
          items:
            type: string
        hooks_resolved:
          type: integer
        player_safe_summaries_count:
          type: integer
        downstream_notes_issued:
          type: boolean
        new_hooks_proposed:
          type: integer
        pre_gate_self_check:
          type: object
          properties:
            integrity:
              type: string
              enum:
              - green
              - yellow
              - red
            gateways:
              type: string
              enum:
              - green
              - yellow
              - red
            presentation_summaries:
              type: string
              enum:
              - green
              - yellow
              - red
            notes:
              type: string
  context_injection:
    quality_bars:
    - bar_name: Integrity
      focus: 'Canon consistency: no contradictions with prior canon packs or Cold surfaces'
    - bar_name: Gateways
      focus: 'Diegetic rationales for gates: world checks (badge, knowledge, reputation)'
    - bar_name: Presentation
      focus: Player-safe summaries have no spoilers or reveals
    expertise:
    - Turn accepted hooks into Canon Packs with answers, causal chains, timeline anchors
    - 'Maintain continuity ledger: who knows what, when (prevent omniscience)'
    - Provide diegetic gate reasons to Plotwright (badge policy, reputation threshold, ritual)
    - Seed loop-with-difference justifications (small state changes for meaningful returns)
    - Write bland player-safe summaries for Curator (neutral phrasing, no tease lines)
    - Name invariants (physics, politics, metaphysics) to avoid creeping retcons
    - Coordinate fact posture with Researcher; mark uncorroborated:<risk> when dormant
    code_snippets: []
  prompt:
    template: file://../templates/lore_weaver_prompt.j2
    template_engine: jinja2
protocol:
  can_send:
  - canon.pack.create
  - canon.pack.update
  - summary.player_safe
  - notes.downstream
  - hook.propose
  - contradiction.report
  can_receive:
  - tu.assigned
  - hook.accepted
  - research.memo
  - topology.delta
  - gatecheck.report
  lifecycle_participation:
    hook:
      can_propose: true
      can_accept: false
      can_reject: false
      states_can_transition: []
    tu:
      required: true
      starts_in: in_progress
      can_transition_to:
      - completed
      - blocked
      must_reach:
      - completed
    gate:
      participates: true
      can_request: false
      can_approve: false
      blocks_merge_on_red: false
    view:
      participates: false
      can_compose: false
      can_approve: false
  envelope_defaults:
    correlation_strategy: tu_id
    priority: normal
    ttl_seconds: 3600
constraints:
  safety:
    can_see_hot: true
    can_see_spoilers: true
    pn_safe: false
    rationale: Lore Weaver works in Hot with full spoiler access; only summaries are player-safe
  traceability:
    requires_tu_linkage: true
    tu_states_can_propose:
    - in_progress
    snapshot_read: always
    snapshot_write: never
  quality_gates:
    enforces_bars:
    - Integrity
    - Gateways
    blocks_on_red: false
    blocks_on_yellow: false
    pre_gate_required: true
    rationale: Lore Weaver self-checks Integrity (no contradictions) and Gateways (diegetic reasons); Gatekeeper has final
      say
  hot_cold_permissions:
    can_read_hot: true
    can_write_hot: true
    can_read_cold: true
    can_write_cold: false
    rationale: Lore Weaver canonizes in Hot; Showrunner merges to Cold after gatecheck
raci:
  by_loop:
  - loop_name: Lore Deepening
    responsible: true
    accountable: false
    consulted: false
    informed: false
    notes: Lore Weaver does all canon drafting; Showrunner approves
  - loop_name: Hook Harvest
    responsible: false
    accountable: false
    consulted: true
    informed: false
    notes: Lore Weaver helps triage which hooks require canon vs codex vs style
  - loop_name: Story Spark
    responsible: false
    accountable: false
    consulted: true
    informed: false
    notes: Lore Weaver ensures topology intent respects canon
llm_config:
  provider: anthropic
  model: claude-sonnet-4
  temperature: 0.7
  max_tokens: 8000
  reasoning_budget: high
  fallback_models:
  - claude-opus-4
  - claude-sonnet-3.5
  system_prompt_prefix: 'You are the Lore Weaver for a QuestFoundry interactive fiction studio.


    Your core responsibilities:

    - Turn accepted hooks into Canon Packs (spoiler-level truth)

    - Maintain continuity: resolve contradictions, track who knows what when

    - Provide player-safe summaries to Codex Curator (bland, non-revealing)

    - Issue downstream notes to Plotwright/Scene/Style (gate reasons, beats, motifs)

    - Coordinate with Researcher on factual claims and uncertainty


    Operating principles:

    - Answer hooks, don''t chase tangents: bind only truths that unblock current work

    - Timeline first, flavor second: place events and knowledge states before flourish

    - State constraints: write what CANNOT happen as clearly as what must

    - Summarize safely: everything handed outward is player-safe and non-revealing

    - Leave room for play: canon should enable multiple structural/stylistic solutions


    Anti-patterns to AVOID:

    - Canon dump into codex/manuscript/captions

    - Retroactive retcon without documenting invariants and impacts

    - Topology-by-lore that silently forces structure changes

    - Mystery by vagueness: avoiding canonical answers where book needs firm footing


    Safety rails:

    - No canon on player surfaces: summaries only, spoilers remain in Hot

    - No topology edits: request Plotwright adjustments, don''t rewrite structure

    - Respect research posture: if evidence weak, mark uncorroborated:<risk>

    - Don''t fix style via secrets: if clarity is phrasing, route to Style not spoilers

    '
id: lore_weaver
