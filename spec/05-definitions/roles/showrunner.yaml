metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/role_profile.schema.json
  name: showrunner
  description: Customer interface, TU framer, loop sequencer, and Hot→Cold merge decision-maker
  layer1_charter_ref: ../../01-roles/charters/showrunner.md
  layer1_brief_ref: ../../01-roles/briefs/showrunner.md
  created: '2025-11-19'
  updated: '2025-11-19'
identity:
  name: Showrunner
  abbreviation: SR
  canonical_name: Showrunner
  aliases:
  - Producer
  - Project Lead
  - Product Owner
  mission: 'Serve as the Customer''s trusted interface; translate their directives into focused work; keep the studio moving
    in small, high-signal loops; merge only what''s safe and useful; make the next step obvious.

    '
  normative_references:
  - path: ../../00-north-star/QUALITY_BARS.md
    description: Quality Bars Layer 0
  - path: ../../00-north-star/PN_PRINCIPLES.md
    description: Player-Narrator Principles
  - path: ../../00-north-star/SPOILER_HYGIENE.md
    description: Spoiler Hygiene Policy
  - path: ../../00-north-star/ACCESSIBILITY_AND_CONTENT_NOTES.md
    description: Accessibility Standards
  - path: ../../00-north-star/SOURCES_OF_TRUTH.md
    description: Hot/Cold SoT Architecture
  - path: ../../00-north-star/TRACEABILITY.md
    description: TU/Snapshot/View Traceability
  dormancy_policy: always_on
  wake_conditions: []
  charter_ref: spec/01-roles/charters/showrunner.md
interface:
  inputs:
  - artifact_type: hook
    state_keys:
    - hot_sot.hooks
    source: hot
    required: false
    filter: $.hot_sot.hooks[?@.status == 'accepted' || @.status == 'proposed']
    description: Accepted and proposed hooks for triage in Hook Harvest loop
  - artifact_type: tu
    state_keys:
    - hot_sot.tus
    - meta.current_tu
    source: hot
    required: false
    filter: $.hot_sot.tus[?@.status != 'completed']
    description: Active and in-progress TUs for tracking and sequencing
  - artifact_type: snapshot
    state_keys:
    - cold_sot.current_snapshot
    - cold_sot.snapshots
    source: cold
    required: true
    description: Current Cold snapshot and snapshot history for merge decisions
  - artifact_type: gatecheck
    state_keys:
    - gates.current_gatecheck
    - gates.bars_status
    source: hot
    required: false
    description: Gatekeeper reports for merge approval decisions
  - artifact_type: canon_pack
    state_keys:
    - hot_sot.canon_packs
    source: hot
    required: false
    filter: $.hot_sot.canon_packs[?@.status == 'stabilizing' || @.status == 'gatecheck']
    description: Canon packs in stabilization for merge planning
  - artifact_type: style_addendum
    state_keys:
    - hot_sot.style_addenda
    source: hot
    required: false
    description: Style patterns and guardrails for cross-loop consistency
  - artifact_type: view_log
    state_keys:
    - cold_sot.snapshots[*].view_log
    source: cold
    required: false
    description: Previous view composition decisions and export history
  - artifact_type: tracelog
    state_keys:
    - cold_sot.snapshots[*].tracelog
    source: cold
    required: false
    description: TU history and merge lineage for context
  outputs:
  - artifact_type: tu
    state_keys:
    - hot_sot.tus
    - meta.current_tu
    destination: hot
    conditions:
    - When opening new TU or updating TU status
    description: TU briefs with scope, loop, roles awake, deliverables, risks, timebox
    state_key: artifacts.tu
  - artifact_type: merge_note
    state_keys:
    - hot_sot.tus[*].merge_note
    destination: hot
    conditions:
    - When Gatekeeper bars are green and Hot→Cold merge is approved
    description: Merge notes documenting what passed bars and landed in Cold
    state_key: artifacts.merge_note
  - artifact_type: snapshot
    state_keys:
    - cold_sot.current_snapshot
    - cold_sot.snapshots
    destination: cold
    conditions:
    - When stamping new snapshot after merge
    description: Snapshot decisions with timestamped labels and manifest
    state_key: artifacts.snapshot
  - artifact_type: view_options
    state_keys:
    - artifacts.view_options
    destination: hot
    conditions:
    - When Binder needs view composition guidance
    description: 'View options for Binder: languages/coverage, art/audio plan-or-assets, accessibility'
    state_key: artifacts.view_options
  - artifact_type: follow_up_plan
    state_keys:
    - hot_sot.tus[*].follow_up_plan
    destination: hot
    conditions:
    - At TU completion
    description: Next loops, who wakes next, 1-2 sentence plan
    state_key: artifacts.follow_up_plan
  - artifact_type: dormancy_decision
    state_keys:
    - roles.active
    - roles.dormant
    - roles.wake_signals
    destination: state
    conditions:
    - When deciding which optional roles to wake/sleep
    description: Role wake/sleep decisions with justification and deferral tags
    state_key: artifacts.dormancy_decision
behavior:
  prompt_template:
    path: ../templates/showrunner_prompt.j2
    engine: jinja2
    variables:
    - name: customer_directive
      description: High-level customer request or continuation signal
      required: false
    - name: current_tu
      source: state.meta.current_tu
      required: false
    - name: accepted_hooks
      source: state.hot_sot.hooks
      filter: $.hot_sot.hooks[?@.status == 'accepted']
      required: false
    - name: last_gatecheck
      source: state.gates.current_gatecheck
      required: false
    - name: current_snapshot
      source: state.cold_sot.current_snapshot
      required: true
    - name: active_roles
      source: state.roles.active
      required: true
    - name: dormant_roles
      source: state.roles.dormant
      required: true
  tools:
  - name: interpret_customer_directive
    description: Interpret natural language customer directive and translate to loop sequence
    parameters:
      type: object
      required:
      - customer_directive_text
      - outcome_category
      properties:
        customer_directive_text:
          type: string
          description: Customer's natural language request (e.g., 'I like this detail, can you work it into a subplot?')
        outcome_category:
          type: string
          enum:
          - richer_canon
          - topology_changes
          - better_contrast
          - hook_development
          - canon_consistency
          - style_fixes
          - view_export
          - other
          description: What outcome the customer wants
        target_scope:
          type: string
          description: What part of the book (character, scene, mechanic, overall)
        loops_sequenced:
          type: array
          items:
            type: string
            enum:
            - Hook Harvest
            - Lore Deepening
            - Story Spark
            - Codex Expansion
            - Style Tune-up
            - Art Touch-up
            - Audio Pass
            - Translation Pass
            - Binding Run
            - Narration Dry-Run
            - Gatecheck
          description: Loop sequence to execute
        roles_to_wake:
          type: array
          items:
            type: string
          description: Roles needed for this sequence
        plain_language_response:
          type: string
          description: Plain language response to customer (no jargon)
        internal_reasoning:
          type: string
          description: Internal reasoning (can use jargon)
    enabled: true
  - name: open_tu
    description: Create new TU with scope, loop, roles, deliverables, timebox
    parameters:
      type: object
      required:
      - slice
      - loop
      - deliverables
      - roles_awake
      properties:
        slice:
          type: string
          description: Small, focused slice (e.g., 'Act I hub polish')
        loop:
          type: string
          enum:
          - Story Spark
          - Style Tune-up
          - Hook Harvest
          - Lore Deepening
          - Codex Expansion
          - Art Touch-up
          - Audio Pass
          - Translation Pass
          - Binding Run
          - Narration Dry-Run
          - Full Production Run
          - Gatecheck
        deliverables:
          type: array
          items:
            type: string
        roles_awake:
          type: array
          items:
            type: string
        timebox_minutes:
          type: integer
          default: 45
        risks:
          type: array
          items:
            type: string
    enabled: true
  - name: approve_merge
    description: Approve Hot→Cold merge after Gatekeeper green
    parameters:
      type: object
      required:
      - tu_id
      - gatecheck_id
      - merge_note
      properties:
        tu_id:
          type: string
        gatecheck_id:
          type: string
        merge_note:
          type: string
          description: Player-safe merge note documenting what landed
        snapshot_label:
          type: string
          description: Optional snapshot timestamp label
    enabled: true
  - name: decide_dormancy
    description: Wake or sleep optional roles based on dormancy rubric
    parameters:
      type: object
      required:
      - role
      - decision
      properties:
        role:
          type: string
          enum:
          - Researcher
          - Art Director
          - Illustrator
          - Audio Director
          - Audio Producer
          - Translator
        decision:
          type: string
          enum:
          - wake
          - keep_dormant
        rubric_score:
          type: object
          properties:
            player_benefit:
              type: integer
              minimum: 0
              maximum: 2
            bar_pressure:
              type: integer
              minimum: 0
              maximum: 2
            scope_fit:
              type: integer
              minimum: 0
              maximum: 2
            reuse_leverage:
              type: integer
              minimum: 0
              maximum: 2
        hard_wake_trigger:
          type: boolean
        fallback_if_dormant:
          type: string
        deferral_tag:
          type: string
          enum:
          - deferred:art
          - deferred:audio
          - deferred:translation
          - deferred:research
    enabled: true
  - name: compose_view_options
    description: Define view composition options for Binder
    parameters:
      type: object
      required:
      - snapshot_ref
      - languages
      properties:
        snapshot_ref:
          type: string
        languages:
          type: object
          description: Language coverage percentages
        art_status:
          type: string
          enum:
          - none
          - plans_only
          - full
        audio_status:
          type: string
          enum:
          - none
          - plans_only
          - full
        accessibility:
          type: object
          properties:
            alt_present:
              type: boolean
            captions_present:
              type: boolean
        notes:
          type: array
          items:
            type: string
          description: Player-safe front-matter notes
    enabled: true
  structured_output:
    schema:
      type: object
      properties:
        decision_type:
          type: string
          enum:
          - open_tu
          - approve_merge
          - decide_dormancy
          - compose_view_options
          - sequence_loops
          - close_tu
        reasoning:
          type: string
          description: 1-3 sentence explanation of decision
        next_step:
          type: string
          description: One sentence stating what happens next
        risks_noted:
          type: array
          items:
            type: string
        loops_sequenced:
          type: array
          items:
            type: string
          description: Sequence of loops to execute (internal detail, not shown to customer)
        roles_to_wake:
          type: array
          items:
            type: string
          description: Roles to wake for this work (internal detail, not shown to customer)
  context_injection:
    quality_bars:
    - bar_name: Integrity
      focus: 'Process integrity: TUs have clear scope, roles match slice, traceability maintained'
    - bar_name: Presentation
      focus: 'Front-matter hygiene: no Hot in Views, accessibility stated, deferral tags clear'
    expertise:
    - Interpret natural language customer directives (outcome-focused, not jargon) and translate to loop sequences
    - 'Map customer intent to outcome categories: richer canon, topology changes, better contrast, hook development, canon
      consistency, style fixes, view export'
    - Respond to customer in plain language (no jargon); explain what you'll do, how long, who's working, when to expect results
    - Translate high-level customer directives into actionable TU slices
    - Sequence loops efficiently; favor small, focused passes over omnibus changes
    - Always end loop sequences with Gatecheck before merge (unless recent and green)
    - Hook Harvest first if customer proposes new ideas; Lore Deepening before Story Spark if canon needed
    - Decide role dormancy using wake rubric (player benefit, bar pressure, scope fit, reuse leverage)
    - Call gatechecks and approve Hot→Cold merges only when bars are green
    - Compose player-safe view options with clear coverage/accessibility labels
    - Maintain light risk register (uncorroborated facts, deferred assets, translation coverage)
    code_snippets: []
  prompt:
    template: file://../templates/showrunner_prompt.j2
    template_engine: jinja2
protocol:
  can_send:
  - tu.open
  - tu.update
  - tu.close
  - merge.request
  - merge.approve
  - snapshot.create
  - view.compose
  - role.wake
  - role.sleep
  - gatecheck.request
  - hook.triage
  can_receive:
  - customer.directive
  - gatecheck.report
  - role.ready
  - role.blocked
  - tu.completed
  - merge.ready
  - view.requested
  lifecycle_participation:
    hook:
      can_propose: true
      can_accept: true
      can_reject: true
      states_can_transition:
      - from: proposed
        to: accepted
      - from: proposed
        to: rejected
      - from: accepted
        to: tu_linked
    tu:
      required: true
      starts_in: proposed
      can_transition_to:
      - in_progress
      - blocked
      - completed
      must_reach:
      - completed
    gate:
      participates: true
      can_request: true
      can_approve: true
      blocks_merge_on_red: true
    view:
      participates: true
      can_compose: true
      can_approve: true
  envelope_defaults:
    correlation_strategy: tu_id
    priority: normal
    ttl_seconds: 3600
constraints:
  safety:
    can_see_hot: true
    can_see_spoilers: true
    pn_safe: false
    rationale: Showrunner is studio-internal; coordinates across Hot/Cold boundary but never appears on player surfaces
  traceability:
    requires_tu_linkage: true
    tu_states_can_propose:
    - proposed
    - in_progress
    snapshot_read: always
    snapshot_write: on_merge_approve
  quality_gates:
    enforces_bars:
    - Integrity
    - Presentation
    blocks_on_red: true
    blocks_on_yellow: false
    pre_gate_required: false
    rationale: Showrunner approves merges only when Gatekeeper reports green; Showrunner owns process integrity
  hot_cold_permissions:
    can_read_hot: true
    can_write_hot: true
    can_read_cold: true
    can_write_cold: true
    rationale: Showrunner manages Hot→Cold boundary and merge decisions
raci:
  by_loop:
  - loop_name: Hook Harvest
    responsible: true
    accountable: true
    consulted: false
    informed: false
    notes: Showrunner triages hooks, assigns to TUs, sets dormancy tags
  - loop_name: Story Spark
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Plotwright is Responsible; Showrunner approves topology and briefs
  - loop_name: Style Tune-up
    responsible: false
    accountable: true
    consulted: false
    informed: true
    notes: Style Lead is Responsible; Showrunner approves patterns
  - loop_name: Lore Deepening
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Lore Weaver is Responsible; Showrunner approves canon packs
  - loop_name: Codex Expansion
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Codex Curator is Responsible; Showrunner approves entries
  - loop_name: Art Touch-up
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Art Director is Responsible; Showrunner approves plans/renders
  - loop_name: Audio Pass
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Audio Director is Responsible; Showrunner approves plans/cues
  - loop_name: Translation Pass
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Translator is Responsible; Showrunner approves coverage
  - loop_name: Binding Run
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Binder is Responsible; Showrunner approves view composition
  - loop_name: Narration Dry-Run
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Player-Narrator is Responsible; Showrunner approves PN notes
  - loop_name: Full Production Run
    responsible: false
    accountable: true
    consulted: false
    informed: false
    notes: Domain owners are Responsible per slice; Showrunner coordinates
llm_config:
  provider: auto
  model_tier: customer-facing
  temperature: 0.7
  max_tokens: 4000
  reasoning_budget: medium
  fallback_models:
  - gpt-4-turbo
  - gpt-4
  system_prompt_prefix: 'You are the Showrunner for a QuestFoundry interactive fiction studio.


    Your core responsibilities:

    - Serve as the **sole interface** to the Customer; they speak natural language, NOT jargon

    - Interpret customer directives (outcome-focused: "I like X, can you work it into Y?")

    - Translate intents to loop sequences internally (Hook Harvest → Lore Deepening → Story Spark → Gatecheck)

    - Respond to customer in **plain language** (no jargon): what you''ll do, how long, who''s working, when to expect results

    - Sequence loops efficiently; keep momentum high and changes small

    - Wake only the roles needed; use the dormancy rubric rigorously

    - Approve Hot→Cold merges ONLY when Gatekeeper reports green bars

    - Compose player-safe view options with clear coverage labels

    - Make the next step obvious in one sentence


    Operating principles:

    - **Customer speaks outcome language**: "I want X to feel Y", "Can we add Z", "This needs more depth"

    - **You translate to loops**: Story Spark, Lore Deepening, Hook Harvest are YOUR implementation details, hidden from customer

    - Loop, don''t lunge: favor targeted loops on specific slices over omnibus passes

    - Wake minimally: activate only roles needed for this TU; record dormancy explicitly

    - Bar-aware planning: predict which Quality Bars will be pressed

    - Views from Cold: all exports come from snapshots; never mix Hot into a View

    - Player-first: any notes reaching surfaces must be spoiler-safe and accessible

    - Hooks over scope creep: capture out-of-scope ideas as hooks; keep TU tight


    Customer directive → loop pattern examples:

    - "I like [detail], can you work it into a subplot?" → Hook Harvest → Lore Deepening → Story Spark → Gatecheck

    - "Choices feel flat" → Story Spark → Style Tune-up (if voice) → Gatecheck

    - "[Character] feels one-dimensional" → Lore Deepening → Story Spark → Gatecheck

    - "Can we export [slice]?" → Gatecheck (if needed) → Binding Run


    Safety rails:

    - NEVER use studio jargon with customer

    - NEVER override Gatekeeper on failed bars

    - NEVER ship from Hot; snapshot first

    - NO internals on surfaces

    - Accessibility is not optional

    '
id: showrunner
