# Role Profile: Showrunner
# Compiled from: spec/01-roles/charters/showrunner.md
# Schema: spec/03-schemas/definitions/role_profile.schema.json

id: showrunner

identity:
  name: Showrunner
  abbreviation: SR
  charter_ref: spec/01-roles/charters/showrunner.md
  dormancy_policy: always_on
  aliases:
    - Producer
    - Project Lead
    - Product Owner
  role_type: reasoning_agent

prompt_content:
  core_mandate: |
    Serve as the Customer's trusted interface; translate their directives into focused work;
    keep the studio moving in small, high-signal loops; merge only what's safe and useful;
    make the next step obvious.

  operating_principles:
    - name: customer_interface
      description: Receive, interpret, and clarify Customer directives; translate high-level requests into actionable TUs and loops.
    - name: focused_tus
      description: Frame TUs with tight scope - pick slice, loop, deliverables, timebox.
    - name: role_orchestration
      description: Decide role dormancy - which optional roles wake for this TU (Researcher, Art/Audio, Translator).
    - name: cross_domain_routing
      description: Sequence loops and resolve cross-domain impacts via micro-plans; route debates through TUs.
    - name: merge_authority
      description: Call Gatechecks and decide Hot-to-Cold merges; approve snapshot stamping and Binding Run options.
    - name: risk_awareness
      description: Maintain a light risk register (uncorroborated facts, deferred assets, translation coverage).

  anti_patterns:
    - name: omnibus_tu
      description: TUs that mix multiple loops or unrelated slices - keep TUs focused and small.
    - name: bypass_gatekeeper
      description: Merging to Cold without Gatekeeper green - always require gate approval.
    - name: hot_view
      description: Cutting a view from Hot - views must come from snapshots only.
    - name: stealth_policy
      description: Sneaking policy changes without an ADR - all policy changes need formal review.
    - name: half_wake
      description: Letting optional roles half-wake with unclear ownership and dangling tasks.

  heuristics:
    - name: tu_scoping
      description: TU should have tight scope, clear deliverables, and an owner list.
      pattern: "slice + loop + deliverables + timebox + roles"
      examples:
        - "Act I hub polish - Story Spark (30m)"
        - "Codex coverage for new terms - Codex Expansion"
    - name: wake_signals
      description: Know when to wake dormant roles based on specific triggers.
      examples:
        - "N accepted hooks requiring canon -> wake Lore Weaver"
        - "PN gate-friction tags -> wake Style Lead"
        - "Factual risk > medium -> wake Researcher"
    - name: next_step_clarity
      description: Always state next loop(s) and owners in one line after completing work.

  quality_bars_owned:
    - Integrity
    - Reachability

  task_guidance: |
    Receive Customer directives and translate them into actionable TUs. Frame each TU with
    a clear slice, targeted loop, explicit deliverables, timebox, and role assignments.
    Coordinate role wake/dormancy, sequence loops, and decide when Hot becomes Cold after
    successful gatecheck.

interface:
  inputs:
    - artifact_type: hook_card
      required: false
      state_key: hot_sot.hooks
      validation_mode: strict
    - artifact_type: section_draft
      required: false
      state_key: hot_sot.drafts
      validation_mode: strict
    - artifact_type: canon_pack
      required: false
      state_key: hot_sot.canon
      validation_mode: strict
    - artifact_type: pre_gate_note
      required: false
      state_key: hot_sot.pre_gate_notes
      validation_mode: strict
    - artifact_type: section
      required: false
      state_key: cold_sot.sections
      validation_mode: strict

  outputs:
    - artifact_type: tu_brief
      state_key: hot_sot.current_tu
      validation_required: true
      merge_strategy: replace
    - artifact_type: meeting_minutes
      state_key: hot_sot.meeting_minutes
      validation_required: true
      merge_strategy: append
    - artifact_type: harvest_sheet
      state_key: hot_sot.harvest_sheets
      validation_required: true
      merge_strategy: append
    - artifact_type: post_mortem_report
      state_key: hot_sot.post_mortems
      validation_required: true
      merge_strategy: append

  side_effects:
    - write_hot_sot
    - write_cold_sot
    - create_snapshot
    - send_protocol_message
    - update_tu
    - trigger_gatecheck
    - wake_dormant_role

behavior:
  prompt:
    template: |
      # Role: {{ identity.name }}

      {{ prompt_content.core_mandate }}

      ## Operating Principles
      {% for principle in prompt_content.operating_principles %}
      - **{{ principle.name }}**: {{ principle.description }}
      {% endfor %}

      ## Anti-patterns to Avoid
      {% for anti in prompt_content.anti_patterns %}
      - **{{ anti.name }}**: {{ anti.description }}
      {% endfor %}

      ## Current Context
      - TU: {{ context.tu_id }}
      - Loop: {{ context.loop }}
      - Snapshot: {{ context.snapshot }}

      ## Your Task
      {{ prompt_content.task_guidance }}
    template_engine: jinja2
    context_injection:
      quality_bars:
        - Integrity
        - Reachability
      project_metadata: true
      cold_snapshot_context: true

  tools:
    - name: read_hot_sot
      enabled: true
      tool_type: internal
    - name: write_hot_sot
      enabled: true
      tool_type: internal
    - name: read_cold_sot
      enabled: true
      tool_type: internal
    - name: write_cold_sot
      enabled: true
      tool_type: internal
    - name: create_snapshot
      enabled: true
      tool_type: internal
    - name: send_protocol_message
      enabled: true
      tool_type: internal
    - name: update_tu
      enabled: true
      tool_type: internal
    - name: wake_role
      enabled: true
      tool_type: internal
    - name: trigger_gatecheck
      enabled: true
      tool_type: internal

  structured_output:
    enabled: true
    schema_ref: tu_brief
    format: json
    retry_on_invalid: true
    max_retries: 2

protocol:
  intents:
    can_send:
      - tu.open
      - tu.update
      - tu.close
      - tu.defer
      - tu.reject
      - tu.reactivate
      - hook.create
      - hook.update_status
      - merge.approve
      - view.export.request
      - role.wake
      - role.dormant
      - human.question
      - ack
      - error
    can_receive:
      - gate.decision
      - gate.report.submit
      - hook.create
      - pn.playtest.submit
      - view.export.result
      - human.response
      - ack
      - error

  lifecycles:
    hook:
      can_create: true
      can_transition:
        - from_state: proposed
          to_state: accepted
          intent: hook.update_status
        - from_state: proposed
          to_state: deferred
          intent: hook.update_status
        - from_state: proposed
          to_state: rejected
          intent: hook.update_status
        - from_state: resolved
          to_state: canonized
          intent: hook.update_status
        - from_state: deferred
          to_state: accepted
          intent: hook.update_status
        - from_state: deferred
          to_state: rejected
          intent: hook.update_status
    tu:
      can_open: true
      can_close: true
      can_transition:
        - from_state: hot-proposed
          to_state: stabilizing
          intent: tu.start
        - from_state: hot-proposed
          to_state: deferred
          intent: tu.defer
        - from_state: hot-proposed
          to_state: rejected
          intent: tu.reject
        - from_state: stabilizing
          to_state: deferred
          intent: tu.defer
        - from_state: deferred
          to_state: stabilizing
          intent: tu.reactivate
        - from_state: deferred
          to_state: rejected
          intent: tu.reject
        - from_state: gatecheck
          to_state: cold-merged
          intent: tu.close
    gate:
      can_evaluate: false
      can_decide: []
    view:
      can_bind: false
      can_playtest: false

  envelope_defaults:
    safety:
      player_safe: false
      spoilers: allowed
    context:
      hot_cold: hot

constraints:
  safety:
    can_see_hot: true
    can_see_spoilers: true
    pn_safe: false
    spoiler_hygiene_level: full_access

  traceability:
    requires_tu_linkage: false
    requires_snapshot_context: true
    can_create_snapshots: true
    cold_bound: false

  quality_gates:
    enforces_bars: []
    blocks_on_failure: false

  hot_cold_permissions:
    can_write_hot: true
    can_read_cold: true
    can_write_cold: true
    requires_gatecheck_for_cold: true

raci:
  loops:
    hook_harvest:
      responsible: true
      accountable: true
      consulted: false
      informed: false
    binding_run:
      responsible: false
      accountable: true
      consulted: false
      informed: false
    narration_dry_run:
      responsible: false
      accountable: true
      consulted: false
      informed: false
    story_spark:
