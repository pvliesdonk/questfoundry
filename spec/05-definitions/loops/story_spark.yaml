metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/loop_pattern.schema.json
  name: story_spark
  description: Reshape or add plot topology (hubs, loops, gateways) and draft sections
  type: Discovery
  layer0_loop_ref: ../../00-north-star/LOOPS/story_spark.md
  created: '2025-11-19'
  updated: '2025-11-19'
  timebox_minutes: 120
topology:
  entry_node: showrunner_initiate
  nodes:
  - id: showrunner_initiate
    role: Showrunner
    description: Open TU, define topology slice, decide role dormancy
    next: plotwright_topology_draft
    role_id: Showrunner
  - id: plotwright_topology_draft
    role: Plotwright
    description: 'Sketch/adjust topology: hubs, loops, gateways, codeword plan'
    config_override:
      prompt_template:
        variables:
        - name: task
          value: 'Draft topology for this slice: hubs (fan-out), loops (return-with-difference), gateways (state-gated)'
    next: plotwright_section_briefs
    role_id: Plotwright
  - id: plotwright_section_briefs
    role: Plotwright
    description: 'Write section briefs: intent, stakes, choices, expected state effects'
    config_override:
      tools:
      - write_section_brief
    next: scene_smith_prose_draft
    role_id: Plotwright
  - id: scene_smith_prose_draft
    role: Scene Smith
    description: Draft/adjust section prose in style with contrastive choices
    config_override:
      tools:
      - draft_section
      - add_micro_context
    next: hook_generation
    role_id: Scene Smith
  - id: hook_generation
    role: Multi
    description: Plotwright & Scene Smith generate hooks (narrative/scene/factual)
    parallel_execution: true
    sub_nodes:
    - role: Plotwright
      task: Create narrative hooks for entities, stakes, affordances
    - role: Scene Smith
      task: Create scene hooks for traits, tells, props
    - role: Researcher
      task: Create factual hooks with citations or uncertainty levels
      condition: researcher_active
    next: consult_style
    role_id: Multi
  - id: consult_style
    role: Style Lead
    description: Sample sections, flag tone drift, propose motif anchors
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Review drafted sections for style consistency, tone drift, motif opportunities
    next: consult_lore
    role_id: Style Lead
  - id: consult_lore
    role: Lore Weaver
    description: Flag canon collisions, suggest where Lore Deepening needed
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Check topology and prose for canon collisions, note where Lore Deepening required
    next: consult_curator
    role_id: Lore Weaver
  - id: consult_curator
    role: Codex Curator
    description: Identify taxonomy/clarity gaps (red-links) created by new structure
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Review sections for undefined terms, identify codex anchor needs
    next: gatekeeper_preview
    role_id: Codex Curator
  - id: gatekeeper_preview
    role: Gatekeeper
    description: 'Run pre-gate: Integrity/Reachability/Nonlinearity sanity check'
    config_override:
      prompt_template:
        variables:
        - name: check_type
          value: pre_gate
        - name: task
          value: 'Quick sanity check: no accidental dead ends, keystones reachable, hubs/loops exist & matter'
      tools:
      - run_integrity_check
      - run_reachability_check
      - run_nonlinearity_check
    next: triage_handoff
    role_id: Gatekeeper
  - id: triage_handoff
    role: Showrunner
    description: Package topology delta, section drafts, hooks for Hook Harvest and follow-up loops
    config_override:
      tools:
      - close_tu
      - notify_handoffs
    next: null
    role_id: Showrunner
  edges:
  - source: showrunner_initiate
    target: plotwright_topology_draft
    type: direct
  - source: plotwright_topology_draft
    target: plotwright_section_briefs
    type: direct
  - source: plotwright_section_briefs
    target: scene_smith_prose_draft
    type: direct
  - source: scene_smith_prose_draft
    target: hook_generation
    type: direct
  - source: hook_generation
    target: consult_style
    type: direct
  - source: consult_style
    target: consult_lore
    type: direct
  - source: consult_lore
    target: consult_curator
    type: direct
  - source: consult_curator
    target: gatekeeper_preview
    type: direct
  - source: gatekeeper_preview
    target: triage_handoff
    type: direct
  exit_conditions:
  - name: success
    condition: state.meta.current_tu.status == 'completed'
  - name: success
    condition: state.execution.iteration_count >= 2
protocol_flow:
  message_sequences:
  - step: 1
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner opens TU and initiates topology work
  - step: 2
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Plotwright drafts topology then writes section briefs
  - step: 3
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Scene Smith drafts prose from Plotwright briefs
  - step: 4
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Style, Lore, Curator provide feedback in sequence
  - step: 5
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Gatekeeper runs pre-gate sanity check
  - step: 6
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner packages deliverables and hands off to Hook Harvest
gates:
  gatecheck_required: false
  quality_bars_checked:
  - bar_name: Integrity
    mode: advisory
    description: Gatekeeper previews for accidental dead ends
  - bar_name: Reachability
    mode: advisory
    description: Keystones remain reachable
  - bar_name: Nonlinearity
    mode: advisory
    description: Hubs/loops exist and matter
  gate_points:
  - node_id: gatekeeper_preview
    type: advisory
    blocking: false
    on_red: log_warning
    on_yellow: log_info
    on_green: continue
    bars_checked:
    - Integrity
    - Style
    - Presentation
  pre_gate_requirements:
    artifacts_complete:
    - Topology draft completed
    - Section briefs written
    - Prose drafted for affected/new sections
    - Hooks generated
traceability:
  tu_lifecycle:
    required: true
    starts_in: hot-proposed
    must_reach: cold-merged
    transitions:
    - from: proposed
      to: in_progress
      trigger: Showrunner opens TU and initiates topology draft
    - from: in_progress
      to: completed
      trigger: Topology delta, section drafts, hooks packaged and TU closed
  produces_cold: false
  produces_hot:
  - artifact_type: topology_notes
    description: 'Updated topology notes: hubs/loops/gateways overview + rationale'
  - artifact_type: section_briefs
    description: Section briefs for affected/new sections
  - artifact_type: manuscript_section
    description: Draft prose for changed/new sections
  - artifact_type: hook
    description: Hook list (narrative/scene/factual) with triage tags
  - artifact_type: style_addendum
    description: Style addendum (if any) and motif notes
  - artifact_type: pre_gate_note
    description: 'Gatekeeper pre-gate note: early findings & risks'
  - artifact_type: tu
    description: Completed TU record
  snapshot_handling:
    requires_snapshot_ref: true
    creates_snapshot: false
roles:
  required:
  - Showrunner
  - Plotwright
  - Scene Smith
  - Gatekeeper
  optional:
  - Style Lead
  - Lore Weaver
  - Codex Curator
  - Researcher
  wake_dormant:
  - role_id: Researcher
    wake_condition: Topology involves real-world constraints or factual claims
    rubric_threshold: 4
    role_id: Researcher
context:
  hot_cold_mode: hot
  required_artifacts:
  - artifact_type: snapshot
    source: cold_sot.current_snapshot
    description: Current Cold snapshot for context
    state_key: artifacts.snapshot
  required_state_keys:
  - meta.current_tu
  - cold_sot.current_snapshot
  - roles.active
  - roles.dormant
  state_initialization:
    artifacts:
      topology_notes: null
      section_briefs: []
      draft_sections: []
      hooks_generated: []
      style_notes: null
      lore_notes: null
      curator_notes: null
      pre_gate_note: null
success_criteria:
  required_artifacts:
  - artifact_type: topology_notes
    location: hot_sot
    validation: Contains hubs/loops/gateways overview
  - artifact_type: section_briefs
    location: hot_sot
    validation: All affected sections have briefs
  - artifact_type: manuscript_section
    location: hot_sot
    validation: Draft prose for affected sections
  - artifact_type: hook
    location: hot_sot
    validation: Hooks generated and ready for triage
  required_state:
  - condition: Topology adds or repairs meaningful nonlinearity
    validation: Gatekeeper pre-gate shows no dead ends
  - condition: Gateways have clear diegetic conditions
    validation: Plotwright briefs include world-check phrasing
  - condition: At least one loop returns with difference
    validation: Topology notes document state/affordance deltas
  - condition: Drafted sections are in-voice and choice-clear
    validation: Style Lead feedback shows no major drift
  - condition: TU status is completed
    validation: state.meta.current_tu.status == 'completed'
  bars_must_be_green: []
  tu_final_state: cold-merged
execution:
  max_iterations: 2
  default_iteration_limit: 2
  iteration_strategy: revision_rounds
  timeout_seconds: 7200
  checkpointing:
    enabled: true
    frequency: per_phase
    save_points:
    - after_plotwright_section_briefs
    - after_scene_smith_prose_draft
    - after_gatekeeper_preview
  error_handling:
    on_node_failure: log_and_continue
    on_timeout: close_with_partial_deliverables
    on_iteration_limit: close_tu_and_file_follow_up_hooks
  human_interaction:
    allowed: true
    trigger_conditions:
    - Topology restructure is overcoupled (touches too many sections)
    - Style drift exceeds minor edits (requires Style Tune-up loop)
    - Canon collisions require adjudication
    - Gatekeeper preview shows red on Reachability or Nonlinearity
  observability:
    log_level: INFO
    trace_messages: true
    record_consultations: true
    metrics:
    - sections_drafted
    - hooks_generated
    - topology_changes
    - pre_gate_status
    - consultation_feedback_count
success_conditions:
- Topology adds or repairs meaningful nonlinearity (not decorative)
- Gateways have clear diegetic conditions PN can enforce without leaks
- At least one loop returns with difference (via codeword/state)
- Drafted sections are in-voice and choice-clear
- Hooks are small, rationalized, and triaged-ready
- Pre-gate shows no accidental dead ends; keystones remain reachable
failure_modes:
- symptom: Cosmetic hub/loop
  remedy: Add outcome differences; re-justify or remove
- symptom: Ambiguous gateway
  remedy: Rewrite condition in-world; ensure at least one path to meet it
- symptom: Overcoupled restructure
  remedy: Split into smaller TUs; stage changes
- symptom: Style wobble
  remedy: Run Style Tune-up before escalating
- symptom: Research dormant but factual hooks heavy
  remedy: Mark relevant hooks uncorroborated:<risk>; log revisit
handoffs:
- target: Hook Harvest
  deliverables:
  - Hook list + topology delta
- target: Lore Deepening
  deliverables:
  - Accepted hooks requiring canon backfill
- target: Codex Expansion
  deliverables:
  - Taxonomy/clarity needs list
- target: Style Tune-up
  deliverables:
  - Any drift notes exceeding minor edits
id: story_spark
