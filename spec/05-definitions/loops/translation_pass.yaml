metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/loop_pattern.schema.json
  name: translation_pass
  description: Build language packs with localized surfaces, register maps, and coverage tracking; maintains diegetic phrasing
    and player-safety
  layer0_guide_ref: ../../00-north-star/LOOPS/translation_pass.md
  created: '2025-11-19'
  updated: '2025-11-19'
identity:
  canonical_name: Translation Pass
  aliases:
  - Localization Pass
  - Language Pack Build
  purpose: 'Deliver faithful, readable language packs without shrinking meaning or leaking spoilers. Balance register, idiom,
    and cultural clarity across manuscript, PN phrasing, codex entries, captions/alt text, and UI labels.

    '
  outcome: 'Language Pack with localized surfaces, register map, glossary, coverage report. Ready for Gatekeeper checks and
    merge to Cold.

    '
topology:
  nodes:
  - id: showrunner_scope_target
    role: Showrunner
    intent: tu.scope
    description: Set target language and scope (full manuscript vs slice)
    role_id: Showrunner
  - id: translator_build_pack
    role: Translator
    intent: translation.build_pack
    description: Localize surfaces; maintain register map and glossary; track coverage
    role_id: Translator
  - id: style_register_review
    role: Style Lead
    intent: style.review_register
    description: Ensure localized voice consistent with Style intent
    role_id: Style Lead
  - id: curator_terminology_sync
    role: Codex Curator
    intent: codex.sync_glossary
    description: Coordinate terminology choices; validate bilingual glossary
    optional: true
    role_id: Codex Curator
  - id: pn_phrasing_review
    role: Player-Narrator
    intent: pn.review_localized
    description: Test localized PN phrasing patterns for natural delivery
    optional: true
    role_id: Player-Narrator
  - id: gatekeeper_pre_gate
    role: Gatekeeper
    intent: gate.pre_gate
    description: Check Presentation (no spoilers), Accessibility (captions work), Style (register preserved)
    role_id: Gatekeeper
  - id: showrunner_package_handoff
    role: Showrunner
    intent: tu.package
    description: Package Language Pack; notify Binder about localization availability
    role_id: Showrunner
  edges:
  - source: showrunner_scope_target
    target: translator_build_pack
    type: direct
  - source: translator_build_pack
    target: style_register_review
    type: direct
  - source: style_register_review
    target: curator_terminology_sync
    type: conditional
    condition:
      evaluator: python_expression
      expression: Terminology concerns flagged
  - source: style_register_review
    target: pn_phrasing_review
    type: conditional
    condition:
      evaluator: python_expression
      expression: PN phrasing patterns included
  - source: style_register_review
    target: gatekeeper_pre_gate
    type: conditional
    condition:
      evaluator: python_expression
      expression: No consultations needed OR consultations complete
  - source: curator_terminology_sync
    target: gatekeeper_pre_gate
    type: direct
  - source: pn_phrasing_review
    target: gatekeeper_pre_gate
    type: direct
  - source: gatekeeper_pre_gate
    target: translator_build_pack
    type: conditional
    condition:
      evaluator: python_expression
      expression: Issues require revision
  - source: gatekeeper_pre_gate
    target: showrunner_package_handoff
    type: conditional
    condition:
      evaluator: python_expression
      expression: All checks pass
  exit_conditions:
  - name: success
    condition: Language Pack packaged and ready for merge
  - name: success
    condition: Gatekeeper blocks on spoilers or broken diegetic phrasing
  entry_node: Showrunner
protocol_flow:
  message_sequences:
  - step: 1
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner sets target; Translator builds pack
  - step: 2
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Style/Curator/PN review localized content
  - step: 3
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Gatekeeper validates Presentation, Accessibility, Style
  - step: 4
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner packages Language Pack
gates:
  merge_gates:
  - name: presentation_safety_localized
    condition: No spoilers in any localized surface; diegetic phrasing maintained
    enforced_by: Gatekeeper
  - name: accessibility_preserved
    condition: Captions/alt text work in target language and culture
    enforced_by: Gatekeeper
  - name: style_consistency
    condition: Register and voice consistent with Style intent
    enforced_by: Gatekeeper
traceability:
  tu_lifecycle:
    creates_tus: true
    updates_tu_status: true
    transitions:
    - from: proposed
      to: in_progress
      trigger: Showrunner opens Translation Pass TU
    - from: in_progress
      to: completed
      trigger: Language Pack packaged and Gatekeeper approves
    - from: in_progress
      to: blocked
      trigger: Gatekeeper blocks on spoilers or broken phrasing
    required: true
  produces_hot:
  - language_packs (with register maps, glossaries, coverage reports)
  - hooks (codex-anchor, style-decision, source-rewrite)
  produces_cold: true
  snapshot_dependencies:
    reads_from_cold:
    - snapshots[view_id].manuscript
    - snapshots[view_id].codex_entries
    - snapshots[view_id].style_addenda
    - snapshots[view_id].art_plans (for caption localization)
    - snapshots[view_id].audio_plans (for text equivalent localization)
    writes_to_cold:
    - snapshots[view_id].language_packs[target_language]
roles:
  primary:
  - role: Translator
    raci: responsible
    required: true
  supporting:
  - role: Showrunner
    raci: accountable
    required: true
  - role: Style Lead
    raci: consulted
    required: true
  - role: Gatekeeper
    raci: consulted
    required: true
  - role: Codex Curator
    raci: consulted
    required: false
    wake_condition: Terminology concerns flagged
  - role: Player-Narrator
    raci: consulted
    required: false
    wake_condition: PN phrasing patterns included
  - role: Book Binder
    raci: informed
    required: false
context:
  required_state:
  - cold_sot.snapshots[view_id] (source surfaces for localization)
  optional_state:
  - hot.researcher_sensitivity_guidance (cultural concerns)
  quality_bar_focus:
  - bar_name: Presentation
    pressure: high
    rationale: All localized surfaces must be player-safe; no spoilers; diegetic phrasing maintained
  - bar_name: Accessibility
    pressure: high
    rationale: Captions/alt text must work in target language and culture; honor accessibility guidelines
  - bar_name: Style
    pressure: high
    rationale: Register and voice must be consistent with Style intent; culturally appropriate
success_criteria:
  required:
  - Language Pack compiles without orphan labels
  - Register map published with exemplars
  - Coverage % stated; gaps documented with fallback policy
  - Diegetic gate phrasing preserved in target language
  - Captions/alt text localized and accessible
  - Gatekeeper green on Presentation, Accessibility, Style
  definition_of_done:
  - Language Pack complete with all components
  - Style Lead approves register and voice
  - Curator/PN consultations complete (if needed)
  - Gatekeeper pre-gate green
  - Showrunner packages and notifies Binder
failure_modes:
- mode: Machine translation without cultural adaptation
  remedy: Translator reviews and adapts idioms/register to target culture; coordinate with Style for voice consistency
- mode: Diegetic phrasing breaks in translation
  remedy: Translator rewrites to maintain in-world feel; consult PN for natural alternatives; avoid meta-talk
- mode: Orphan labels or broken anchors after localization
  remedy: Complete coverage check; coordinate with Binder for anchor resolution; test all UI labels
- mode: Cultural insensitivity in localized content
  remedy: Consult Researcher for cultural sensitivity; adapt or remove problematic elements; coordinate with Style/Curator
handoffs:
  from_loops:
  - loop: Style Tune-up
    artifact: style_addenda (register, voice)
    trigger: Style guidance needed for localization
  - loop: Codex Expansion
    artifact: codex_entries (source terminology)
    trigger: Codex terms need localization
  - loop: Binding Run
    artifact: current Cold snapshot (source surfaces)
    trigger: Translator needs source surfaces
  to_loops:
  - loop: Binding Run
    artifact: language_packs (for multilingual export)
    condition: Translation Pass complete; ready for inclusion
execution:
  max_iterations: 2
  timebox_minutes: 180
  timeout_behavior: complete_with_partial_coverage
  error_handling:
    on_validation_error: retry
    on_bar_failure: rework
    on_protocol_error: retry
    max_retries: 2
    retry_backoff: exponential
    notes: '[{''error'': ''Target language resources unavailable'', ''response'': ''Defer translation; document gap; proceed
      with source language only''}, {''error'': ''Diegetic phrasing cannot be preserved'', ''response'': ''Escalate to Showrunner;
      may need source text revision to enable clean localization''}, {''error'': ''Cultural sensitivity issues'', ''response'':
      ''Consult Researcher; coordinate with Style/Curator for appropriate adaptation; escalate if unresolvable''}, {''error'':
      ''Coverage too low for quality release'', ''response'': ''Document gaps clearly; provide fallback policy (source language
      for unlocalized segments); defer partial coverage release''}]'
id: translation_pass
