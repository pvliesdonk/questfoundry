metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/loop_pattern.schema.json
  name: hook_harvest
  description: Collect, cluster, and triage hooks (narrative/scene/factual/taxonomy)
  type: Discovery
  layer0_loop_ref: ../../00-north-star/LOOPS/hook_harvest.md
  created: '2025-11-19'
  updated: '2025-11-19'
  timebox_minutes: 60
topology:
  entry_node: showrunner_initiate
  nodes:
  - id: showrunner_initiate
    role: Showrunner
    description: Open TU, gather proposed hooks, decide which roles to consult
    config_override:
      prompt_template:
        variables:
        - name: task
          value: 'Initiate Hook Harvest: collect proposed hooks, decide consultation scope'
    next: collect_hooks
    role_id: Showrunner
  - id: collect_hooks
    role: Showrunner
    description: Sweep all new proposed hooks, remove obvious duplicates
    config_override:
      tools:
      - read_hot_hooks
      - deduplicate_hooks
    next: cluster_hooks
    role_id: Showrunner
  - id: cluster_hooks
    role: Showrunner
    description: Group hooks by theme and type (narrative/scene/factual/taxonomy)
    config_override:
      tools:
      - cluster_hooks_by_theme
      - cluster_hooks_by_type
    next: consult_roles_parallel
    role_id: Showrunner
  - id: consult_roles_parallel
    role: Showrunner
    description: Fan out to consulting roles based on hook clusters
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Route hook clusters to appropriate consulting roles
    next:
    - condition: has_narrative_or_scene_hooks
      target: consult_lore_plot_scene
    - condition: has_factual_hooks
      target: consult_researcher
    - condition: has_taxonomy_hooks
      target: consult_curator
    - condition: has_style_hooks
      target: consult_style
    - default: annotate_and_decide
    role_id: Showrunner
  - id: consult_lore_plot_scene
    role: Multi
    description: Lore Weaver flags canon collisions; Plotwright judges structural impact; Scene Smith judges scene viability
    parallel_execution: true
    sub_nodes:
    - role: Lore Weaver
      task: Review narrative hooks for canon collisions, suggest deepening order
    - role: Plotwright
      task: Review hooks for structural impact, identify gateway implications
    - role: Scene Smith
      task: Review scene hooks for viability, surface prose opportunities/risks
    next: annotate_and_decide
    role_id: Multi
  - id: consult_researcher
    role: Researcher
    description: Validate factual hooks, assign uncertainty levels and citations
    condition: researcher_active
    config_override:
      prompt_template:
        variables:
        - name: task
          value: 'Validate factual hooks: assign uncorroborated:low/med/high + citations'
    next: annotate_and_decide
    role_id: Researcher
  - id: consult_curator
    role: Codex Curator
    description: Flag taxonomy/coverage gaps, ensure player-safe surface downstream
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Review taxonomy hooks for coverage gaps and player-safety
    next: annotate_and_decide
    role_id: Codex Curator
  - id: consult_style
    role: Style Lead
    description: Note tone/voice/aesthetic implications of style hooks
    config_override:
      prompt_template:
        variables:
        - name: task
          value: Review style hooks for tone/voice/aesthetic implications
    next: annotate_and_decide
    role_id: Style Lead
  - id: annotate_and_decide
    role: Showrunner
    description: Synthesize consultation feedback, annotate hooks with triage tags and dependencies
    config_override:
      tools:
      - annotate_hook
      - decide_hook_status
      prompt_template:
        variables:
        - name: task
          value: 'Triage hooks: mark accepted/deferred/rejected, assign next loops and owners'
    next: gatekeeper_consult
    role_id: Showrunner
  - id: gatekeeper_consult
    role: Gatekeeper
    description: Point out quality bars likely to fail if hooks advance; provide risk snapshot
    config_override:
      prompt_template:
        variables:
        - name: check_type
          value: advisory
        - name: task
          value: Review accepted hooks for quality bar risks (Integrity, Presentation)
    next: produce_harvest_sheet
    role_id: Gatekeeper
  - id: produce_harvest_sheet
    role: Showrunner
    description: Compile Harvest Sheet with clusters, decisions, risks, and handoffs
    config_override:
      tools:
      - write_harvest_sheet
    next: close_tu
    role_id: Showrunner
  - id: close_tu
    role: Showrunner
    description: Close TU, notify receiving loops, update role dormancy signals
    config_override:
      tools:
      - close_tu
      - notify_handoffs
    next: null
    role_id: Showrunner
  edges:
  - source: showrunner_initiate
    target: collect_hooks
    type: direct
  - source: collect_hooks
    target: cluster_hooks
    type: direct
  - source: cluster_hooks
    target: consult_roles_parallel
    type: direct
  - source: consult_roles_parallel
    target: consult_lore_plot_scene
    type: conditional
    condition:
      evaluator: python_expression
      expression: state.artifacts.hook_clusters.narrative or state.artifacts.hook_clusters.scene
  - source: consult_roles_parallel
    target: consult_researcher
    type: conditional
    condition:
      evaluator: python_expression
      expression: state.artifacts.hook_clusters.factual and state.roles.active contains 'Researcher'
  - source: consult_roles_parallel
    target: consult_curator
    type: conditional
    condition:
      evaluator: python_expression
      expression: state.artifacts.hook_clusters.taxonomy
  - source: consult_roles_parallel
    target: consult_style
    type: conditional
    condition:
      evaluator: python_expression
      expression: state.artifacts.hook_clusters.style
  - source: consult_roles_parallel
    target: annotate_and_decide
    type: conditional
    condition:
      evaluator: python_expression
      expression: no consultations needed
  - source: consult_lore_plot_scene
    target: annotate_and_decide
    type: direct
  - source: consult_researcher
    target: annotate_and_decide
    type: direct
  - source: consult_curator
    target: annotate_and_decide
    type: direct
  - source: consult_style
    target: annotate_and_decide
    type: direct
  - source: annotate_and_decide
    target: gatekeeper_consult
    type: direct
  - source: gatekeeper_consult
    target: produce_harvest_sheet
    type: direct
  - source: produce_harvest_sheet
    target: close_tu
    type: direct
  exit_conditions:
  - name: success
    condition: state.meta.current_tu.status == 'completed'
  - name: success
    condition: state.execution.iteration_count >= 3
protocol_flow:
  message_sequences:
  - step: 1
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner opens TU and collects proposed hooks
  - step: 2
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner requests consultation from roles based on hook types
  - step: 3
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Gatekeeper provides risk snapshot on accepted hooks
  - step: 4
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner produces Harvest Sheet and closes TU
gates:
  gatecheck_required: false
  quality_bars_checked:
  - bar_name: Integrity
    mode: advisory
    description: Gatekeeper provides advisory on traceability and hook linkage integrity
  - bar_name: Presentation
    mode: advisory
    description: Gatekeeper advises on any hooks that might create presentation risks downstream
  gate_points:
  - node_id: gatekeeper_consult
    type: advisory
    blocking: false
    on_red: log_warning
    on_yellow: log_info
    on_green: continue
    bars_checked:
    - Integrity
    - Style
    - Presentation
  pre_gate_requirements:
    artifacts_complete:
    - Hooks collected and deduplicated
    - Hooks clustered by theme and type
    - Consulting roles have provided feedback
traceability:
  tu_lifecycle:
    required: true
    starts_in: hot-proposed
    must_reach: cold-merged
    transitions:
    - from: proposed
      to: in_progress
      trigger: Showrunner opens TU and initiates collection
    - from: in_progress
      to: completed
      trigger: Harvest Sheet produced and TU closed
  produces_cold: false
  produces_hot:
  - artifact_type: harvest_sheet
    description: 'Summary of hook triage decisions: accepted/deferred/rejected with next loops and owners'
  - artifact_type: hook
    description: Updated hook cards with status, triage tags, uncertainty, dependencies
  - artifact_type: tu
    description: Completed TU record with harvest outcomes
  snapshot_handling:
    requires_snapshot_ref: true
    creates_snapshot: false
roles:
  required:
  - Showrunner
  optional:
  - Lore Weaver
  - Plotwright
  - Scene Smith
  - Codex Curator
  - Researcher
  - Style Lead
  - Gatekeeper
  wake_dormant:
  - role_id: Researcher
    wake_condition: High volume of factual hooks with uncertainty
    rubric_threshold: 4
context:
  hot_cold_mode: hot
  required_artifacts:
  - artifact_type: hook
    source: hot_sot.hooks
    filter: $.hot_sot.hooks[?@.status == 'proposed']
    min_count: 1
    state_key: artifacts.hook
  required_state_keys:
  - meta.current_tu
  - hot_sot.hooks
  - roles.active
  - roles.dormant
  state_initialization:
    artifacts:
      hook_clusters:
        narrative: []
        scene: []
        factual: []
        taxonomy: []
        style: []
      consultation_notes: []
      accepted_hooks: []
      deferred_hooks: []
      rejected_hooks: []
      harvest_sheet: null
success_criteria:
  required_artifacts:
  - artifact_type: harvest_sheet
    location: hot_sot
    validation: Contains accepted/deferred/rejected clusters with next loops and owners
  required_state:
  - condition: all proposed hooks have status set (accepted/deferred/rejected)
    validation: $.hot_sot.hooks[?@.status == 'proposed'].length == 0
  - condition: accepted hooks have next_loop assigned
    validation: $.artifacts.accepted_hooks[*].next_loop != null
  - condition: TU status is completed
    validation: state.meta.current_tu.status == 'completed'
  bars_must_be_green: []
  tu_final_state: cold-merged
execution:
  max_iterations: 3
  default_iteration_limit: 3
  iteration_strategy: consultation_rounds
  timeout_seconds: 3600
  checkpointing:
    enabled: true
    frequency: per_node
    save_points:
    - after_cluster_hooks
    - after_annotate_and_decide
    - after_produce_harvest_sheet
  error_handling:
    on_node_failure: log_and_continue
    on_timeout: produce_partial_harvest_sheet
    on_iteration_limit: close_with_remaining_hooks_deferred
  human_interaction:
    allowed: true
    trigger_conditions:
    - Consultation feedback is contradictory
    - Hook volume exceeds capacity (>50 hooks)
    - Uncertain whether to wake dormant Researcher
  observability:
    log_level: INFO
    trace_messages: true
    record_consultations: true
    metrics:
    - hooks_processed_count
    - accepted_hooks_count
    - deferred_hooks_count
    - rejected_hooks_count
    - consultation_rounds
    - roles_consulted
prioritization_heuristics:
  promote_now_if:
  - Untangles contradictions or unlocks blocked keystones
  - Strengthens nonlinearity (meaningful hub/loop/gateway)
  - Improves player comprehension (clearer affordances, better signposting)
  - Low coupling, high gain; evidence in hand or uncorroborated:low with plan
  defer_if:
  - Requires dormant roles and Showrunner won't activate them
  - Triggers wide topology churn without proportional value
  - Depends on external verification with no time box
  reject_if:
  - Duplicates an accepted hook; keep provenance but close this card
  - Violates style or PN boundaries with no viable rewrite
  - Creates unwinnable or misleading states without design intent
failure_modes:
- symptom: Foggy clusters
  remedy: Recut by player value instead of source role
- symptom: Endless acceptance
  remedy: Enforce capacity; defer with explicit wake conditions
- symptom: Taxonomy hooks becoming secret lore
  remedy: Hand to Lore Weaver or mark deferred; Curator does not canonize
- symptom: Research dormant but factual heavy
  remedy: Accept with uncorroborated:<risk> only if Showrunner signs the risk; otherwise defer
id: hook_harvest
