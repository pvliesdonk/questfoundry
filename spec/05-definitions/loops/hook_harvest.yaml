# QuestFoundry Loop Pattern: Hook Harvest
# Layer 5 Definition — validates against spec/03-schemas/definitions/loop_pattern.schema.json

metadata:
  version: "0.1.0"
  schema_ref: "../../03-schemas/definitions/loop_pattern.schema.json"
  name: "hook_harvest"
  description: "Collect, cluster, and triage hooks (narrative/scene/factual/taxonomy)"
  type: "Discovery"
  layer0_loop_ref: "../../00-north-star/LOOPS/hook_harvest.md"
  created: "2025-11-19"
  updated: "2025-11-19"
  timebox_minutes: 60

# Topology defines the LangGraph StateGraph structure
topology:
  entry_node: "showrunner_initiate"

  nodes:
    - id: "showrunner_initiate"
      role: "Showrunner"
      description: "Open TU, gather proposed hooks, decide which roles to consult"
      config_override:
        prompt_template:
          variables:
            - name: "task"
              value: "Initiate Hook Harvest: collect proposed hooks, decide consultation scope"
      next: "collect_hooks"

    - id: "collect_hooks"
      role: "Showrunner"
      description: "Sweep all new proposed hooks, remove obvious duplicates"
      config_override:
        tools:
          - "read_hot_hooks"
          - "deduplicate_hooks"
      next: "cluster_hooks"

    - id: "cluster_hooks"
      role: "Showrunner"
      description: "Group hooks by theme and type (narrative/scene/factual/taxonomy)"
      config_override:
        tools:
          - "cluster_hooks_by_theme"
          - "cluster_hooks_by_type"
      next: "consult_roles_parallel"

    - id: "consult_roles_parallel"
      role: "Showrunner"
      description: "Fan out to consulting roles based on hook clusters"
      config_override:
        prompt_template:
          variables:
            - name: "task"
              value: "Route hook clusters to appropriate consulting roles"
      next:
        - condition: "has_narrative_or_scene_hooks"
          target: "consult_lore_plot_scene"
        - condition: "has_factual_hooks"
          target: "consult_researcher"
        - condition: "has_taxonomy_hooks"
          target: "consult_curator"
        - condition: "has_style_hooks"
          target: "consult_style"
        - default: "annotate_and_decide"

    - id: "consult_lore_plot_scene"
      role: "Multi"
      description: "Lore Weaver flags canon collisions; Plotwright judges structural impact; Scene Smith judges scene viability"
      parallel_execution: true
      sub_nodes:
        - role: "Lore Weaver"
          task: "Review narrative hooks for canon collisions, suggest deepening order"
        - role: "Plotwright"
          task: "Review hooks for structural impact, identify gateway implications"
        - role: "Scene Smith"
          task: "Review scene hooks for viability, surface prose opportunities/risks"
      next: "annotate_and_decide"

    - id: "consult_researcher"
      role: "Researcher"
      description: "Validate factual hooks, assign uncertainty levels and citations"
      condition: "researcher_active"
      config_override:
        prompt_template:
          variables:
            - name: "task"
              value: "Validate factual hooks: assign uncorroborated:low/med/high + citations"
      next: "annotate_and_decide"

    - id: "consult_curator"
      role: "Codex Curator"
      description: "Flag taxonomy/coverage gaps, ensure player-safe surface downstream"
      config_override:
        prompt_template:
          variables:
            - name: "task"
              value: "Review taxonomy hooks for coverage gaps and player-safety"
      next: "annotate_and_decide"

    - id: "consult_style"
      role: "Style Lead"
      description: "Note tone/voice/aesthetic implications of style hooks"
      config_override:
        prompt_template:
          variables:
            - name: "task"
              value: "Review style hooks for tone/voice/aesthetic implications"
      next: "annotate_and_decide"

    - id: "annotate_and_decide"
      role: "Showrunner"
      description: "Synthesize consultation feedback, annotate hooks with triage tags and dependencies"
      config_override:
        tools:
          - "annotate_hook"
          - "decide_hook_status"
        prompt_template:
          variables:
            - name: "task"
              value: "Triage hooks: mark accepted/deferred/rejected, assign next loops and owners"
      next: "gatekeeper_consult"

    - id: "gatekeeper_consult"
      role: "Gatekeeper"
      description: "Point out quality bars likely to fail if hooks advance; provide risk snapshot"
      config_override:
        prompt_template:
          variables:
            - name: "check_type"
              value: "advisory"
            - name: "task"
              value: "Review accepted hooks for quality bar risks (Integrity, Presentation)"
      next: "produce_harvest_sheet"

    - id: "produce_harvest_sheet"
      role: "Showrunner"
      description: "Compile Harvest Sheet with clusters, decisions, risks, and handoffs"
      config_override:
        tools:
          - "write_harvest_sheet"
      next: "close_tu"

    - id: "close_tu"
      role: "Showrunner"
      description: "Close TU, notify receiving loops, update role dormancy signals"
      config_override:
        tools:
          - "close_tu"
          - "notify_handoffs"
      next: null  # Exit loop

  edges:
    - from: "showrunner_initiate"
      to: "collect_hooks"
      type: "direct"
      intent: null

    - from: "collect_hooks"
      to: "cluster_hooks"
      type: "direct"
      intent: null

    - from: "cluster_hooks"
      to: "consult_roles_parallel"
      type: "direct"
      intent: null

    - from: "consult_roles_parallel"
      to: "consult_lore_plot_scene"
      type: "conditional"
      condition: "state.artifacts.hook_clusters.narrative or state.artifacts.hook_clusters.scene"
      intent: "hook.consultation.request"

    - from: "consult_roles_parallel"
      to: "consult_researcher"
      type: "conditional"
      condition: "state.artifacts.hook_clusters.factual and state.roles.active contains 'Researcher'"
      intent: "hook.consultation.request"

    - from: "consult_roles_parallel"
      to: "consult_curator"
      type: "conditional"
      condition: "state.artifacts.hook_clusters.taxonomy"
      intent: "hook.consultation.request"

    - from: "consult_roles_parallel"
      to: "consult_style"
      type: "conditional"
      condition: "state.artifacts.hook_clusters.style"
      intent: "hook.consultation.request"

    - from: "consult_roles_parallel"
      to: "annotate_and_decide"
      type: "conditional"
      condition: "no consultations needed"
      intent: null

    - from: "consult_lore_plot_scene"
      to: "annotate_and_decide"
      type: "direct"
      intent: "hook.consultation.response"

    - from: "consult_researcher"
      to: "annotate_and_decide"
      type: "direct"
      intent: "hook.consultation.response"

    - from: "consult_curator"
      to: "annotate_and_decide"
      type: "direct"
      intent: "hook.consultation.response"

    - from: "consult_style"
      to: "annotate_and_decide"
      type: "direct"
      intent: "hook.consultation.response"

    - from: "annotate_and_decide"
      to: "gatekeeper_consult"
      type: "direct"
      intent: "hook.triage.completed"

    - from: "gatekeeper_consult"
      to: "produce_harvest_sheet"
      type: "direct"
      intent: "gate.advisory"

    - from: "produce_harvest_sheet"
      to: "close_tu"
      type: "direct"
      intent: "tu.harvest_sheet_ready"

  exit_conditions:
    - condition: "state.meta.current_tu.status == 'completed'"
      description: "TU completed: Harvest Sheet produced, hooks triaged"
    - condition: "state.execution.iteration_count >= 3"
      description: "Max iterations reached (safety limit for consultation rounds)"

# Protocol flow maps Layer 4 intents to graph execution
protocol_flow:
  message_sequences:
    - name: "initiate_harvest"
      description: "Showrunner opens TU and collects proposed hooks"
      steps:
        - role: "Showrunner"
          intent: "tu.open"
          payload_type: "tu"
          target: null
          correlation: "tu_id"

    - name: "consultation_round"
      description: "Showrunner requests consultation from roles based on hook types"
      steps:
        - role: "Showrunner"
          intent: "hook.consultation.request"
          payload_type: "hook_cluster"
          target: ["Lore Weaver", "Plotwright", "Scene Smith", "Researcher", "Codex Curator", "Style Lead"]
          correlation: "tu_id"
        - role: "*"
          intent: "hook.consultation.response"
          payload_type: "consultation_notes"
          target: "Showrunner"
          correlation: "tu_id"

    - name: "gatekeeper_advisory"
      description: "Gatekeeper provides risk snapshot on accepted hooks"
      steps:
        - role: "Showrunner"
          intent: "gate.advisory.request"
          payload_type: "accepted_hooks"
          target: "Gatekeeper"
          correlation: "tu_id"
        - role: "Gatekeeper"
          intent: "gate.advisory"
          payload_type: "risk_snapshot"
          target: "Showrunner"
          correlation: "tu_id"

    - name: "complete_harvest"
      description: "Showrunner produces Harvest Sheet and closes TU"
      steps:
        - role: "Showrunner"
          intent: "tu.update"
          payload_type: "harvest_sheet"
          target: null
          correlation: "tu_id"
        - role: "Showrunner"
          intent: "tu.close"
          payload_type: "tu"
          target: null
          correlation: "tu_id"
        - role: "Showrunner"
          intent: "hook.handoff"
          payload_type: "hook_cluster"
          target: ["Lore Weaver", "Plotwright", "Codex Curator", "Style Lead"]
          correlation: "next_loop"

# Gates defines quality gate requirements (Hook Harvest has advisory-only Gatekeeper)
gates:
  gatecheck_required: false  # Hook Harvest is a triage loop, no blocking gatecheck
  quality_bars_checked:
    - bar_name: "Integrity"
      mode: "advisory"
      description: "Gatekeeper provides advisory on traceability and hook linkage integrity"
    - bar_name: "Presentation"
      mode: "advisory"
      description: "Gatekeeper advises on any hooks that might create presentation risks downstream"

  gate_points:
    - node_id: "gatekeeper_consult"
      type: "advisory"
      blocking: false
      on_red: "log_warning"
      on_yellow: "log_info"
      on_green: "continue"

  pre_gate_requirements:
    - "Hooks collected and deduplicated"
    - "Hooks clustered by theme and type"
    - "Consulting roles have provided feedback"

# Traceability defines TU lifecycle and artifact production
traceability:
  tu_lifecycle:
    required: true
    starts_in: "proposed"
    must_reach: ["completed"]
    transitions:
      - from: "proposed"
        to: "in_progress"
        trigger: "Showrunner opens TU and initiates collection"
      - from: "in_progress"
        to: "completed"
        trigger: "Harvest Sheet produced and TU closed"

  produces_cold: false  # Hook Harvest works entirely in Hot; outputs feed other loops

  produces_hot:
    - artifact_type: "harvest_sheet"
      description: "Summary of hook triage decisions: accepted/deferred/rejected with next loops and owners"
    - artifact_type: "hook"
      description: "Updated hook cards with status, triage tags, uncertainty, dependencies"
    - artifact_type: "tu"
      description: "Completed TU record with harvest outcomes"

  snapshot_handling: "read_only"  # Hook Harvest reads current snapshot for context, doesn't create new ones

# Roles defines participation and dormancy
roles:
  required:
    - role: "Showrunner"
      rationale: "Responsible and Accountable for entire Hook Harvest loop"

  optional:
    - role: "Lore Weaver"
      wake_condition: "Narrative hooks present requiring canon consultation"
      default_active: true
    - role: "Plotwright"
      wake_condition: "Structural hooks present requiring topology consultation"
      default_active: true
    - role: "Scene Smith"
      wake_condition: "Scene hooks present requiring prose viability consultation"
      default_active: true
    - role: "Codex Curator"
      wake_condition: "Taxonomy hooks present requiring coverage gap consultation"
      default_active: true
    - role: "Researcher"
      wake_condition: "Factual hooks present AND Researcher awake per Showrunner dormancy decision"
      default_active: false
    - role: "Style Lead"
      wake_condition: "Style hooks present requiring tone/voice consultation"
      default_active: true
    - role: "Gatekeeper"
      wake_condition: "Always consulted for advisory risk snapshot"
      default_active: true

  wake_dormant:
    - role: "Researcher"
      condition: "High volume of factual hooks with uncertainty"
      rubric_threshold: 4

# Context defines state requirements and initialization
context:
  hot_cold_mode: "hot"

  required_artifacts:
    - artifact_type: "hook"
      source: "hot_sot.hooks"
      filter: "$.hot_sot.hooks[?@.status == 'proposed']"
      min_count: 1

  required_state_keys:
    - "meta.current_tu"
    - "hot_sot.hooks"
    - "roles.active"
    - "roles.dormant"

  state_initialization:
    artifacts:
      hook_clusters:
        narrative: []
        scene: []
        factual: []
        taxonomy: []
        style: []
      consultation_notes: []
      accepted_hooks: []
      deferred_hooks: []
      rejected_hooks: []
      harvest_sheet: null

# Success criteria defines loop completion requirements
success_criteria:
  required_artifacts:
    - artifact_type: "harvest_sheet"
      location: "hot_sot"
      validation: "Contains accepted/deferred/rejected clusters with next loops and owners"

  required_state:
    - condition: "all proposed hooks have status set (accepted/deferred/rejected)"
      validation: "$.hot_sot.hooks[?@.status == 'proposed'].length == 0"
    - condition: "accepted hooks have next_loop assigned"
      validation: "$.artifacts.accepted_hooks[*].next_loop != null"
    - condition: "TU status is completed"
      validation: "state.meta.current_tu.status == 'completed'"

  bars_must_be_green: []  # No blocking bars; Gatekeeper provides advisory only

  tu_final_state: "completed"

# Execution defines runtime behavior and limits
execution:
  max_iterations: 3
  default_iteration_limit: 3
  iteration_strategy: "consultation_rounds"

  timeout_seconds: 3600  # 60 minutes

  checkpointing:
    enabled: true
    frequency: "per_node"
    save_points:
      - "after_cluster_hooks"
      - "after_annotate_and_decide"
      - "after_produce_harvest_sheet"

  error_handling:
    on_node_failure: "log_and_continue"
    on_timeout: "produce_partial_harvest_sheet"
    on_iteration_limit: "close_with_remaining_hooks_deferred"

  human_interaction:
    allowed: true
    trigger_conditions:
      - "Consultation feedback is contradictory"
      - "Hook volume exceeds capacity (>50 hooks)"
      - "Uncertain whether to wake dormant Researcher"

  observability:
    log_level: "info"
    trace_messages: true
    record_consultations: true
    metrics:
      - "hooks_processed_count"
      - "accepted_hooks_count"
      - "deferred_hooks_count"
      - "rejected_hooks_count"
      - "consultation_rounds"
      - "roles_consulted"

# Heuristics for prioritization (from Layer 0)
prioritization_heuristics:
  promote_now_if:
    - "Untangles contradictions or unlocks blocked keystones"
    - "Strengthens nonlinearity (meaningful hub/loop/gateway)"
    - "Improves player comprehension (clearer affordances, better signposting)"
    - "Low coupling, high gain; evidence in hand or uncorroborated:low with plan"

  defer_if:
    - "Requires dormant roles and Showrunner won't activate them"
    - "Triggers wide topology churn without proportional value"
    - "Depends on external verification with no time box"

  reject_if:
    - "Duplicates an accepted hook; keep provenance but close this card"
    - "Violates style or PN boundaries with no viable rewrite"
    - "Creates unwinnable or misleading states without design intent"

# Failure modes and remedies (from Layer 0)
failure_modes:
  - symptom: "Foggy clusters"
    remedy: "Recut by player value instead of source role"
  - symptom: "Endless acceptance"
    remedy: "Enforce capacity; defer with explicit wake conditions"
  - symptom: "Taxonomy hooks becoming secret lore"
    remedy: "Hand to Lore Weaver or mark deferred; Curator does not canonize"
  - symptom: "Research dormant but factual heavy"
    remedy: "Accept with uncorroborated:<risk> only if Showrunner signs the risk; otherwise defer"
