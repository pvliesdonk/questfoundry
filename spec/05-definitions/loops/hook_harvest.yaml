# Loop Pattern: Hook Harvest
# Compiled from: spec/00-north-star/LOOPS/hook_harvest.md
# Schema: spec/03-schemas/definitions/loop_pattern.schema.json

id: hook_harvest

metadata:
  name: "Hook Harvest"
  type: "Discovery"
  description: |
    Collect, cluster, and triage hooks - sweeping up newly proposed hooks (narrative, scene,
    factual, taxonomy), removing duplicates, and deciding what advances now, later, or never.

topology:
  entry_node: collect

  nodes:
    - id: collect
      role: "Showrunner"
      description: "Sweep all new proposed hooks. Reject obvious dupes; link provenance rather than deleting."
      next: cluster

    - id: cluster
      role: "Showrunner"
      description: "Group by theme (e.g., 'Wormhole economy', 'Kestrel arc'), then by type (narrative, scene, factual, taxonomy)."
      next: annotate

    - id: annotate
      role: "Showrunner"
      description: "For each hook, add or confirm: triage tag (quick-win, needs-research, structure-impact, style-impact, deferred, reject), uncertainty (for factual), dependencies."
      next: triage

    - id: triage
      role: "Showrunner"
      description: "Mark each as accepted, deferred, or rejected (with 1-line reason). For accepted hooks, assign next loop (lore_deepening, story_spark, style_tune_up, codex_expansion)."
      next: package

    - id: package
      role: "Showrunner"
      description: "Produce a Harvest Sheet summarizing decisions for hand-off to downstream loops."
      next: null

  edges:
    - from: collect
      to: cluster
      condition: hooks_collected
    - from: cluster
      to: annotate
      condition: hooks_clustered
    - from: annotate
      to: triage
      condition: hooks_annotated
    - from: triage
      to: package
      condition: decisions_made

traceability:
  tu_lifecycle:
    required: true
  produces_cold: false

context:
  required_artifacts:
    - hook_card
  optional_artifacts:
    - topology_notes
    - section_draft
    - style_addendum
    - gatecheck_report

handoffs:
  - target: lore_deepening
    condition: "hook.type in ['narrative', 'scene', 'factual'] and requires_canon"
  - target: story_spark
    condition: "hook reshapes topology"
  - target: codex_expansion
    condition: "hook.type == 'taxonomy' or improves player-safe coverage"
  - target: style_tune_up
    condition: "primary effect is tone/voice/aesthetics"

gates:
  quality_bars:
    - Integrity
    - Presentation

success_criteria:
  - Hooks are deduped, clustered, and tagged; uncertainty visible
  - Clear next loop and owner for each accepted hook
  - Showrunner has a short activation list (which dormant roles to wake)
  - Gatekeeper has a risk snapshot aligned to Quality Bars
