# Loop Pattern: Lore Deepening
# Compiled from: spec/00-north-star/LOOPS/lore_deepening.md
# Schema: spec/03-schemas/definitions/loop_pattern.schema.json

id: lore_deepening

metadata:
  name: "Lore Deepening"
  type: "Discovery"
  description: |
    Transform accepted hooks into coherent, contradiction-aware canon - backstories, timelines,
    metaphysics, causal links. Keep spoilers in canon notes; publish player-safe surfaces later
    via Codex Expansion.

topology:
  entry_node: draft_canon

  nodes:
    - id: draft_canon
      role: "Lore Weaver"
      description: "Frame the canon question for each theme/cluster. Provide precise, spoiler-level answers: backstory, causal chain, timeline anchors, implicated entities, constraints. Tag sensitivity."
      next: verify

    - id: verify
      role: "Researcher"
      description: "Validate real-world claims; attach citations. If Researcher dormant, keep uncorroborated risk labels and note wording guidance for PN/Binder."
      next: summarize

    - id: summarize
      role: "Lore Weaver"
      description: "Package canon entry with: Title, Canon Answer, Timeline anchors, Entities affected, Constraints, Sensitivity tag, Upstream hooks/TUs, Downstream impacts. Add notes for Plotwright/Scene Smith."
      next: null

  edges:
    - from: draft_canon
      to: verify
      condition: canon_drafted
    - from: verify
      to: summarize
      condition: facts_checked_or_flagged

traceability:
  tu_lifecycle:
    required: true
  produces_cold: true

context:
  required_artifacts:
    - hook_card
    - cold_snapshot
  optional_artifacts:
    - style_addendum
    - topology_notes
    - research_memo

handoffs:
  - target: codex_expansion
    condition: "player-safe summaries ready for codex entries"
  - target: story_spark
    condition: "topology/prose notes indicate structure needs adjustment"

gates:
  quality_bars:
    - Integrity
    - Reachability
    - Gateways
    - Presentation

success_criteria:
  - Each accepted hook is either canonized, deferred with reason, or rejected with rationale
  - Canon resolves prior contradictions or marks deliberate mystery with bounds
  - Topology/prose impacts are enumerated and handed off
  - Spoilers are separated from player-safe summaries
  - Factual claims carry citations or explicit risk flags
