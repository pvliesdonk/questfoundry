metadata:
  version: 0.1.0
  schema_ref: ../../03-schemas/definitions/loop_pattern.schema.json
  name: narration_dry_run
  description: PN playtest of Cold view to surface UX issues in comprehension, choice clarity, pacing, diegetic gates
  layer0_guide_ref: ../../00-north-star/LOOPS/narration_dry_run.md
  created: '2025-11-19'
  updated: '2025-11-19'
identity:
  canonical_name: Narration Dry-Run
  aliases:
  - PN Playtest
  - UX Dry-Run
  purpose: 'Have the Player-Narrator play through the current Cold snapshot exactly as a player would experience it—in-world,
    spoiler-safe—to surface UX issues in comprehension, choice clarity, pacing, and diegetic gate enforcement.

    '
  outcome: 'A set of PN playtest notes and handoff tickets (TUs or edit notes) that improve player-facing surfaces without
    rewriting canon or topology during the dry-run itself.

    '
topology:
  nodes:
  - id: showrunner_select_view
    role: Showrunner
    intent: view.select
    description: Select same Cold snapshot used by Binding Run; open PN dry-run TU
    role_id: Showrunner
  - id: showrunner_plan_routes
    role: Showrunner
    intent: route.plan
    description: 'Decide routes to test: high-traffic, hub route, gated branch, edge case, terminal'
    role_id: Showrunner
  - id: pn_perform_dry_run
    role: Player-Narrator
    intent: pn.perform
    description: Perform view in-voice section by section; enforce gates diegetically; log UX issues
    role_id: Player-Narrator
  - id: pn_log_issues
    role: Player-Narrator
    intent: pn.log_issue
    description: Record each UX issue with tag, location, description, suggested remedy, severity
    role_id: Player-Narrator
  - id: pn_generate_summary
    role: Player-Narrator
    intent: pn.summary
    description: 'Create summary sheet: issue counts by type/severity, recommended loops, overall assessment'
    role_id: Player-Narrator
  - id: gatekeeper_classify
    role: Gatekeeper
    intent: gate.classify_issues
    description: Classify PN issues against Presentation, Integrity, Style bars; assign severity
    role_id: Gatekeeper
  - id: binder_investigate_nav
    role: Book Binder
    intent: view.investigate_nav
    description: Investigate navigation issues (anchors, labels, layout) flagged by PN
    optional: true
    role_id: Book Binder
  - id: curator_check_coverage
    role: Codex Curator
    intent: codex.check_coverage
    description: Address codex coverage gaps or cross-ref problems flagged by PN
    optional: true
    role_id: Codex Curator
  - id: style_review_phrasing
    role: Style Lead
    intent: style.review_phrasing
    description: Review PN phrasing patterns; propose voice/register adjustments
    optional: true
    role_id: Style Lead
  - id: translator_check_glitches
    role: Translator
    intent: translation.check_glitches
    description: Flag mistransfers in tone/links if testing localized slice
    optional: true
    role_id: Translator
  - id: showrunner_package_handoffs
    role: Showrunner
    intent: tu.package_handoffs
    description: Convert PN notes into TUs or edit tasks routed to appropriate loops
    role_id: Showrunner
  edges:
  - source: showrunner_select_view
    target: showrunner_plan_routes
    type: direct
  - source: showrunner_plan_routes
    target: pn_perform_dry_run
    type: direct
  - source: pn_perform_dry_run
    target: pn_log_issues
    type: conditional
    condition:
      evaluator: python_expression
      expression: UX issues encountered during performance
  - source: pn_perform_dry_run
    target: pn_generate_summary
    type: conditional
    condition:
      evaluator: python_expression
      expression: Performance complete with no issues (rare but possible)
  - source: pn_log_issues
    target: pn_generate_summary
    type: conditional
    condition:
      evaluator: python_expression
      expression: All issues logged
  - source: pn_generate_summary
    target: gatekeeper_classify
    type: direct
  - source: gatekeeper_classify
    target: binder_investigate_nav
    type: conditional
    condition:
      evaluator: python_expression
      expression: nav-bug issues flagged
  - source: gatekeeper_classify
    target: curator_check_coverage
    type: conditional
    condition:
      evaluator: python_expression
      expression: codex-invite or codex coverage issues flagged
  - source: gatekeeper_classify
    target: style_review_phrasing
    type: conditional
    condition:
      evaluator: python_expression
      expression: tone-wobble or gate-friction issues flagged
  - source: gatekeeper_classify
    target: translator_check_glitches
    type: conditional
    condition:
      evaluator: python_expression
      expression: translation-glitch issues flagged (localized slice tested)
  - source: gatekeeper_classify
    target: showrunner_package_handoffs
    type: conditional
    condition:
      evaluator: python_expression
      expression: No optional role consultation OR optional consultations complete
  - source: binder_investigate_nav
    target: showrunner_package_handoffs
    type: direct
  - source: curator_check_coverage
    target: showrunner_package_handoffs
    type: direct
  - source: style_review_phrasing
    target: showrunner_package_handoffs
    type: direct
  - source: translator_check_glitches
    target: showrunner_package_handoffs
    type: direct
  exit_conditions:
  - name: success
    condition: Showrunner packages handoffs and routes follow-up TUs
  - name: success
    condition: Critical blocking issues found (rare); immediate iteration needed
  entry_node: Showrunner
protocol_flow:
  message_sequences:
  - step: 1
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner selects view and plans routes to test
  - step: 2
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: PN performs dry-run and logs UX issues
  - step: 3
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Gatekeeper classifies issues, optional roles consult
  - step: 4
    sender: UNKNOWN
    receiver: UNKNOWN
    intent: unknown
    description: Showrunner packages PN notes into follow-up TUs
gates:
  pre_gates: []
  merge_gates: []
traceability:
  tu_lifecycle:
    creates_tus: true
    updates_tu_status: true
    transitions:
    - from: proposed
      to: in_progress
      trigger: Showrunner opens dry-run TU
    - from: in_progress
      to: completed
      trigger: Showrunner packages handoffs and routes follow-up TUs
    - from: in_progress
      to: blocked
      trigger: Critical blocking issues found (rare)
    required: true
  produces_hot:
  - pn_playtest_notes
  - pn_summary_sheet
  - session_recaps (proposed)
  - hooks (pn-phrasing, recap needs, codex-anchor, gate-diegesis)
  - handoff_tus (for follow-up loops)
  produces_cold: false
  snapshot_dependencies:
    reads_from_cold:
    - snapshots[view_id].export_view (full bundle)
    - snapshots[view_id].codex_entries
    - snapshots[view_id].style_addenda (PN patterns)
    - snapshots[view_id].translations (if testing localized slice)
    writes_to_cold: []
roles:
  primary:
  - role: Player-Narrator
    raci: responsible
    required: true
  supporting:
  - role: Showrunner
    raci: accountable
    required: true
  - role: Gatekeeper
    raci: consulted
    required: true
  - role: Book Binder
    raci: consulted
    required: false
    wake_condition: nav-bug issues flagged
  - role: Codex Curator
    raci: consulted
    required: false
    wake_condition: codex-invite or coverage issues flagged
  - role: Style Lead
    raci: consulted
    required: false
    wake_condition: tone-wobble or gate-friction issues flagged
  - role: Translator
    raci: consulted
    required: false
    wake_condition: translation-glitch issues flagged (localized slice)
context:
  required_state:
  - artifacts.export_views[view_id] (from Binding Run)
  optional_state:
  - cold_sot.snapshots[view_id].codex_entries
  - cold_sot.snapshots[view_id].style_addenda (PN patterns)
  - cold_sot.snapshots[view_id].translations
  quality_bar_focus:
  - bar_name: Presentation
    pressure: high
    rationale: PN surfaces issues where internals leak or spoilers brush through; diegetic gates critical
  - bar_name: Accessibility
    pressure: high
    rationale: PN flags missing alt text, risky audio cues, low contrast, pacing issues
  - bar_name: Style
    pressure: medium
    rationale: PN surfaces tone wobble, register slips, motif gaps
  - bar_name: Integrity
    pressure: medium
    rationale: PN flags navigation bugs, broken links, breadcrumb confusion
success_criteria:
  required:
  - Gates enforced diegetically without confusion or leaks
  - Choices read as distinct and fair; recaps land where helpful
  - Codex invites clarify without spoiling
  - Navigation smooth across all export formats
  - Small, prioritized list of actionable follow-ups exists
  - PN notes are player-safe (no spoilers or internals in descriptions)
  - Summary sheet complete with issue counts, severity, recommended loops
  optional:
  - Session recaps proposed for high-value junction points
  - PN phrasing patterns updated based on friction
  - Localized slice tested and glitches flagged
  definition_of_done:
  - PN playtest notes packaged and routed to appropriate loops
  - Gatekeeper classification complete (bar mapping, severity)
  - Showrunner handoffs created for follow-up work
  - No blocking issues OR blocking issues escalated immediately
failure_modes:
- mode: PN improvises fixes live during performance
  remedy: Stop; remind PN to log issues only, not rewrite. Route to Style Tune-up or Binder for upstream fixes.
- mode: Recurring choice ambiguity across multiple sections
  remedy: Add micro-context in surface text; run focused Style Tune-up on affected sections
- mode: Gate phrasing leaks plumbing (internals exposed)
  remedy: Replace with diegetic token/reputation/knowledge checks; route to Style Lead for pattern library update
- mode: Codex rabbit-holing (too many forced invites)
  remedy: Cap invites; keep main path legible; curator should triage which terms truly need codex grounding
- mode: Format-specific nav bugs (EPUB links broken, PDF anchors fail)
  remedy: Binder repairs anchors and re-exports all formats; re-test after binding fix
- mode: Critical blocking issue (spoiler leak, gate completely broken)
  remedy: Block and escalate to Showrunner; immediate upstream fix required before distribution
handoffs:
  from_loops:
  - loop: Binding Run
    artifact: export_view (bundle for PN to perform)
    trigger: After Binding Run completes; same Cold snapshot
  - loop: Style Tune-up
    artifact: style_addenda (PN phrasing patterns)
    trigger: Updated PN patterns available for performance
  to_loops:
  - loop: Style Tune-up
    artifact: pn_notes (tone-wobble, gate-friction, choice-ambiguity)
    condition: Style/phrasing issues found
  - loop: Codex Expansion
    artifact: pn_notes (codex-invite, coverage gaps)
    condition: Codex coverage or crossref issues found
  - loop: Binding Run
    artifact: pn_notes (nav-bug, anchor issues)
    condition: Navigation issues require re-export
  - loop: Story Spark
    artifact: pn_notes (structural issues, rare)
    condition: Issue reveals actual topology flaw (very rare)
  - loop: Translation Pass
    artifact: pn_notes (translation-glitch)
    condition: Localized slice tested and mistransfers found
execution:
  max_iterations: 1
  timebox_minutes: 60
  timeout_behavior: complete_with_partial_coverage
  error_handling:
    on_validation_error: retry
    on_bar_failure: rework
    on_protocol_error: retry
    max_retries: 2
    retry_backoff: exponential
    notes: '[{''error'': ''PN unavailable or cannot perform'', ''response'': ''Defer dry-run; cannot proceed without PN performance''},
      {''error'': ''View not found (binding failed)'', ''response'': ''Block; route back to Binding Run to generate export
      view first''}, {''error'': ''Critical blocking issue discovered (spoiler leak, completely broken gate)'', ''response'':
      ''Escalate to Showrunner immediately; mark TU blocked; require upstream fix before distribution''}, {''error'': ''Too
      many issues to process in timebox'', ''response'': ''Complete with partial coverage; prioritize high-traffic routes
      and severe issues; defer edge cases''}]'
id: narration_dry_run
