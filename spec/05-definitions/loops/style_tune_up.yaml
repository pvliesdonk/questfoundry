# QuestFoundry Loop Pattern: Style Tune-up
# Layer 5 Definition — validates against spec/03-schemas/definitions/loop_pattern.schema.json

metadata:
  version: "0.1.0"
  schema_ref: "../../03-schemas/definitions/loop_pattern.schema.json"
  name: "style_tune_up"
  description: "Detect and correct style drift in voice, register, motifs, and aesthetic guardrails"
  layer0_guide_ref: "../../00-north-star/LOOPS/style_tune_up.md"
  created: "2025-11-19"
  updated: "2025-11-19"

identity:
  canonical_name: "Style Tune-up"
  aliases:
    - "Style Pass"
    - "Voice Tune-up"
  purpose: >
    Detect and correct style drift across prose, captions, PN lines, and codex entries without
    re-architecting the story. Tighten voice, register, motifs, and visual guardrails so the book
    reads like one mind made it.
  outcome: >
    A consolidated style addendum with specific edit notes to owners, plus a green
    Style/Presentation pre-gate—ready for merge after downstream fixes.

topology:
  nodes:
    - id: "showrunner_initiate"
      role: "Showrunner"
      intent: "tu.open"
      description: "Open TU with scope (target slice), trigger conditions, deliverables"

    - id: "style_diagnose_drift"
      role: "Style Lead"
      intent: "style.diagnose"
      description: "Sample sections, PN lines, captions; tag drift issues (voice-shift, register-mismatch, choice-ambiguity, etc.)"

    - id: "style_write_addendum"
      role: "Style Lead"
      intent: "style.addendum"
      description: "Write style addendum with rules, motif kit, banned phrases, exemplars, localization notes"

    - id: "style_write_edit_notes"
      role: "Style Lead"
      intent: "style.edit_note"
      description: "Write surgical edit notes per section/entry/caption with owner assignment"

    - id: "style_write_pn_patterns"
      role: "Style Lead"
      intent: "style.pn_pattern"
      description: "Create reusable PN phrasing patterns for diegetic gates/refusals if PN friction detected"

    - id: "consult_owners_parallel"
      role: "multiple"
      intent: "consultation.parallel"
      description: "Fan-out to owners for review and revision application"

    - id: "scene_smith_revise"
      role: "Scene Smith"
      intent: "scene.revise"
      description: "Apply edit notes to prose sections, preserve author intent"

    - id: "pn_revise_phrasing"
      role: "Player-Narrator"
      intent: "pn.revise"
      description: "Apply PN pattern updates and phrasing fixes"

    - id: "curator_revise_entries"
      role: "Codex Curator"
      intent: "codex.revise"
      description: "Apply edit notes to codex entries for clarity and register"
      optional: true

    - id: "art_director_revise_captions"
      role: "Art Director"
      intent: "art.revise_caption"
      description: "Apply caption phrasing fixes (atmospheric, no technique)"
      optional: true

    - id: "audio_director_revise_cues"
      role: "Audio Director"
      intent: "audio.revise_cue"
      description: "Align cue sheet language with register"
      optional: true

    - id: "translator_note_review"
      role: "Translator"
      intent: "translation.note_review"
      description: "Review localization cues and idiom alternatives"
      optional: true

    - id: "style_collect_revisions"
      role: "Style Lead"
      intent: "style.review_revisions"
      description: "Review owner revisions for style compliance; iterate if needed"

    - id: "gatekeeper_pre_gate"
      role: "Gatekeeper"
      intent: "gatecheck.run"
      description: "Pre-check Style and Presentation bars; ensure no spoilers/internals leaked"

    - id: "showrunner_package"
      role: "Showrunner"
      intent: "tu.close"
      description: "Package style addendum + edit notes + pre-gate note; approve or iterate"

  edges:
    - from: "showrunner_initiate"
      to: "style_diagnose_drift"
      condition: null

    - from: "style_diagnose_drift"
      to: "style_write_addendum"
      condition: null

    - from: "style_write_addendum"
      to: "style_write_edit_notes"
      condition: null

    - from: "style_write_edit_notes"
      to: "style_write_pn_patterns"
      condition: "PN friction detected in diagnosis"

    - from: "style_write_edit_notes"
      to: "consult_owners_parallel"
      condition: "No PN friction OR PN patterns complete"

    - from: "style_write_pn_patterns"
      to: "consult_owners_parallel"
      condition: null

    - from: "consult_owners_parallel"
      to: "scene_smith_revise"
      condition: "Scene Smith edit notes exist"

    - from: "consult_owners_parallel"
      to: "pn_revise_phrasing"
      condition: "PN edit notes or patterns exist"

    - from: "consult_owners_parallel"
      to: "curator_revise_entries"
      condition: "Codex Curator edit notes exist"

    - from: "consult_owners_parallel"
      to: "art_director_revise_captions"
      condition: "Art Director edit notes exist"

    - from: "consult_owners_parallel"
      to: "audio_director_revise_cues"
      condition: "Audio Director edit notes exist"

    - from: "consult_owners_parallel"
      to: "translator_note_review"
      condition: "Localization cues exist"

    - from: "scene_smith_revise"
      to: "style_collect_revisions"
      condition: null

    - from: "pn_revise_phrasing"
      to: "style_collect_revisions"
      condition: null

    - from: "curator_revise_entries"
      to: "style_collect_revisions"
      condition: null

    - from: "art_director_revise_captions"
      to: "style_collect_revisions"
      condition: null

    - from: "audio_director_revise_cues"
      to: "style_collect_revisions"
      condition: null

    - from: "translator_note_review"
      to: "style_collect_revisions"
      condition: null

    - from: "style_collect_revisions"
      to: "gatekeeper_pre_gate"
      condition: "All revisions reviewed and approved by Style Lead"

    - from: "style_collect_revisions"
      to: "style_write_edit_notes"
      condition: "Revisions need iteration (style compliance issues remain)"

    - from: "gatekeeper_pre_gate"
      to: "showrunner_package"
      condition: null

  exit_conditions:
    - condition: "Showrunner approves package (style addendum + pre-gate green)"
      next_state: "completed"
      triggers:
        - "merge.request"

    - condition: "Showrunner requests iteration (pre-gate yellow/red)"
      next_state: "in_progress"
      triggers:
        - "tu.update"

    - condition: "Blocked: structural changes needed (escalate to Story Spark)"
      next_state: "blocked"
      triggers:
        - "tu.blocked"

protocol_flow:
  message_sequences:
    - sequence_id: "initiate"
      description: "Showrunner opens TU with scope and trigger conditions"
      steps:
        - from: "Showrunner"
          to: "Style Lead"
          intent: "tu.open"
          payload:
            - "tu_id"
            - "scope (target slice: sections, codex batch, caption set)"
            - "trigger (PN tonal wobble, new chapter register mismatch, localization issues)"
            - "deliverables (style addendum, edit notes, pre-gate)"

    - sequence_id: "diagnose_and_addendum"
      description: "Style Lead diagnoses drift and writes addendum with exemplars"
      steps:
        - from: "Style Lead"
          to: "State"
          intent: "style.diagnose"
          payload:
            - "drift_issues (location, type, severity, description)"
            - "summary"

        - from: "Style Lead"
          to: "State"
          intent: "style.addendum"
          payload:
            - "addendum_id"
            - "rules (register, motif, rhythm, banned phrases)"
            - "motif_kit"
            - "exemplars (before/after/rationale)"
            - "localization_notes"

    - sequence_id: "edit_notes_to_owners"
      description: "Style Lead writes edit notes and optional PN patterns"
      steps:
        - from: "Style Lead"
          to: "State"
          intent: "style.edit_note"
          payload:
            - "target_artifact (section/entry/caption ID)"
            - "owner (Scene Smith, Curator, Art Director, etc.)"
            - "issue"
            - "fix_suggestion"
            - "priority"

        - from: "Style Lead"
          to: "State"
          intent: "style.pn_pattern"
          payload:
            - "pattern_id"
            - "scenario"
            - "diegetic_phrasing"
            - "variants"
          condition: "PN friction detected"

    - sequence_id: "owner_revisions"
      description: "Content owners apply edits and return revisions"
      steps:
        - from: "Scene Smith"
          to: "State"
          intent: "scene.revise"
          payload:
            - "section_id"
            - "revised_content"
            - "author_notes (if intent preservation needed)"

        - from: "Player-Narrator"
          to: "State"
          intent: "pn.revise"
          payload:
            - "pn_line_id"
            - "revised_phrasing"

        - from: "Codex Curator"
          to: "State"
          intent: "codex.revise"
          payload:
            - "entry_id"
            - "revised_content"
          condition: "Curator edit notes exist"

        - from: "Art Director"
          to: "State"
          intent: "art.revise_caption"
          payload:
            - "caption_id"
            - "revised_caption"
          condition: "Art edit notes exist"

        - from: "Audio Director"
          to: "State"
          intent: "audio.revise_cue"
          payload:
            - "cue_id"
            - "revised_cue_text"
          condition: "Audio edit notes exist"

        - from: "Translator"
          to: "State"
          intent: "translation.note_review"
          payload:
            - "localization_cue_id"
            - "acknowledgment or alternative_suggestion"
          condition: "Localization cues exist"

    - sequence_id: "pre_gate_and_package"
      description: "Gatekeeper checks Style/Presentation, Showrunner packages"
      steps:
        - from: "Gatekeeper"
          to: "State"
          intent: "gatecheck.run"
          payload:
            - "check_type: style_presentation_pre_gate"
            - "bars_checked: [Style, Presentation]"
            - "status (green/yellow/red)"
            - "notes"

        - from: "Showrunner"
          to: "State"
          intent: "tu.close"
          payload:
            - "tu_id"
            - "package (style addendum, edit notes, pre-gate note)"
            - "decision (approve/iterate)"

gates:
  pre_gates:
    - gate_id: "style_presentation_pre_gate"
      role: "Gatekeeper"
      bars_checked:
        - "Style"
        - "Presentation"
      timing: "after_owner_revisions"
      blocking: false
      advisory_only: false
      rationale: "Ensure voice consistency and player-safe surfaces before merge"

  merge_gates:
    - gate_id: "final_style_gate"
      role: "Gatekeeper"
      bars_checked:
        - "Style"
        - "Presentation"
      timing: "before_merge"
      blocking: true
      advisory_only: false
      rationale: "Block merge if style drift remains or internals leaked to surfaces"

traceability:
  tu_lifecycle:
    creates_tus: false
    updates_tu_status: true
    transitions:
      - from: "proposed"
        to: "in_progress"
        trigger: "Showrunner opens TU"
      - from: "in_progress"
        to: "gatecheck"
        trigger: "Style Lead completes edits, Gatekeeper runs pre-gate"
      - from: "gatecheck"
        to: "completed"
        trigger: "Showrunner approves package after green pre-gate"
      - from: "gatecheck"
        to: "in_progress"
        trigger: "Pre-gate yellow/red, iteration needed"
      - from: "in_progress"
        to: "blocked"
        trigger: "Structural changes needed (escalate to Story Spark)"

  produces_hot:
    - "style_addenda"
    - "edit_notes"
    - "pn_patterns"
    - "localization_cues"
    - "revised_sections (via Scene Smith)"
    - "revised_pn_lines (via Player-Narrator)"
    - "revised_codex_entries (via Curator, optional)"
    - "revised_captions (via Art Director, optional)"
    - "revised_cues (via Audio Director, optional)"

  produces_cold: []

  snapshot_dependencies:
    reads_from_cold:
      - "current_snapshot.style_addenda (detect drift from published guide)"
      - "current_snapshot.sections (comparison baseline)"
    writes_to_cold: []

roles:
  primary:
    - role: "Style Lead"
      raci: "responsible"
      required: true

  supporting:
    - role: "Showrunner"
      raci: "accountable"
      required: true

    - role: "Scene Smith"
      raci: "consulted"
      required: false
      wake_condition: "Scene edit notes exist"

    - role: "Player-Narrator"
      raci: "consulted"
      required: false
      wake_condition: "PN friction detected or phrasing patterns created"

    - role: "Codex Curator"
      raci: "consulted"
      required: false
      wake_condition: "Codex entry edit notes exist"

    - role: "Art Director"
      raci: "consulted"
      required: false
      wake_condition: "Caption edit notes exist"

    - role: "Audio Director"
      raci: "consulted"
      required: false
      wake_condition: "Cue sheet edit notes exist"

    - role: "Translator"
      raci: "consulted"
      required: false
      wake_condition: "Localization cues provided"

    - role: "Gatekeeper"
      raci: "consulted"
      required: true

context:
  required_state:
    - "hot_sot.sections (prose to review)"
    - "cold_sot.current_snapshot.style_addenda (baseline for drift detection)"

  optional_state:
    - "hot_sot.pn_notes (PN friction reports)"
    - "hot_sot.translation_notes (localization issues)"
    - "hot_sot.codex_entries (for phrasing review)"
    - "hot_sot.canon_packs (for tone alignment with lore)"
    - "artifacts.captions (visual phrasing)"
    - "artifacts.cue_sheets (audio phrasing)"

  quality_bar_focus:
    - bar_name: "Style"
      pressure: "high"
      rationale: "Core loop for voice, register, motif consistency"

    - bar_name: "Presentation"
      pressure: "high"
      rationale: "Ensure player-safe surfaces, no spoilers, no internals, contrastive choices, diegetic gates"

    - bar_name: "Accessibility"
      pressure: "medium"
      rationale: "Alt text, caption phrasing, readable sentence length reviewed"

success_criteria:
  required:
    - "Style addendum updated with 3-5 fresh exemplars (before/after/rationale)"
    - "Ambiguous choices flagged or corrected with micro-context suggestions"
    - "PN patterns for gates/refusals are diegetic and reusable (no meta-talk)"
    - "Edit notes are small and surgical; owners can apply in one pass"
    - "Gatekeeper reports Style and Presentation bars green"

  optional:
    - "Localization cues provided for untranslatable idioms"
    - "Hooks filed for missing codex anchors or structural ambiguity"
    - "Captions/alt text reviewed: atmospheric, no technique"

  definition_of_done:
    - "Style addendum merged to Cold via Showrunner approval"
    - "Owner revisions applied and validated by Style Lead"
    - "Pre-gate green on Style and Presentation"
    - "No spoilers or internals leaked to surfaces"

failure_modes:
  - mode: "Overcorrection flattens character voice"
    remedy: "Keep character idiolect; harmonize narration only, don't sand all voices flat"

  - mode: "Style change implies story change"
    remedy: "Route to Story Spark; don't smuggle structure changes via style edits"

  - mode: "Caption spoilers"
    remedy: "Move detail to canon notes; rewrite caption atmospheric only"

  - mode: "Untranslatable idioms"
    remedy: "Provide neutral phrasing or region-appropriate equivalents in localization cues"

  - mode: "Owners resist edits (authorial voice concerns)"
    remedy: "Pair with owner to preserve intent while hitting style; escalate to Showrunner if policy-level"

handoffs:
  from_loops:
    - loop: "Story Spark"
      artifact: "prose drafts, section briefs"
      trigger: "New prose needs style review"

    - loop: "Codex Expansion"
      artifact: "codex entries"
      trigger: "Entry phrasing needs register alignment"

    - loop: "Narration Dry-Run"
      artifact: "pn_notes (friction reports)"
      trigger: "PN reports tone wobble or gate phrasing issues"

    - loop: "Translation Pass"
      artifact: "translation_notes"
      trigger: "Translator flags untranslatable idioms or register conflicts"

  to_loops:
    - loop: "Story Spark"
      artifact: "hooks (structural ambiguity)"
      condition: "Style issues reveal topology problems"

    - loop: "Codex Expansion"
      artifact: "hooks (missing anchors)"
      condition: "Style Lead identifies missing codex anchors for recurring phrases"

    - loop: "Gatecheck"
      artifact: "style_addendum, revised_sections, pre_gate_note"
      condition: "Style Tune-up complete, ready for final gate"

execution:
  max_iterations: 2
  timebox_minutes: 60
  timeout_behavior: "escalate_to_showrunner"
  error_handling:
    - error: "Owners unavailable for revisions"
      response: "Defer edit notes; Style Lead applies critical fixes, logs deferred items"

    - error: "Pre-gate yellow/red on Style or Presentation"
      response: "Iterate: Style Lead refines addendum/edits, owners re-apply"

    - error: "Structural changes needed (topology/canon implications)"
      response: "Block and escalate to Showrunner; route to Story Spark or Lore Deepening"
