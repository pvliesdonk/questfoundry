# Loop Pattern: Binding Run
# Compiled from: spec/00-north-star/LOOPS/binding_run.md
# Schema: spec/03-schemas/definitions/loop_pattern.schema.json

id: binding_run

metadata:
  name: "Binding Run"
  type: "Export"
  description: |
    Assemble a player-safe export view of the book from a specific Cold snapshot. Package
    manuscript, codex, and checklists - optionally including art/audio plans or assets and
    translation slices - without leaking spoilers or internal plumbing.

topology:
  entry_node: assemble

  nodes:
    - id: assemble
      role: "Book Binder"
      description: "Compile hyperlinked sections from Cold snapshot; ensure terminals clearly marked. Generate codeword/gateway checklists in player-safe wording. Attach codex with See also crosslinks."
      next: validate_accessibility

    - id: validate_accessibility
      role: "Book Binder"
      description: "Alt text, descriptive link text, proper headings; high-contrast print layout if enabled. No motion/flash surprises; audio warnings where needed. Verify all links resolve."
      next: render

    - id: render
      role: "Book Binder"
      description: "Emit Markdown (source), HTML, EPUB, PDF (single-column, print-friendly). Stamp front matter with title, credits, Cold snapshot ID, options used, coverage %. Generate View Log page."
      next: null

  edges:
    - from: assemble
      to: validate_accessibility
      condition: bundle_assembled
    - from: validate_accessibility
      to: render
      condition: accessibility_verified

traceability:
  tu_lifecycle:
    required: true
  produces_cold: false

context:
  required_artifacts:
    - cold_snapshot
    - gatecheck_report
  optional_artifacts:
    - art_plan
    - render
    - audio_plan
    - rendered_cue
    - language_pack

handoffs:
  - target: narration_dry_run
    condition: "export bundle ready for PN playtest"

gates:
  quality_bars:
    - Integrity
    - Presentation
    - Style
    - Accessibility

protocol_flow:
  flow_ref: "spec/04-protocol/FLOWS/binding_run.md"
  message_sequences:
    - step: 1
      sender: "BB"
      receiver: "*"
      intent: "tu.start"
      description: "Initiate the Binding Run loop"
    - step: 2
      sender: "GK"
      receiver: "SR"
      intent: "gate.report.submit"
      description: "Standard quality gate check"

success_criteria:
  - Bundle is player-safe, navigable, and accessible
  - Snapshot & options are clear and consistent across formats
  - PN can run a Narration Dry-Run without encountering leaks
  - Known limitations are disclosed in the View Log
