# QuestFoundry Loop Pattern: Binding Run
# Layer 5 Definition — validates against spec/03-schemas/definitions/loop_pattern.schema.json

metadata:
  version: "0.1.0"
  schema_ref: "../../03-schemas/definitions/loop_pattern.schema.json"
  name: "binding_run"
  description: "Assemble player-safe export view from Cold snapshot with navigation and front matter"
  layer0_guide_ref: "../../00-north-star/LOOPS/binding_run.md"
  created: "2025-11-19"
  updated: "2025-11-19"

identity:
  canonical_name: "Binding Run"
  aliases:
    - "Export Assembly"
    - "View Generation"
  purpose: >
    Assemble a player-safe export view of the book from a specific Cold snapshot. Package
    manuscript, codex, and optional surfaces (art/audio/translations) without leaking spoilers
    or internal plumbing.
  outcome: >
    A stamped export bundle (Markdown/HTML/EPUB/PDF) with front-matter metadata (snapshot ID,
    options used) and a View Log. No new canon is created; this loop does NOT write to Cold
    content (only View Log for traceability).

topology:
  nodes:
    - id: "showrunner_select"
      role: "Showrunner"
      intent: "snapshot.select"
      description: "Choose Cold snapshot and export options (art/audio/languages/layout)"

    - id: "binder_confirm"
      role: "Book Binder"
      intent: "view.confirm"
      description: "Verify snapshot is Cold-only and options are feasible"

    - id: "binder_assemble_manuscript"
      role: "Book Binder"
      intent: "view.assemble_manuscript"
      description: "Compile hyperlinked sections, build TOC, mark terminals, generate player-safe checklists"

    - id: "binder_attach_codex"
      role: "Book Binder"
      intent: "view.attach_codex"
      description: "Include codex entries with crosslinks, validate See-also references"

    - id: "binder_include_surfaces"
      role: "Book Binder"
      intent: "view.include_surfaces"
      description: "Attach art/audio/translations per options (plans vs assets, coverage flags)"

    - id: "binder_integrity_pass"
      role: "Book Binder"
      intent: "view.validate_integrity"
      description: "Validate all anchors/links/refs across formats; identify broken links, orphans, collisions"

    - id: "binder_accessibility_pass"
      role: "Book Binder"
      intent: "view.validate_accessibility"
      description: "Check alt text, descriptive links, headings, contrast; flag gaps"

    - id: "binder_stamp_metadata"
      role: "Book Binder"
      intent: "view.stamp"
      description: "Create front matter with snapshot ID, options, coverage, accessibility summary"

    - id: "binder_export_formats"
      role: "Book Binder"
      intent: "view.export"
      description: "Generate MD/HTML/EPUB/PDF with verified anchors across formats"

    - id: "style_sanity_check"
      role: "Style Lead"
      intent: "style.sanity_check"
      description: "Quick check on tone consistency in visible surfaces (titles/captions)"
      optional: true

    - id: "translator_coverage_check"
      role: "Translator"
      intent: "translation.coverage_check"
      description: "Verify translation coverage flags and link integrity if translations included"
      optional: true

    - id: "gatekeeper_spot_check"
      role: "Gatekeeper"
      intent: "gatecheck.spot_check"
      description: "Spot-check Presentation Safety, Integrity, Style on built bundle before distribution"

    - id: "binder_generate_view_log"
      role: "Book Binder"
      intent: "view.log"
      description: "Update View Log with TUs merged, options, limitations for traceability"

    - id: "showrunner_approve"
      role: "Showrunner"
      intent: "view.approve"
      description: "Approve distribution or request iteration; notify PN if dry-run bundle"

  edges:
    - from: "showrunner_select"
      to: "binder_confirm"
      condition: null

    - from: "binder_confirm"
      to: "binder_assemble_manuscript"
      condition: "Snapshot is Cold-only AND options are feasible"

    - from: "binder_confirm"
      to: "showrunner_select"
      condition: "Snapshot contains Hot paths OR options conflict (abort and re-select)"

    - from: "binder_assemble_manuscript"
      to: "binder_attach_codex"
      condition: null

    - from: "binder_attach_codex"
      to: "binder_include_surfaces"
      condition: null

    - from: "binder_include_surfaces"
      to: "binder_integrity_pass"
      condition: null

    - from: "binder_integrity_pass"
      to: "binder_accessibility_pass"
      condition: "Integrity PASS OR issues documented in hooks (can proceed with warnings)"

    - from: "binder_integrity_pass"
      to: "binder_confirm"
      condition: "Integrity FAIL with blocking issues (rebuild needed)"

    - from: "binder_accessibility_pass"
      to: "binder_stamp_metadata"
      condition: null

    - from: "binder_stamp_metadata"
      to: "binder_export_formats"
      condition: null

    - from: "binder_export_formats"
      to: "style_sanity_check"
      condition: "Style Lead available and sanity check requested"

    - from: "binder_export_formats"
      to: "translator_coverage_check"
      condition: "Translations included and Translator available"

    - from: "binder_export_formats"
      to: "gatekeeper_spot_check"
      condition: "No optional checks OR optional checks complete"

    - from: "style_sanity_check"
      to: "gatekeeper_spot_check"
      condition: null

    - from: "translator_coverage_check"
      to: "gatekeeper_spot_check"
      condition: null

    - from: "gatekeeper_spot_check"
      to: "binder_generate_view_log"
      condition: "Spot-check green OR yellow with acceptable notes"

    - from: "gatekeeper_spot_check"
      to: "binder_confirm"
      condition: "Spot-check red (spoiler leaks, broken links, accessibility blockers)"

    - from: "binder_generate_view_log"
      to: "showrunner_approve"
      condition: null

  exit_conditions:
    - condition: "Showrunner approves bundle for distribution"
      next_state: "completed"
      triggers:
        - "view.distributed"

    - condition: "Showrunner requests iteration (spot-check issues or options change)"
      next_state: "in_progress"
      triggers:
        - "snapshot.select"

    - condition: "Blocked: Cannot assemble from snapshot without upstream fixes"
      next_state: "blocked"
      triggers:
        - "tu.blocked"

protocol_flow:
  message_sequences:
    - sequence_id: "select_and_confirm"
      description: "Showrunner selects snapshot and options, Binder confirms feasibility"
      steps:
        - from: "Showrunner"
          to: "Book Binder"
          intent: "snapshot.select"
          payload:
            - "snapshot_id (Cold only)"
            - "options (art: none/plans/full, audio: none/plans/full, languages, print_friendly, pn_script)"
            - "purpose (milestone release, playtest, external review)"

        - from: "Book Binder"
          to: "State"
          intent: "view.confirm"
          payload:
            - "snapshot_verified (cold_only: boolean)"
            - "options_feasible (boolean)"
            - "conflicts_found (array, if any)"

    - sequence_id: "assemble_content"
      description: "Binder assembles manuscript, codex, optional surfaces"
      steps:
        - from: "Book Binder"
          to: "State"
          intent: "view.assemble_manuscript"
          payload:
            - "sections_compiled (count, TOC depth)"
            - "terminals_marked (boolean)"
            - "checklists_player_safe (boolean)"

        - from: "Book Binder"
          to: "State"
          intent: "view.attach_codex"
          payload:
            - "entries_attached (count)"
            - "crosslinks_validated (all_resolved: boolean, broken_links: array)"

        - from: "Book Binder"
          to: "State"
          intent: "view.include_surfaces"
          payload:
            - "art_included (none/plans/full)"
            - "audio_included (none/plans/full)"
            - "translations_included (languages with coverage %)"
            - "surface_validation (alt_text, no_technique_leaks)"

    - sequence_id: "validate_and_stamp"
      description: "Binder validates integrity/accessibility and stamps metadata"
      steps:
        - from: "Book Binder"
          to: "State"
          intent: "view.validate_integrity"
          payload:
            - "broken_anchors (array)"
            - "orphan_pages (array)"
            - "cross_format_issues (array)"
            - "locale_collisions (array)"
            - "status (pass/warn/fail)"
            - "hooks_proposed (if issues need upstream fixes)"

        - from: "Book Binder"
          to: "State"
          intent: "view.validate_accessibility"
          payload:
            - "alt_text_status (present/partial/none)"
            - "descriptive_links (pass/fail)"
            - "heading_structure (valid/invalid)"
            - "contrast_check (pass/fail)"
            - "status (pass/warn/fail)"

        - from: "Book Binder"
          to: "State"
          intent: "view.stamp"
          payload:
            - "front_matter (snapshot_id, options, coverage, accessibility, limitations)"
            - "gatecheck_ref (if available)"

    - sequence_id: "export_and_check"
      description: "Binder exports formats, optional roles sanity-check, Gatekeeper spots"
      steps:
        - from: "Book Binder"
          to: "State"
          intent: "view.export"
          payload:
            - "formats_generated (MD, HTML, EPUB, PDF)"
            - "anchor_verification (all_formats_pass: boolean)"
            - "bundle_paths (file locations)"

        - from: "Style Lead"
          to: "State"
          intent: "style.sanity_check"
          payload:
            - "tone_consistent (boolean)"
            - "visible_surfaces_reviewed (titles, captions)"
            - "notes (if any drift detected)"
          condition: "Style sanity check requested"

        - from: "Translator"
          to: "State"
          intent: "translation.coverage_check"
          payload:
            - "coverage_flags_accurate (boolean)"
            - "anchor_integrity_across_locales (boolean)"
            - "notes (if issues found)"
          condition: "Translations included"

        - from: "Gatekeeper"
          to: "State"
          intent: "gatecheck.spot_check"
          payload:
            - "check_type: export_spot_check"
            - "bars_checked: [Presentation, Integrity, Style, Accessibility]"
            - "status (green/yellow/red)"
            - "spoiler_leaks_found (array)"
            - "broken_links_found (array)"
            - "accessibility_issues (array)"

    - sequence_id: "log_and_approve"
      description: "Binder generates View Log, Showrunner approves distribution"
      steps:
        - from: "Book Binder"
          to: "State"
          intent: "view.log"
          payload:
            - "view_log_entry (snapshot_id, date, options, TUs merged, limitations)"
            - "anchor_map_generated (boolean)"

        - from: "Showrunner"
          to: "State"
          intent: "view.approve"
          payload:
            - "decision (approve_distribution / request_iteration / block)"
            - "distribution_target (PN dry-run / external review / milestone release / archive)"
            - "notifications (PN, stakeholders)"

gates:
  pre_gates:
    - gate_id: "binder_integrity_check"
      role: "Book Binder"
      bars_checked:
        - "Integrity"
      timing: "after_surface_inclusion"
      blocking: false
      advisory_only: false
      rationale: "Self-check integrity before export; can proceed with documented warnings"

    - gate_id: "binder_accessibility_check"
      role: "Book Binder"
      bars_checked:
        - "Accessibility"
      timing: "after_integrity_pass"
      blocking: false
      advisory_only: false
      rationale: "Self-check accessibility; flag gaps for future work"

  merge_gates:
    - gate_id: "export_spot_check"
      role: "Gatekeeper"
      bars_checked:
        - "Presentation"
        - "Integrity"
        - "Style"
        - "Accessibility"
      timing: "before_distribution"
      blocking: true
      advisory_only: false
      rationale: "Block distribution if spoiler leaks, broken links, or critical accessibility issues"

traceability:
  tu_lifecycle:
    creates_tus: false
    updates_tu_status: true
    transitions:
      - from: "proposed"
        to: "in_progress"
        trigger: "Showrunner selects snapshot and opens binding TU"
      - from: "in_progress"
        to: "completed"
        trigger: "Showrunner approves bundle after spot-check green"
      - from: "in_progress"
        to: "blocked"
        trigger: "Cannot assemble without upstream fixes (broken links, missing content)"

  produces_hot:
    - "hooks (when binding reveals upstream issues)"

  produces_cold:
    - "view_logs (traceability only, no content changes)"

  snapshot_dependencies:
    reads_from_cold:
      - "snapshots[snapshot_id].manuscript"
      - "snapshots[snapshot_id].codex_entries"
      - "snapshots[snapshot_id].style_addenda"
      - "snapshots[snapshot_id].translations (optional)"
      - "snapshots[snapshot_id].art_plans (optional)"
      - "snapshots[snapshot_id].audio_plans (optional)"
    writes_to_cold:
      - "snapshots[snapshot_id].view_log"

roles:
  primary:
    - role: "Book Binder"
      raci: "responsible"
      required: true

  supporting:
    - role: "Showrunner"
      raci: "accountable"
      required: true

    - role: "Gatekeeper"
      raci: "consulted"
      required: true

    - role: "Style Lead"
      raci: "consulted"
      required: false
      wake_condition: "Sanity check on visible surfaces (titles/captions)"

    - role: "Translator"
      raci: "consulted"
      required: false
      wake_condition: "Translations included; verify coverage flags and link integrity"

    - role: "Player-Narrator"
      raci: "informed"
      required: false
      wake_condition: "Bundle is for dry-run playtest"

context:
  required_state:
    - "cold_sot.snapshots[snapshot_id] (full snapshot contents)"

  optional_state:
    - "gates.current_gatecheck (latest gatekeeper notes)"
    - "hot_sot.style_addenda (for label guidance)"

  quality_bar_focus:
    - bar_name: "Integrity"
      pressure: "very_high"
      rationale: "All anchors/links must resolve across formats; no orphans, no 404s"

    - bar_name: "Presentation"
      pressure: "very_high"
      rationale: "No spoilers, no internals on any surface (front matter, labels, navigation)"

    - bar_name: "Accessibility"
      pressure: "high"
      rationale: "Alt text, descriptive links, headings, contrast, text equivalents for audio"

    - bar_name: "Style"
      pressure: "medium"
      rationale: "Tone consistency in visible surfaces (titles, captions, labels)"

success_criteria:
  required:
    - "Bundle built from exactly one Cold snapshot (no Hot paths)"
    - "All links/anchors resolve across formats (MD/HTML/EPUB/PDF)"
    - "No orphan sections (every section reachable from TOC)"
    - "Terminals marked clearly (story endpoints obvious)"
    - "Codex coverage sufficient; See-also links resolve"
    - "Alt text present for non-decorative images; descriptive (not technique)"
    - "Descriptive link text (no 'click here' or 'see here')"
    - "Proper heading structure (no skipped levels, meaningful titles)"
    - "Options correctly reflected in front matter (art/audio/translations)"
    - "Translations flagged complete/incomplete with coverage percentages"
    - "Front matter stamped with snapshot ID, options, accessibility, coverage, limitations"
    - "View Log updated with TUs merged (player-safe titles), known limitations"
    - "No internals on surfaces (codewords, gate logic, seeds/models, technique)"
    - "Gatekeeper spot-check green (Presentation + Integrity + Accessibility)"

  optional:
    - "Style sanity check confirms tone consistency"
    - "Translator coverage check confirms accuracy"
    - "Anchor Map generated for debugging"
    - "Assembly Notes document harmless normalizations"

  definition_of_done:
    - "Bundle approved by Showrunner for distribution"
    - "PN receives bundle if dry-run playtest"
    - "View Log written to Cold for traceability"
    - "Known limitations disclosed in front matter"

failure_modes:
  - mode: "Built from Hot or mixed sources"
    remedy: "ABORT: Rebuild from Cold snapshot only; verify snapshot ID format"

  - mode: "Spoiler in captions/front matter"
    remedy: "Propose hook to Art Director / Lore Weaver; move detail to canon notes; rewrite surface text player-safe"

  - mode: "Broken anchors across formats"
    remedy: "If harmless (format-specific quirk): normalize. If content issue: propose hook to owner; re-bind after fix"

  - mode: "Accessibility gaps (missing alt text, non-descriptive links)"
    remedy: "Flag in front matter as limitation; propose hooks to Art Director / Scene Smith / Codex Curator"

  - mode: "Mismatched options (front matter claims 'full art' but no renders)"
    remedy: "Correct front matter to reflect actual inclusions; update View Log with accurate status"

  - mode: "Locale anchor collisions (EN/NL slugs conflict)"
    remedy: "Propose hook to Translator; add locale prefix (/en/, /nl/) or unique slugs; re-export"

handoffs:
  from_loops:
    - loop: "Gatecheck"
      artifact: "gatecheck_report (latest bars status)"
      trigger: "Before binding; use report ID in front matter"

    - loop: "Story Spark"
      artifact: "manuscript sections (in Cold snapshot)"
      trigger: "After merge to Cold; content ready for export"

    - loop: "Codex Expansion"
      artifact: "codex_entries (in Cold snapshot)"
      trigger: "After merge to Cold; entries ready for inclusion"

    - loop: "Style Tune-up"
      artifact: "style_addenda (in Cold snapshot)"
      trigger: "For label/typography guidance"

    - loop: "Translation Pass"
      artifact: "translation slices (in Cold snapshot)"
      trigger: "If translations included in export options"

  to_loops:
    - loop: "Narration Dry-Run"
      artifact: "export_bundle (for PN playtest)"
      condition: "Bundle approved for dry-run"

    - loop: "Hook Harvest"
      artifact: "hooks (broken anchors, missing content, label issues)"
      condition: "Binding reveals upstream issues"

    - loop: "Scene Smith / Codex Curator / Style Lead"
      artifact: "hooks (specific upstream fixes needed)"
      condition: "Integrity/Accessibility/Presentation issues found"

execution:
  max_iterations: 2
  timebox_minutes: 45
  timeout_behavior: "defer_optional_surfaces"
  error_handling:
    - error: "Snapshot contains Hot paths"
      response: "ABORT: Report to Showrunner; re-select Cold snapshot"

    - error: "Broken links cannot be resolved (missing content)"
      response: "Propose hooks to owners; document limitation in front matter; re-bind after upstream fixes"

    - error: "Spot-check red (spoiler leaks)"
      response: "Iterate: Propose hooks to content owners; re-export after upstream fixes"

    - error: "Cross-format anchor failures (EPUB/PDF specific)"
      response: "If format-specific quirk: apply harmless normalization. If content issue: propose hook"

    - error: "Optional surface missing (options claim 'full art' but no renders)"
      response: "Downgrade option in front matter (plans only); update View Log; notify Showrunner"
