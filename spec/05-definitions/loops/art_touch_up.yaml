# QuestFoundry Loop Pattern: Art Touch-up
# Layer 5 Definition — validates against spec/03-schemas/definitions/loop_pattern.schema.json

metadata:
  version: "0.1.0"
  schema_ref: "../../03-schemas/definitions/loop_pattern.schema.json"
  name: "art_touch_up"
  description: "Plan and optionally produce illustrations with spoiler-safe captions and alt text; supports plan-only merges"
  layer0_guide_ref: "../../00-north-star/LOOPS/art_touch_up.md"
  created: "2025-11-19"
  updated: "2025-11-19"

identity:
  canonical_name: "Art Touch-up"
  aliases:
    - "Art Planning"
    - "Illustration Pass"
  purpose: >
    Decide what to illustrate and why, then (optionally) produce illustrations that match style
    and narrative intent—without leaking spoilers. This loop supports plan-only merges when the
    Illustrator is dormant.
  outcome: >
    An Art Plan (subjects, purpose, composition intent, captions, constraints) and, if Illustrator
    is active, art renders with determinism notes. Ready for Gatekeeper checks and merge to Cold
    (plans may merge as deferred; renders merge only on full pass).

topology:
  nodes:
    - id: "showrunner_scope_slice"
      role: "Showrunner"
      intent: "tu.scope"
      description: "Set scope: one chapter or hub path (3-7 slots); decide plan-only vs render"

    - id: "art_director_select_justify"
      role: "Art Director"
      intent: "art.select_slots"
      description: "Select scenes/subjects; state purpose (clarify/recall/mood/signpost); assess spoiler risk"

    - id: "art_director_write_plans"
      role: "Art Director"
      intent: "art.write_plan"
      description: "Write Art Plans: composition intent, caption (player-safe), constraints, accessibility notes"

    - id: "style_alignment"
      role: "Style Lead"
      intent: "style.align_visual"
      description: "Tune plans to guardrails; add motif tie-ins; veto style drift"

    - id: "illustrator_render"
      role: "Illustrator"
      intent: "art.render"
      description: "Produce candidate renders; refine to intent; record determinism log; provide alt text"
      optional: true

    - id: "gatekeeper_pre_gate"
      role: "Gatekeeper"
      intent: "gate.pre_gate"
      description: "Check Style, Presentation Safety (no spoilers in captions/alt), Determinism (if promised)"

    - id: "showrunner_package_handoff"
      role: "Showrunner"
      intent: "tu.package"
      description: "Attach Art Plans and (if produced) renders + logs to TU; notify Binder about inclusion options"

  edges:
    - from: "showrunner_scope_slice"
      to: "art_director_select_justify"
      condition: null

    - from: "art_director_select_justify"
      to: "art_director_write_plans"
      condition: null

    - from: "art_director_write_plans"
      to: "style_alignment"
      condition: null

    - from: "style_alignment"
      to: "illustrator_render"
      condition: "Illustrator active AND renders requested (not plan-only)"

    - from: "style_alignment"
      to: "gatekeeper_pre_gate"
      condition: "Plan-only mode (Illustrator dormant OR deferred renders)"

    - from: "illustrator_render"
      to: "gatekeeper_pre_gate"
      condition: "Renders complete"

    - from: "gatekeeper_pre_gate"
      to: "art_director_write_plans"
      condition: "Gatekeeper flags Style/Presentation issues requiring plan revision"

    - from: "gatekeeper_pre_gate"
      to: "illustrator_render"
      condition: "Gatekeeper flags issues requiring re-render (and Illustrator active)"

    - from: "gatekeeper_pre_gate"
      to: "showrunner_package_handoff"
      condition: "All checks pass (green on Style, Presentation, Determinism if applicable)"

  exit_conditions:
    - condition: "Art Plans packaged and ready for merge (plan-only or with renders)"
      next_state: "completed"
      triggers:
        - "tu.close"

    - condition: "Gatekeeper blocks on Presentation Safety (spoiler leaks in captions)"
      next_state: "blocked"
      triggers:
        - "gate.blocked"

protocol_flow:
  message_sequences:
    - sequence_id: "scope_and_select"
      description: "Showrunner scopes slice; Art Director selects slots"
      steps:
        - from: "Showrunner"
          to: "Art Director"
          intent: "tu.scope"
          payload:
            - "scope (chapter or hub path)"
            - "target_sections (3-7 slots)"
            - "mode (plan-only vs full render)"
            - "bar_pressure (Presentation, Accessibility, Style)"

        - from: "Art Director"
          to: "State"
          intent: "art.select_slots"
          payload:
            - "slot_id"
            - "section_anchor"
            - "purpose (clarify, recall, mood, signpost)"
            - "subject (player-safe description)"
            - "spoiler_risk (low, medium, high)"

    - sequence_id: "write_plans"
      description: "Art Director writes complete Art Plans with captions and alt guidance"
      steps:
        - from: "Art Director"
          to: "State"
          intent: "art.write_plan"
          payload:
            - "slot_id"
            - "composition_intent"
            - "iconography"
            - "light_mood"
            - "caption (player-safe)"
            - "alt_guidance"
            - "crop_variant_notes"
            - "inclusion_criteria"
            - "determinism_requirement (off-surface)"
            - "constraints"

    - sequence_id: "style_alignment"
      description: "Style Lead reviews visual language and motif consistency"
      steps:
        - from: "Style Lead"
          to: "State"
          intent: "style.align_visual"
          payload:
            - "slot_id"
            - "motif_alignment (approved or adjustments needed)"
            - "caption_register (approved or rephrasing suggested)"
            - "visual_language_consistency (green or drift flagged)"

    - sequence_id: "render_optional"
      description: "Illustrator produces renders with determinism logs (if active)"
      steps:
        - from: "Illustrator"
          to: "State"
          intent: "art.render"
          payload:
            - "slot_id"
            - "render_files (image assets)"
            - "determinism_log (seed, model, parameters)"
            - "alt_text (succinct, descriptive, spoiler-safe)"
          condition: "Illustrator active AND renders requested"

    - sequence_id: "pre_gate"
      description: "Gatekeeper checks Style, Presentation Safety, Determinism"
      steps:
        - from: "Gatekeeper"
          to: "State"
          intent: "gate.pre_gate"
          payload:
            - "slot_id"
            - "style_check (pass or adjustments needed)"
            - "presentation_safety (green or spoiler leaks flagged)"
            - "determinism_check (pass or logs incomplete)"
            - "accessibility_check (alt text present and clear)"
            - "overall_status (green, needs_revision, blocked)"

    - sequence_id: "package_handoff"
      description: "Showrunner packages Art Plans and renders for merge"
      steps:
        - from: "Showrunner"
          to: "State"
          intent: "tu.package"
          payload:
            - "art_plans (list of completed plans)"
            - "renders (list of asset files, if produced)"
            - "determinism_logs (if renders included)"
            - "merge_status (plan-only deferred OR full with renders)"
            - "binder_notified (boolean)"

gates:
  pre_gates:
    - name: "style_alignment_required"
      condition: "Style Lead must approve visual language before rendering"
      enforced_by: "Showrunner"

  merge_gates:
    - name: "presentation_safety"
      condition: "Captions and alt text must be spoiler-safe; no twist reveals"
      enforced_by: "Gatekeeper"

    - name: "style_consistency"
      condition: "Visual language and motifs aligned with Style Lead guardrails"
      enforced_by: "Gatekeeper"

    - name: "determinism_when_promised"
      condition: "If project promises reproducibility, determinism logs must be complete"
      enforced_by: "Gatekeeper"

    - name: "accessibility_complete"
      condition: "Alt text present for all images; captions don't contradict text"
      enforced_by: "Gatekeeper"

traceability:
  tu_lifecycle:
    creates_tus: true
    updates_tu_status: true
    transitions:
      - from: "proposed"
        to: "in_progress"
        trigger: "Showrunner opens Art Touch-up TU"
      - from: "in_progress"
        to: "completed"
        trigger: "Art Plans packaged and Gatekeeper approves"
      - from: "in_progress"
        to: "blocked"
        trigger: "Gatekeeper blocks on Presentation Safety (spoiler leaks)"

  produces_hot:
    - "art_plans (per slot)"
    - "shotlist (status tracking)"
    - "hooks (codex-anchor, motif, plausibility, signpost)"
    - "determinism_logs (if renders produced)"

  produces_cold:
    - "art_plans (may merge as deferred:art without renders)"
    - "renders (with alt text, only if full pass)"

  snapshot_dependencies:
    reads_from_cold:
      - "snapshots[view_id].sections (for context and placement)"
      - "snapshots[view_id].style_addenda (motif palette, visual language)"
      - "snapshots[view_id].codex_entries (terminology for captions)"
    writes_to_cold:
      - "snapshots[view_id].art_plans (plan-only merges)"
      - "snapshots[view_id].art_renders (full pass with images)"

roles:
  primary:
    - role: "Art Director"
      raci: "responsible"
      required: true

  supporting:
    - role: "Showrunner"
      raci: "accountable"
      required: true

    - role: "Style Lead"
      raci: "consulted"
      required: true

    - role: "Gatekeeper"
      raci: "consulted"
      required: true

    - role: "Illustrator"
      raci: "responsible"
      required: false
      wake_condition: "Renders requested (not plan-only mode)"

    - role: "Codex Curator"
      raci: "informed"
      required: false
      wake_condition: "Terminology in captions or codex anchors needed"

    - role: "Player-Narrator"
      raci: "informed"
      required: false
      wake_condition: "Captions must support diegetic performance"

    - role: "Book Binder"
      raci: "informed"
      required: false
      wake_condition: "Notified about inclusion options for export"

context:
  required_state:
    - "hot.section_briefs (for planning context)"
    - "cold_sot.snapshots[view_id].sections (for placement)"

  optional_state:
    - "hot.section_drafts (current prose for image placement)"
    - "cold_sot.snapshots[view_id].style_addenda (motif palette)"
    - "cold_sot.snapshots[view_id].codex_entries (terminology)"
    - "hot.lore_summaries (player-safe only)"
    - "hot.pn_friction_tags (comprehension gaps)"

  quality_bar_focus:
    - bar_name: "Presentation"
      pressure: "high"
      rationale: "Captions and alt must be spoiler-safe; no twist reveals, no technique leakage"

    - bar_name: "Accessibility"
      pressure: "high"
      rationale: "Alt text required for all images; captions don't contradict prose; composition readable at scale"

    - bar_name: "Style"
      pressure: "high"
      rationale: "Visual language and motifs aligned with Style Lead; register consistent"

    - bar_name: "Determinism"
      pressure: "medium"
      rationale: "When promised, determinism logs must be complete; otherwise mark non-deterministic explicitly"

success_criteria:
  required:
    - "Each image has clear narrative purpose (clarify, recall, mood, or signpost)"
    - "Captions are spoiler-safe, readable, and consistent with Style Lead"
    - "Alt guidance present for all plans (concrete subject + relation + location)"
    - "Visual language consistent with motif palette"
    - "Gatekeeper reports green on Style/Presentation/Accessibility"
    - "If renders included, determinism logs sufficient (when promised)"

  optional:
    - "Codex hooks filed for visual anchors"
    - "Motif economy maintained (reuse materials/lights/icons across acts)"
    - "Plan-only merges allowed (deferred:art) when Illustrator dormant"

  definition_of_done:
    - "Art Plans complete with caption + alt guidance"
    - "Style Lead approves visual language and motifs"
    - "Gatekeeper pre-gate green (or issues resolved)"
    - "Showrunner packages handoffs and notifies Binder"
    - "TU closed or follow-ups split; deferred:art marked where applicable"

failure_modes:
  - mode: "Caption spoils twist"
    remedy: "Move reveal to canon notes; rewrite caption atmospheric; Art Director coordinates with Lore for spoiler-safe alternatives"

  - mode: "Style drift (motifs or palette inconsistent)"
    remedy: "Adjust plan with Style Lead; iterate render if already produced; update motif palette documentation"

  - mode: "No determinism log (promised but missing)"
    remedy: "Either re-render with logging OR declare non-deterministic explicitly and do not promise reproducibility"

  - mode: "Over-detailed caption (exposes internals or gate logic)"
    remedy: "Trim to mood/purpose; remove internal labels, flags, or mechanics; keep captions in-world and diegetic"

  - mode: "Inaccessible surface (missing or poor alt text)"
    remedy: "Add/repair alt text; ensure concrete subject + relation + location; check contrast and motion-safety notes for animated media"

  - mode: "Image forces canon or topology changes"
    remedy: "Escalate to Showrunner; request Lore/Plot decisions; don't bake spoilers/structure into visuals without approval"

handoffs:
  from_loops:
    - loop: "Story Spark"
      artifact: "section_briefs (iconic imagery identified)"
      trigger: "New chapter/act needs anchoring visuals"

    - loop: "Style Tune-up"
      artifact: "style_addenda (motif palette, visual language)"
      trigger: "Style Lead requests motif reinforcement"

    - loop: "Binding Run"
      artifact: "current Cold snapshot (for placement context)"
      trigger: "Art Director needs placement context"

  to_loops:
    - loop: "Binding Run"
      artifact: "art_plans and renders (for inclusion in export views)"
      condition: "Art Touch-up complete; ready for export"

    - loop: "Codex Expansion"
      artifact: "hooks (codex-anchor for visual terms)"
      condition: "Visual elements need player-facing definitions"

    - loop: "Style Tune-up"
      artifact: "hooks (motif refinements)"
      condition: "Motif patterns need expansion or consistency work"

execution:
  max_iterations: 3
  timebox_minutes: 120
  timeout_behavior: "complete_with_deferred"
  error_handling:
    - error: "Illustrator unavailable or dormant"
      response: "Complete with plan-only merge (deferred:art); renders can be added later"

    - error: "Gatekeeper blocks on spoiler leaks"
      response: "Art Director revises captions/composition; coordinate with Lore for spoiler-safe alternatives; re-submit for gate"

    - error: "Style drift flagged"
      response: "Style Lead adjusts plan; iterate render if already produced; update motif palette if needed"

    - error: "Determinism logs incomplete (when promised)"
      response: "Illustrator re-renders with proper logging OR declare non-deterministic and adjust project promises"

    - error: "Image would force canon changes"
      response: "Escalate to Showrunner; request Lore approval before depicting; may need to replace slot with different subject"
