site_name: QuestFoundry Python Library
site_description: Python library for QuestFoundry protocol and artifact management
site_author: Peter Liesdonk
site_url: https://pvliesdonk.github.io/questfoundry/

repo_name: pvliesdonk/questfoundry
repo_url: https://github.com/pvliesdonk/questfoundry
edit_uri: edit/main/lib/python/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            line_length: 88

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Resource Bundling: getting-started/bundling.md
  - User Guide:
      - Overview: guide/overview.md
      - Working with Schemas: guide/schemas.md
      - Working with Prompts: guide/prompts.md
      - Validation: guide/validation.md
      - Providers: guide/providers.md
  - API Reference:
      - Utils: api/utils.md
      - Validators: api/validators.md
      - Providers: api/providers.md
      - Lifecycles: api/lifecycles.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md
      - Testing: development/testing.md
  - Specification:
      - Overview: ../../spec/README.md
      - Schemas: ../../spec/03-schemas/README.md
      - Prompts: ../../spec/05-prompts/README.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pvliesdonk/questfoundry
