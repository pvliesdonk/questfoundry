name: Publish Python Library

on:
  workflow_dispatch:

jobs:
  bump-and-tag:
    name: Bump Version and Create Tag
    runs-on: ubuntu-latest
    # Grant permissions to write to contents (push tag/commit)
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for commitizen to find tags
          token: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, create tag, and push
        id: bump
        # Run inside the lib/python directory
        working-directory: lib/python
        run: |
          # cz bump will read pyproject.toml, update files, and create the tag
          cz bump --yes

          # Push the commit (pyproject.toml change) and the new tag
          git push --follow-tags

          # Get the new tag name and set it as an output
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

  build:
    name: Build Distribution
    needs: bump-and-tag
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib/python
    steps:
      - name: Checkout repository at new tag
        uses: actions/checkout@v4
        with:
          # Check out the exact tag created by the bump job
          ref: ${{ needs.bump-and-tag.outputs.new_tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Bundle resources
        run: python scripts/bundle_resources.py

      - name: Build package
        # This now builds using the static version
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: lib/python/dist/

  publish-to-pypi:
    name: Publish to PyPI
    if: inputs.destination == 'pypi'
    needs:
      - build
      - bump-and-tag
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/questfoundry-py
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: inputs.destination == 'testpypi'
    needs:
      - build
      - bump-and-tag
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/questfoundry-py
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: Create GitHub Release
    if: inputs.destination == 'pypi'
    needs:
      - publish-to-pypi
      - bump-and-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Not strictly needed for gh release, but good practice

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.bump-and-tag.outputs.new_tag }}
        run: |
          gh release create "$NEW_TAG" \
            --repo '${{ github.repository }}' \
            --notes "Python library release $NEW_TAG" \
            dist/*
