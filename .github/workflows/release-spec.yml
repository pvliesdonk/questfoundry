name: Release Specification

on:
  workflow_dispatch:

jobs:
  release-spec:
    name: Bump, Tag, and Release Spec
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push commits, tags, and create a release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for commit push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        # This tells the step to run all commands from the ./spec directory
        working-directory: ./spec
        run: |
          # 1. Run bump. It will automatically find spec/.cz.toml
          # and see version = "0.0.0"
          cz bump --yes

          # 2. Extract the NEW version from the file (still relative to ./spec)
          NEW_VERSION=$(grep 'version =' SPEC_VERSION.txt | awk '{print $3}')
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Push version bump
        run: |
          git push
          git push --tags

      - name: Create artifact staging directory
        run: mkdir -p ./spec-artifacts

      - name: Build spec-all.zip
        run: |
          cd spec
          zip -r ../spec-artifacts/spec-all.zip .
          cd ..

      - name: Build spec-schemas.zip
        run: |
          cd spec
          zip -r ../spec-artifacts/spec-schemas.zip 03-schemas 04-protocol
          cd ..

      - name: Build spec-behavior.zip
        run: |
          cd spec
          zip -r ../spec-artifacts/spec-behavior.zip 05-behavior
          cd ..

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: spec-v${{ env.NEW_VERSION }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "Specification v${{ env.NEW_VERSION }}" \
            --notes "Full specification release (Layers 0-5). See commit history for changes." \
            ./spec-artifacts/spec-all.zip \
            ./spec-artifacts/spec-schemas.zip \
            ./spec-artifacts/spec-behavior.zip
