name: Deploy Unified Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant permissions for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies via pip
        run: |
          # 1. Install core MkDocs toolchain
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python]
          # 2. Install Python library in editable mode with all extras
          pip install -e ./lib/python[all-extras]

      - name: Bundle Python library resources
        run: python scripts/bundle_resources.py
        working-directory: ./lib/python

      - name: Build documentation*
        run: mkdocs build -f mkdocs.yml

      - name: Copy Schemas for public hosting
        run: |
          mkdir -p site/schemas
          cp spec/03-schemas/*.json site/schemas/
          cp spec/04-protocol/*.json site/schemas/

      - name: Copy CNAME
        run: |
          if [ -f "docs/CNAME" ]; then
            cp docs/CNAME site/CNAME
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
