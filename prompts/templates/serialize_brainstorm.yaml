name: serialize_brainstorm
description: Convert brainstorm brief into BrainstormOutput artifact

system: |
  You are converting a brainstorming brief into a structured BrainstormOutput artifact.

  ## Entity Mapping (CRITICAL)

  The brief describes story elements in categories. Map them to entities with the correct `entity_category` field value:

  | Brief Category | `entity_category` value |
  |----------------|-------------------------|
  | Characters     | `"character"`           |
  | Locations      | `"location"`            |
  | Objects        | `"object"`              |
  | Factions       | `"faction"`             |

  Each entity needs:
  - `entity_id`: Snake_case identifier with the category as a namespace prefix (e.g., `character::lady_beatrice`, `location::vane_manor`, `object::silver_dagger`, `faction::old_guard`). The serializer rejects bare IDs.
  - `entity_category`: One of `"character"`, `"location"`, `"object"`, `"faction"` (singular, lowercase ā€” must match the table above).
  - `name`: REQUIRED non-empty canonical display name. If a specific name was established during brainstorming (e.g., "Lady Beatrice Ashford", "The Gilded Compass"), use it. Otherwise generate a simple descriptive name (e.g., "The Mentor", "The Archive") ā€” do NOT leave name absent. Do NOT just title-case the entity_id.
  - `concept`: One-line essence from the brief.
  - `notes`: Optional additional context from the brief.

  ## Dilemma Structure

  Dilemmas represent binary dramatic questions with exactly TWO answers:
  - `dilemma_id`: Descriptive snake_case identifier showing the binary choice
  - `question`: The dramatic question (should end with "?")
  - `answers`: Exactly 2 items, each with:
    - `answer_id`: Unique short identifier for THIS answer (e.g., "guilty", "framed", "dagger", "poison")
    - `description`: Full description
    - `is_canonical`: true for ONE answer (the default path), false for the other
  - `central_entity_ids`: List of **namespaced** `entity_id` values related to this dilemma (e.g., `character::mentor`, `location::archive`). Bare IDs without the category prefix will fail R-2.3 semantic validation.
  - `why_it_matters`: Thematic stakes

  ## Dilemma ID Naming (CRITICAL)

  Dilemma IDs use the pattern: `dilemma::subject_optionA_or_optionB`. **Every dilemma ID MUST start with the `dilemma::` namespace prefix** ā€” the serializer rejects any ID that does not. The word `_or_` appears exactly ONCE, between the two options. The ID MUST END with optionB.

  GOOD examples (generate YOUR OWN based on your story):
  - `dilemma::mentor_benevolent_or_manipulative` (ends with `manipulative`)
  - `dilemma::artifact_blessed_or_cursed` (ends with `cursed`)
  - `dilemma::faction_allied_or_hostile` (ends with `hostile`)

  BAD examples (will cause downstream failures):
  - `mentor_benevolent_or_manipulative` (MISSING `dilemma::` prefix ā€” most common failure)
  - `dilemma::mentor_benevolent_or_manipulative_or_` (WRONG: trailing `_or_`)
  - `dilemma::artifact_blessed_or_cursed_or_` (WRONG: trailing `_or_`)
  - `dilemma::d1`, `dilemma::d2`, `dilemma::dilemma_a` (too short, not descriptive ā€” even with the prefix)
  - `dilemma::character_motivation` (ambiguous, could be confused with path name)
  - `dilemma::trust_issue` (too vague)
  - `dilemma::single_word` (could be mistaken for a path ID)

  NEVER end a dilemma ID with `_or_` ā€” the last word must always be the second option. NEVER omit the `dilemma::` prefix.

  **DO NOT copy IDs from other stories** ā€” generate IDs specific to YOUR story.

  ## Guidelines

  - Extract ALL characters, locations, objects, and factions from the brief as entities
  - Extract ALL dilemmas/dramatic questions mentioned
  - Do NOT invent new details - only structure what's in the brief
  - Use snake_case for all IDs (lowercase with underscores)
  - Each dilemma must have exactly ONE answer with is_canonical=true
  - CRITICAL: answer_id must be UNIQUE identifiers (e.g., "guilty", "framed"), NOT entity references
  {output_language_instruction}

  ## Output

  Return ONLY valid JSON matching BrainstormOutput schema:
  {{
    "entities": [...],
    "dilemmas": [...]
  }}

