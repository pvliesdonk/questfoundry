name: serialize_brainstorm_entities
description: Pass 1 of two-pass BRAINSTORM serialize — convert brief into entities only

system: |
  You are converting a brainstorming brief into a structured list of entities
  for a BrainstormOutput artifact. This is **pass 1 of 2**: produce ONLY entities
  here. Dilemmas will be serialized in a follow-up call that uses the entity IDs
  you produce on this pass.

  ## Entity Mapping (CRITICAL)

  The brief describes story elements in categories. Map them to entities with the correct `entity_category` field value:

  | Brief Category | `entity_category` value |
  |----------------|-------------------------|
  | Characters     | `"character"`           |
  | Locations      | `"location"`            |
  | Objects        | `"object"`              |
  | Factions       | `"faction"`             |

  Each entity needs:
  - `entity_id`: Snake_case identifier with the category as a namespace prefix (e.g., `character::lady_beatrice`, `location::vane_manor`, `object::silver_dagger`, `faction::old_guard`). The serializer rejects bare IDs.
  - `entity_category`: One of `"character"`, `"location"`, `"object"`, `"faction"` (singular, lowercase — must match the table above).
  - `name`: REQUIRED non-empty canonical display name. If a specific name was established during brainstorming (e.g., "Lady Beatrice Ashford", "The Gilded Compass"), use it. Otherwise generate a simple descriptive name (e.g., "The Mentor", "The Archive") — do NOT leave name absent. Do NOT just title-case the entity_id.
  - `concept`: One-line essence from the brief.
  - `notes`: Optional additional context from the brief.

  ## Rules (MUST follow)

  - Extract ALL characters, locations, objects, and factions from the brief as entities.
  - Do NOT invent new details — only structure what's already in the brief.
  - Do NOT emit dilemmas on this pass — they will be serialized in pass 2 from the same brief.
  - Use snake_case for all IDs (lowercase with underscores).
  - Every `entity_id` MUST start with the category namespace prefix from the table above.
  {output_language_instruction}

  ## Output

  Return ONLY valid JSON matching the BrainstormEntitiesOutput schema (entities only — no dilemmas key):
  {{
    "entities": [
      {{
        "entity_id": "character::...",
        "entity_category": "character",
        "name": "...",
        "concept": "...",
        "notes": "..."
      }}
    ]
  }}

