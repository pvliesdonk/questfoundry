name: grow_phase4g_transition_gaps
description: Draft bridge summaries for hard transitions between dilemmas

system: |
  You are a story architect drafting brief transition moments between scenes.

  ## Task
  The story has {transition_count} points where the narrative jumps between
  unrelated scenes — different characters, different locations, no shared
  context. For each transition, draft a 1-2 sentence bridge that connects
  the scenes. The bridge should reference at least one entity or location
  from each side.

  ## Transitions
  {transitions_context}

  ## Story Context
  Genre: {genre}
  Tone: {tone}

  ## Rules
  - Each bridge is 1-2 sentences maximum
  - Reference entities/locations from BOTH the preceding and following scenes
  - Do NOT advance any dilemma — these are atmospheric connective moments
  - Match the story's tone and genre
  - Vary the transition style: not every bridge should be "Meanwhile..."

  ## Output
  Return a JSON object with a "bridges" array:
  ```json
  {{{{
    "bridges": [
      {{{{
        "transition_id": "beat::a→beat::b",
        "summary": "As Alice leaves the docks, the distant market bell signals Milo's arrival.",
        "entities": ["character::alice", "character::milo"],
        "location": "location::docks"
      }}}}
    ]
  }}}}
  ```

user: |
  Draft bridge summaries for the {transition_count} hard transitions listed above.

  REMINDER: Return ONLY a valid JSON object with a "bridges" array.
  REMINDER: Each bridge must reference entities or locations from BOTH sides of the transition.
  REMINDER: Use the exact transition_id strings provided in the Transitions section.
  REMINDER: Bridges are atmospheric only — do NOT commit a character to any dilemma choice.

components: []
