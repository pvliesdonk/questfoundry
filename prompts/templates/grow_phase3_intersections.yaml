name: grow_phase3_intersections
description: Evaluate pre-screened candidate groups for intersection scenes

system: |
  You are evaluating pre-screened candidate groups for story "intersections" --
  scenes where beats from DIFFERENT dilemmas converge in the same location or moment.

  ## What is an Intersection?
  An intersection occurs when beats from DIFFERENT dilemmas naturally occur in the
  same scene. This is purely structural — it identifies which beats from different
  dilemmas share a location or moment. (Prose-level differentiation for same-dilemma
  convergence points is handled separately by residue beats.)

  GOOD intersection:
  - The hero meets the mentor (mentor_trust dilemma) at the market where
    the artifact is displayed (artifact_quest dilemma). Two beats, two dilemmas,
    one scene -- the market naturally hosts both events.

  NOT an intersection (reject):
  - The hero trains alone in the woods (survival dilemma) while the council
    debates in the city (political dilemma). Same time, but different locations
    and no shared scene -- these beats do not form a natural combined moment.

  ## Rules
  1. Keep intersections SMALL: prefer 2 beats; 3 beats maximum.
  2. Beats in an intersection must share a plausible location or moment.
  3. Each beat can appear in at most ONE intersection. If a beat appears in
     multiple candidate groups, choose the group where it fits most naturally
     and skip the others that use that beat.
  4. Do NOT force intersections. Rejecting a weak group is better than
     accepting a forced one. If no candidate group forms a natural scene,
     return `{"intersections": []}`.
  5. Use ONLY beat IDs from the Valid IDs section. Do not invent or modify IDs.
  6. CRITICAL: Each intersection MUST combine beats from DIFFERENT dilemmas.
     The dilemma tag shown as [dilemma::X] after each beat ID tells you which
     dilemma the beat belongs to. NEVER put two beats with the same dilemma
     tag in the same intersection.
     BAD: beat A [dilemma::trust] + beat B [dilemma::trust] + beat C [dilemma::flee]
     GOOD: beat A [dilemma::trust] + beat B [dilemma::flee] + beat C [dilemma::search]
  7. PREFER early beats (_beat_01, _beat_02). Avoid late beats (_beat_03, _beat_04)
     because they often carry ordering dependencies on beats from other paths and
     will fail validation. When in doubt, pick the earlier-numbered beat from each
     dilemma in the candidate group.

  ## Candidate Groups
  {candidate_groups}

  ## Valid IDs
  Valid beat_ids (use ONLY these), grouped by the dilemma each beat
  belongs to. Beats whose ``belongs_to`` resolves to multiple dilemmas
  (rare, structural error) and beats with no ``belongs_to`` mapping
  appear in dedicated buckets.

  {valid_beat_ids}

  ## Output Format
  Return a JSON object with an "intersections" array. Each element has:
  - beat_ids: list of 2-3 beat IDs that form the intersection (from DIFFERENT dilemmas)
  - resolved_location: the specific location where this scene occurs — MUST be a
    non-empty string. If the candidate group lists multiple possible locations, pick
    the one that fits most beats. If location is genuinely unknown, use the most
    specific location mentioned in any of the beat descriptions (e.g., "the village
    square" rather than "unknown"). NEVER output null. NEVER output the word "null".
  - shared_entities: list of entity IDs shared between the intersecting beats — use the
    full "entity::<name>" format (e.g., "entity::merchant", "entity::artifact"). If no
    entities are shared, use an empty list []. Do NOT invent entity IDs — use only IDs
    that appear in the candidate group descriptions above.
  - rationale: one sentence explaining WHY the beats belong in one scene — mention what
    narrative or physical element draws them together, not just that they share a location.
    BAD: "These beats share the market location." GOOD: "Both beats require the merchant's
    presence, so staging them together avoids a redundant scene."

  Example (do not copy these IDs -- use the real IDs from the candidate groups):
  {{
    "intersections": [
      {{
        "beat_ids": ["beat::market_encounter", "beat::artifact_reveal"],
        "resolved_location": "the central market",
        "shared_entities": ["entity::merchant", "entity::artifact"],
        "rationale": "Both beats require the merchant's presence, so staging them together avoids a redundant scene."
      }},
      {{
        "beat_ids": ["beat::council_vote", "beat::spy_report"],
        "resolved_location": "the council chamber antechamber",
        "shared_entities": [],
        "rationale": "The spy delivers news just as the council adjourns, making the antechamber the only staging that keeps both beats from requiring separate scene-setting."
      }}
    ]
  }}

  If no groups form natural intersections, return: {{"intersections": []}}

user: |
  Select which candidate groups form natural intersection scenes.

  REMINDER:
  - Return ONLY a valid JSON object — no prose before or after.
  - Use ONLY beat IDs from the Valid IDs section. Do NOT invent IDs.
  - Each beat may appear in at most ONE intersection.
  - resolved_location MUST be a non-empty string. If uncertain, pick the best-fit
    location from the beat descriptions. NEVER output null or the word "null".
  - shared_entities MUST use "entity::<name>" format or be an empty list [].
  - rationale MUST explain WHY the beats belong in one scene, not just that they share a location.
  {structural_feedback}

components: []
