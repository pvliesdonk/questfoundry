name: polish_phase3_arcs
description: Synthesize character arc metadata for an entity

system: |
  You are synthesizing a character arc description for one entity in a
  branching story. This metadata will guide prose writers to maintain
  character consistency across scenes.

  ## Entity
  ID: {entity_id}
  Name: {entity_name}
  Description: {entity_description}
  Central to dilemmas: {anchored_dilemmas}

  ## Entity Overlays (how the entity changes based on player choices)
  {overlay_data}

  ## Beats Featuring This Entity (in story order)
  Format per line: `<beat_id>` (path: `<path_id>`) [<scene_type>]: <summary>
  Beat and path IDs are backtick-wrapped (matches the Valid IDs section
  below). Pre-commit beats list both paths of their dilemma and end
  with `(shared pre-commit)`. Beats with `dilemma_effects=[…]` carry
  those effects on their listed dilemmas. A beat with no `belongs_to`
  edges renders as `(path: unknown)` (sentinel literal, not an ID —
  anomalous data; treat the beat as path-agnostic).
  {beat_appearances}

  ## Paths Where This Entity Appears
  Subset of the story's paths — only those reached via at least one
  beat the entity is in. The `pivots` and `arcs_per_path` arrays below
  MUST use IDs from this list.
  {path_ids}

  ## Arc Structure
  For this entity, describe:
  1. **Start**: How the entity is introduced — first impression, initial role
  2. **Pivots**: Key moments where the entity's trajectory changes.
     Each pivot is path-specific (the entity may change differently on
     different paths). Use the beat IDs and path IDs from above.
  3. **End per path**: Where the entity ends up on each path. One entry
     per path where the entity appears.
  4. **Per-path arcs** (`arcs_per_path`): for each path the entity is
     arc-worthy on, give a concise A → B → C trajectory line and the
     ``pivot_beat`` where the trajectory turns. The ``pivot_beat`` MUST
     equal the beat_id of that path's entry in the ``pivots`` list (same
     LLM call enforces this — pick one beat per path and use it for both
     fields). The ``arc_type`` field is set by code from the entity's
     category — use the placeholder string `"_set_by_code"` and POLISH
     will overwrite it; do not invent a value.

  ## Valid IDs
  Each path the entity appears on is listed with its beats. Use beat
  IDs only with their owning path — every `pivots[*].beat_id` and
  `arcs_per_path[*].pivot_beat` MUST belong to the corresponding
  `path_id` in the same arc entry.

  {valid_path_beats}

  ## Output Format
  Return a JSON object with a "character_arcs" array containing exactly
  one arc for entity {entity_id}.

  Example (do NOT copy these IDs):
  {{
    "character_arcs": [
      {{
        "entity_id": "character::mentor",
        "start": "The mentor appears as a calm authority figure, offering guidance",
        "pivots": [
          {{
            "path_id": "path::trust",
            "beat_id": "beat::mentor_reveal",
            "description": "The mentor reveals hidden knowledge, deepening the bond"
          }},
          {{
            "path_id": "path::doubt",
            "beat_id": "beat::mentor_secret",
            "description": "The protagonist discovers the mentor has been hiding something"
          }}
        ],
        "end_per_path": {{
          "path::trust": "The mentor becomes a true ally, having earned full trust",
          "path::doubt": "The mentor is estranged, their motives forever uncertain"
        }},
        "arcs_per_path": [
          {{
            "path_id": "path::trust",
            "arc_type": "_set_by_code",
            "arc_line": "guarded authority → trusted confidant → committed ally",
            "pivot_beat": "beat::mentor_reveal"
          }},
          {{
            "path_id": "path::doubt",
            "arc_type": "_set_by_code",
            "arc_line": "guarded authority → suspicious shadow → estranged figure",
            "pivot_beat": "beat::mentor_secret"
          }}
        ]
      }}
    ]
  }}

  ## What NOT to Do
  - Do NOT use IDs not listed in the Valid IDs sections
  - Do NOT return arcs for entities other than {entity_id}
  - Do NOT write novel-length descriptions — keep each field to 1-2 sentences
  - Do NOT use a different ``pivot_beat`` than the matching ``pivots[path_id]`` entry
  - Do NOT invent ``arc_type`` values — leave the placeholder, code will set it
  - Do NOT add prose before or after the JSON output

user: |
  Synthesize the character arc for {entity_name} ({entity_id}).
  Consider how this entity changes across the story's paths.

  REMINDER: Return ONLY valid JSON with one arc for this entity.

components: []
