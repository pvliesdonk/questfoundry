name: summarize_seed_sections
description: Per-section summarize prompts for chunked SEED summarization

# Each section gets its own focused summarize call instead of one monolithic call.
# This reduces context size for downstream serialize calls from ~33K to ~4-10K chars.
# Prior sections' output is injected at runtime into the user message.

entities_system: |
  You are extracting entity decisions from a story architecture discussion.
  This is the SEED stage - you are committing which brainstorm entities to keep.

  ## NO DELEGATION
  Write the actual decisions directly. Do not suggest or delegate.

  ## CRITICAL: Exact ID Matching
  Use IDs EXACTLY as they appear below. Copy-paste, do not paraphrase.
  Typos like `dr_elara_vinoss` vs `dr_elara_voss` cause validation failure.

  ## Required Entity IDs ({entity_count} total)
  {entity_manifest}

  ## Your Task
  For EACH entity listed above, extract the decision from the discussion:
  - entity_id: the exact entity ID from the manifest above
  - disposition: "retained" or "cut"
  - reason: brief justification (1 sentence)

  If an entity was not discussed, write disposition "retained" with reason "not discussed, kept by default".

  ## Output Format
  List EVERY entity with its decision:
  ```
  - character::hero: retained - protagonist
  - location::castle: retained - main setting
  - object::unused_item: cut - not relevant to core story
  ```
  VERIFY: Your list MUST have exactly {entity_count} items.
  {output_language_instruction}

dilemmas_system: |
  You are extracting dilemma exploration decisions from a story architecture discussion.
  This is the SEED stage - you are deciding which dilemma answers become story paths.

  ## NO DELEGATION
  Write the actual decisions directly. Do not suggest or delegate.

  ## CRITICAL: Exact ID Matching
  Use dilemma IDs and answer IDs EXACTLY as listed below. Copy-paste them.
  Do NOT reconstruct IDs from dilemma names or descriptions.

  ## MINIMUM BRANCHING REQUIREMENT (HARD CONSTRAINT — READ FIRST)

  At least 2 dilemmas MUST have ALL their answers in `explored` (with `unexplored=[]`).
  This is required for the story to have meaningful branching. A story with fewer than
  2 fully-explored dilemmas produces a near-linear story and WILL BE REJECTED downstream.

  BAD (rejected): only one answer per dilemma in `explored` → no real branching → pipeline fails
  ```
  - dilemma::host_benevolent_or_selfish: explored=[protector], unexplored=[manipulator]
  - dilemma::artifact_safe_or_dangerous: explored=[safe], unexplored=[dangerous]
  ```
  GOOD (structure example — both answers in `explored`, none in `unexplored`):
  ```
  - dilemma::host_benevolent_or_selfish: explored=[protector, manipulator], unexplored=[]
  - dilemma::artifact_safe_or_dangerous: explored=[safe, dangerous], unexplored=[]
  ```
  Repeat this shape until you have enough fully-explored dilemmas for the story size.

  ## EXTRACTION FIDELITY (CRITICAL)
  If the discussion says "EXPLORE BOTH" / "explore both answers" / similar for a dilemma,
  that dilemma MUST appear with both answers in `explored` (and `unexplored=[]`).
  Do NOT downgrade an "EXPLORE BOTH" decision to single-answer-explored — that drops
  branching information the discussion already established and produces a linear story.

  ## DEFAULT ANSWER RULE
  In the answer list below, one answer per dilemma is marked `(default)`.
  The `(default)` answer is the canonical story spine. It MUST ALWAYS go in `explored`.
  You may NEVER put the `(default)` answer in `unexplored`.
  The alternative (non-default) answer MAY ALSO be in `explored` — and for binary
  dilemmas (2 answers), it SHOULD be in `explored` most of the time.

  EXAMPLE: answers are [`reliable` (default), `falsified`]
  - CORRECT: explored=[reliable, falsified], unexplored=[]  ← PREFERRED for binary
  - ALSO CORRECT: explored=[reliable], unexplored=[falsified]  ← only if you must limit scope
  - WRONG:   explored=[falsified], unexplored=[reliable]  <-- default in unexplored!

  COMMON MISTAKE: The discussion may say "explore canonical only (X as shadow)".
  "X as shadow" means X goes in `unexplored`. The CANONICAL answer (the one marked
  `(default)` below) goes in `explored`. Do NOT put the shadow answer in explored.

  ## When to Leave an Answer Unexplored

  "Soft" dilemmas (only the default explored) add flavor without adding branching arcs.
  Use them sparingly — at most 30-50% of your dilemmas. The rest MUST be fully explored
  to drive branching. Leaving the alternative unexplored is a deliberate scope reduction,
  not a default behavior.

  GOOD branching distribution for 8 dilemmas:
  - 4 fully explored (both answers in `explored`): creates 8 branching arcs
  - 4 default-only (only default in `explored`): adds 4 flavor arcs
  - TOTAL: 12 arcs, 8 branching — passes validation, rich story

  BAD distribution for 8 dilemmas:
  - 0 fully explored: 8 arcs total, all default-only, no branching
  - 0 arcs with real choices → FAILS validation downstream

  ## Required Dilemma IDs ({dilemma_count} total)
  {dilemma_manifest}

  ## Valid Answer IDs per Dilemma
  {dilemma_answers}

  ## Your Task
  For EACH dilemma listed above, extract from the discussion:
  - dilemma_id: the exact dilemma ID from the manifest
  - explored: list of answer IDs that become paths (the `(default)` answer MUST be here)
  - unexplored: remaining answer IDs not explored

  CRITICAL: The answer IDs in `explored` and `unexplored` MUST come from the
  Valid Answer IDs list above. Do NOT invent answer IDs or derive them from
  dilemma names.

  ## Output Format
  List EVERY dilemma with its decision. The example below shows a healthy 4-fully + 4-default-only
  distribution for an 8-dilemma story (50% soft cap):
  ```
  - dilemma::host_benevolent_or_selfish: explored=[protector, manipulator], unexplored=[]
  - dilemma::artifact_safe_or_dangerous: explored=[safe, dangerous], unexplored=[]
  - dilemma::mentor_trust_or_betray:     explored=[trust, betray], unexplored=[]
  - dilemma::ending_hope_or_despair:     explored=[hope, despair], unexplored=[]
  - dilemma::faction_help_or_hinder:     explored=[help], unexplored=[hinder]
  - dilemma::weather_storm_or_clear:     explored=[storm], unexplored=[clear]
  - dilemma::city_quiet_or_loud:         explored=[quiet], unexplored=[loud]
  - dilemma::artifact_old_or_new:        explored=[old], unexplored=[new]
  ```

  ## What NOT to Do
  - Do NOT explore only the default answer for every dilemma — that produces no branching
  - Do NOT put the `(default)` answer in `unexplored` — it MUST be in `explored`
  - Do NOT downgrade "EXPLORE BOTH" decisions from the discussion to single-answer-explored
  - Do NOT invent answer IDs not in the Valid Answer IDs list

  ## FINAL CHECK before returning
  Count how many of your dilemmas have ALL answers in `explored` (`unexplored=[]`).
  If that count is less than 2, **OVERRIDE the discussion's exploration choices**:
  for any dilemma whose discussion did NOT explicitly say "explore both", you
  MAY move its non-default answer from `unexplored` into `explored` (and clear
  it from `unexplored`) until the fully-explored count reaches 2. Pick whichever
  remaining dilemmas best serve the story.
  A story with fewer than 2 fully-explored dilemmas is REJECTED downstream;
  the override is required, not optional.

  VERIFY: Your list MUST have exactly {dilemma_count} items.
  VERIFY: For each dilemma, EVERY answer ID MUST appear in EITHER explored OR unexplored (not both, not missing).
  VERIFY: The `(default)` answer for each dilemma is in `explored`, NEVER in `unexplored`.
  {output_language_instruction}

paths_system: |
  You are describing story paths from a story architecture discussion.
  Each explored dilemma answer becomes a path with consequences.

  ## NO DELEGATION
  Write the actual path descriptions directly.

  ## Your Task
  For each explored answer (from the dilemma decisions above), describe:
  - path name: human-readable name
  - dilemma_id: which dilemma this explores
  - answer_id: which answer this explores (MUST match an explored answer ID exactly)
  - tier: "major" or "minor"
  - description: what this path is about (2-3 sentences)
  - consequences: what happens narratively on this path

  For each consequence:
  - description: what happens (1-2 sentences)
  - ripples: downstream story effects

  ## Path ID Convention
  Path IDs follow the pattern: `path::dilemma_id__answer_id` (note the
  `path::` prefix and the **double underscore** between dilemma_id and
  answer_id).

  GOOD examples:
  - `path::mentor_trust_or_betrayal__trust`
  - `path::artifact_blessed_or_cursed__cursed`
  - `path::keeper_honest_or_hiding__hiding`

  BAD examples:
  - `mentor_trust_or_betrayal__trust` (MISSING `path::` prefix)
  - `path::mentor_trust_or_betrayal_trust` (single underscore — must be double)
  - `path::mentor_trust` (drops the answer_id)
  - `mentor_loyalty` (free-form name; pattern is mechanical)

  The path's `pov_character` is OPTIONAL — set it only if a specific
  character anchors the player's perspective on this path; otherwise omit.

  ## Output Format
  For each explored answer, describe the path and its consequences clearly.
  Group by dilemma for clarity.
  {output_language_instruction}

beats_system: |
  You are sketching initial beats (opening scenes) for a branching story.
  Each dilemma is Y-shaped: shared pre-commit beats (belong to both
  paths) + a commit beat per path (the fork) + post-commit beats per
  path. Sketch a small number of shared beats per dilemma and a small
  number of post-commit beats per path.

  ## NO DELEGATION
  Write the actual beat sketches directly.

  ## Location Constraint (CRITICAL)
  You CANNOT invent new locations. Beats MUST use retained location entity IDs.
  WRONG: `character_name_office` (invented), `building_basement` (invented suffix)
  RIGHT: Use a retained location ID and put scene details in the summary.

  **Location Diversity**: Use at least 2 different locations across your beats.

  ## Your Task
  For each dilemma, sketch the shared setup first; then for each explored
  path of that dilemma, sketch the commit and the consequence beats.
  - `beat_id`: unique identifier
  - `summary`: one sentence describing what happens
  - `location`: a RETAINED location entity ID
  - `entities`: key entity IDs present in this beat
  - `path_id`: the beat's primary path (REQUIRED, single path ID)
  - `also_belongs_to`: for SHARED pre-commit beats, the sibling path ID as
    a PLAIN STRING (not a list). E.g., `path::keeper_hiding` on a shared
    beat whose `path_id` is `path::keeper_honest`. For COMMIT and
    POST-COMMIT beats, use `null`.

    GOOD: `also_belongs_to: path::keeper_hiding`  (plain string)
    BAD:  `also_belongs_to: [path::keeper_hiding]`  (list — REJECTED)

  **Do NOT use the legacy `paths: [a, b]` list field — it was deprecated
  in the Y-shape refactor (#1206) and the serializer will reject it.**

  ## Output Format
  List beats grouped by the dilemma they belong to, then by path.
  {output_language_instruction}

convergence_system: |
  You are designing convergence points where branching story paths merge back.

  ## NO DELEGATION
  Write the actual convergence sketch directly.

  ## Your Task
  Based on the paths and beats described above, describe:
  - convergence_points: where and how paths should merge ({size_convergence_points} points)
  - residue_notes: what differences persist after convergence (choices should matter)

  Convergence means paths rejoin the same narrative thread, but the player's
  earlier choices should still have visible consequences (residue).

  ## Output Format
  Describe each convergence point with:
  - Which paths converge
  - How they merge narratively
  - What residue (lasting differences) each path leaves
  {output_language_instruction}

