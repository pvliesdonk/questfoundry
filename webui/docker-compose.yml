# QuestFoundry WebUI - Example Deployment Stack
#
# This docker-compose file demonstrates a complete multi-tenant deployment
# of the QuestFoundry WebUI stack. It includes:
#
# - PostgreSQL: Cold storage database (artifacts, projects, tenancy)
# - Valkey: Hot storage cache (working artifacts) and locking
# - API: FastAPI backend (tenancy layer)
# - PWA: Static web frontend
# - Traefik: Reverse proxy with OIDC authentication
# - Authelia: OIDC provider
#
# SECURITY WARNING: This is an EXAMPLE configuration. Do NOT use in production
# without proper security hardening:
# - Change all passwords and secrets
# - Configure proper TLS/SSL certificates
# - Restrict network access appropriately
# - Review and harden authentication configuration
# - Enable proper logging and monitoring

version: '3.8'

services:
  # PostgreSQL - Multi-tenant cold storage
  postgres:
    image: postgres:16-alpine
    container_name: qf-postgres
    environment:
      POSTGRES_DB: questfoundry
      POSTGRES_USER: questfoundry
      POSTGRES_PASSWORD: changeme_postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questfoundry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Valkey/Redis - Hot storage and distributed locking
  valkey:
    image: valkey/valkey:7-alpine
    container_name: qf-valkey
    command: >
      valkey-server
      --appendonly yes
      --requirepass changeme_valkey_password
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API Server - Tenancy layer
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: qf-api
    environment:
      # Database configuration
      WEBUI_POSTGRES_HOST: postgres
      WEBUI_POSTGRES_PORT: 5432
      WEBUI_POSTGRES_DB: questfoundry
      WEBUI_POSTGRES_USER: questfoundry
      WEBUI_POSTGRES_PASSWORD: changeme_postgres_password
      
      # Redis/Valkey configuration
      WEBUI_REDIS_HOST: valkey
      WEBUI_REDIS_PORT: 6379
      WEBUI_REDIS_PASSWORD: changeme_valkey_password
      
      # Security configuration
      WEBUI_ENCRYPTION_KEY: changeme_fernet_key_32_chars_base64_encoded
      
      # Lock configuration
      WEBUI_LOCK_TIMEOUT: 300  # 5 minutes
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # PWA - Frontend application
  pwa:
    build:
      context: ./pwa
      dockerfile: Dockerfile
    container_name: qf-pwa
    environment:
      VITE_API_URL: http://api:8000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # Traefik - Reverse proxy (optional, for OIDC integration)
  # Uncomment to enable reverse proxy with authentication
  # traefik:
  #   image: traefik:v2.10
  #   container_name: qf-traefik
  #   command:
  #     - "--api.insecure=true"
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #   ports:
  #     - "80:80"
  #     - "8080:8080"  # Traefik dashboard
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: unless-stopped

  # Authelia - OIDC provider (optional)
  # Uncomment to enable OIDC authentication
  # authelia:
  #   image: authelia/authelia:latest
  #   container_name: qf-authelia
  #   volumes:
  #     - ./authelia:/config
  #   ports:
  #     - "9091:9091"
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local

networks:
  default:
    name: questfoundry-network
